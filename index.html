    input:focus { outline: none; }

    @keyframes pulse { 0%, 100% { box-shadow: 0 0 8px var(--pulse-color, #00FF87); } 50% { box-shadow: 0 0 20px var(--pulse-color, #00FF87), 0 0 40px var(--pulse-color, #00FF87)44; } }
    @keyframes shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
    @keyframes fillWidth { from { transform: scaleX(0); } to { transform: scaleX(1); } }

    .stat-hover:hover { background:rgba(255,255,255,0.035); cursor:pointer; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes slideInLeft { from{transform:translateX(-12px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes popIn { 0%{transform:scale(0);opacity:0} 80%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }

    .crown-icon { position:absolute; top:-14px; font-size:16px; animation:float 2s ease-in-out infinite; }
    .vs-badge { animation:pulse 2s ease-in-out infinite, float 3s ease-in-out infinite; }
    @media print { body{background:#fff!important;color:#000!important} .scroll-top-btn,.section-nav,.no-print,.toast-msg{display:none!important} [style*="background:#0D1829"]{background:#fff!important;border-color:#ddd!important} }
    ::-webkit-scrollbar { height: 4px; width: 4px; background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1E293B; border-radius: 2px; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── Constants ─────────────────────────────────────────────────────
const C1 = "#00FF87", C2 = "#38B6FF", LOSE = "#EF4444", AMBER = "#F59E0B";
const fmt = v => v != null ? Number(v).toLocaleString() : "—";
const pct = (rank, total=11000000) => rank ? "Top " + (rank/total*100).toFixed(rank/total<0.01?2:1) + "%" : "";
const stdDev = (arr) => { if (!arr.length) return 0; const m = arr.reduce((a,b)=>a+b,0)/arr.length; return Math.round(Math.sqrt(arr.reduce((s,v)=>s+(v-m)**2,0)/arr.length)); };

const CHIP_NAMES = { wildcard: "Wildcard", "3xc": "Triple Captain", bboost: "Bench Boost", freehit: "Free Hit" };
const CHIP_ICONS = { wildcard: "🔄", "3xc": "👑", bboost: "📈", freehit: "🆓" };

// ── Team Resolution Layer ─────────────────────────────────────────
// human-friendly input → resolved entryId

function parseEntryIdFromUrl(str) {
  const m = str.match(/entry\/(\d+)/);
  return m ? m[1] : null;
}

function normalizeStr(s) {
  return (s || "").toLowerCase().trim().replace(/\s+/g, " ");
}

function scoreMatch(query, text) {
  const q = normalizeStr(query), t = normalizeStr(text);
  if (!q || !t) return 0;
  if (t === q) return 100;
  if (t.startsWith(q)) return 80;
  const qTokens = q.split(" "), tTokens = t.split(" ");
  if (qTokens.length > 1 && qTokens.every(qt => tTokens.some(tt => tt.startsWith(qt)))) return 70;
  if (t.includes(q)) return 60;
  if (qTokens.every(qt => t.includes(qt))) return 50;
  if (qTokens.some(qt => tTokens.some(tt => tt.startsWith(qt) && qt.length >= 2))) return 30;
  return 0;
}

function rankCandidates(query, entries) {
  return entries
    .map(e => {
      const nameScore = scoreMatch(query, e.managerName);
      const teamScore = scoreMatch(query, e.teamName);
      return { ...e, score: Math.max(nameScore, teamScore) };
    })
    .filter(e => e.score > 0)
    .sort((a, b) => b.score - a.score || a.entryId - b.entryId);
}

// Local cache of previously seen teams (localStorage)
const TEAM_CACHE_KEY = "fpl_team_cache";

function getTeamCache() {
  try { return JSON.parse(localStorage.getItem(TEAM_CACHE_KEY) || "{}"); }
  catch { return {}; }
}

function cacheTeamEntries(entries) {
  try {
    const cache = getTeamCache();
    entries.forEach(e => { cache[e.entryId] = { m: e.managerName, t: e.teamName, ts: Date.now() }; });
    // Keep cache under 500 entries
    const keys = Object.keys(cache);
    if (keys.length > 500) {
      keys.sort((a, b) => cache[a].ts - cache[b].ts);
      keys.slice(0, keys.length - 500).forEach(k => delete cache[k]);
    }
    localStorage.setItem(TEAM_CACHE_KEY, JSON.stringify(cache));
  } catch {}
  // Also submit to server index (fire-and-forget)
  if (typeof submitToServerIndex === "function") {
    submitToServerIndex(entries);
  }
}

function searchTeamCache(query) {
  const cache = getTeamCache();
  const entries = Object.entries(cache).map(([id, d]) => ({
    entryId: Number(id), managerName: d.m, teamName: d.t, source: "cache"
  }));
  return rankCandidates(query, entries);
}

// Fetch all members of a league (paginated, up to ~500 members)
async function fetchLeagueMembers(leagueId) {
  const members = [];
  for (let page = 1; page <= 10; page++) {
    const res = await fetch("/api/leagues-classic/" + leagueId + "/standings/?page_standings=" + page);
    if (!res.ok) break;
    const data = await res.json();
    const results = data.standings?.results || [];
    results.forEach(r => {
      members.push({ entryId: r.entry, managerName: r.player_name, teamName: r.entry_name, source: "league" });
    });
    if (!data.standings?.has_next) break;
  }
  cacheTeamEntries(members);
  return members;
}

// Fetch entry basic info (validates ID exists)
async function fetchEntryBasic(id) {
  try {
    const res = await fetch("/api/entry/" + id + "/");
    if (!res.ok) return null;
    const d = await res.json();
    const entry = { entryId: d.id, managerName: d.player_first_name + " " + d.player_last_name, teamName: d.name, source: "direct" };
    cacheTeamEntries([entry]);
    return entry;
  } catch { return null; }
}

// Fetch private (mini) leagues for an entry
async function fetchEntryLeagues(entryId) {
  try {
    const res = await fetch("/api/entry/" + entryId + "/");
    if (!res.ok) return [];
    const d = await res.json();
    return (d.leagues?.classic || [])
      .filter(l => l.league_type === "x")
      .map(l => ({ id: l.id, name: l.name }));
  } catch { return []; }
}

// Search our server-side index (built from crawler + auto-indexed entries)
async function searchServerIndex(query) {
  try {
    const res = await fetch("/search-teams?q=" + encodeURIComponent(query) + "&limit=20");
    if (!res.ok) return [];
    const data = await res.json();
    return (data.results || []).map(r => ({
      entryId: r.entryId,
      managerName: r.managerName,
      teamName: r.teamName,
      score: r.score,
      source: r.source || "index",
      overallRank: r.overallRank || null,
      matchReason: r.matchReason || null,
      lastSeenAt: r.lastSeenAt || null,
      verificationLevel: r.verificationLevel != null ? r.verificationLevel : null,
    }));
  } catch { return []; }
}

// Submit teams to server index (fire-and-forget)
function submitToServerIndex(entries) {
  try {
    fetch("/index-teams", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(entries.map(e => ({
        entryId: e.entryId, managerName: e.managerName, teamName: e.teamName
      })))
    }).catch(() => {});
  } catch {}
}

// Main resolver: human-friendly input → { kind, candidates }
async function resolveTeamInput(query, leagueIds) {
  query = (query || "").trim();
  if (!query) return { kind: "none", candidates: [] };

  // 1. Direct entry ID
  if (/^\d+$/.test(query)) {
    const entry = await fetchEntryBasic(query);
    if (entry) return { kind: "exact", candidates: [entry] };
    return { kind: "none", candidates: [] };
  }

  // 2. URL parsing
  const urlId = parseEntryIdFromUrl(query);
  if (urlId) {
    const entry = await fetchEntryBasic(urlId);
    if (entry) return { kind: "exact", candidates: [entry] };
    return { kind: "none", candidates: [] };
  }

  // 3. Name/team search — query multiple sources in parallel
  const seen = new Set();
  let allCandidates = [];

  // Score merge rules:
  // - Server composite scores (verificationLevel != null) and raw text scores
  //   (cache/league, verificationLevel == null) are on different scales.
  // - Server scores already factor in text×0.6 + freshness + verification +
  //   confidence + rank. Raw text scores are 0-100 pure text similarity.
  // - When the same entry appears in both, server score wins because it's
  //   better calibrated. When both are unverified, higher score wins.
  function mergeCandidates(newCandidates) {
    for (const c of newCandidates) {
      if (!seen.has(c.entryId)) {
        seen.add(c.entryId);
        allCandidates.push({ ...c });
      } else {
        const existing = allCandidates.find(x => x.entryId === c.entryId);
        if (!existing) continue;

        const existingHasServer = existing.verificationLevel != null;
        const incomingHasServer = c.verificationLevel != null;

        // Score precedence: server composite > raw text
        if (incomingHasServer && !existingHasServer) {
          // Server result replacing cache/league — always take server score
          existing.score = c.score;
          existing.source = c.source;
          if (c.matchReason) existing.matchReason = c.matchReason;
        } else if (!existingHasServer && !incomingHasServer && c.score > existing.score) {
          // Both unverified — take higher raw score
          existing.score = c.score;
          existing.source = c.source;
          if (c.matchReason) existing.matchReason = c.matchReason;
        }
        // If existing is server-backed and incoming is cache/league:
        // do NOT overwrite score (raw scores inflate vs composite)

        // Always accumulate richer metadata regardless of score decision
        if (c.overallRank && !existing.overallRank) existing.overallRank = c.overallRank;
        if (c.lastSeenAt && (!existing.lastSeenAt || c.lastSeenAt > existing.lastSeenAt)) existing.lastSeenAt = c.lastSeenAt;
        if (c.verificationLevel != null && (existing.verificationLevel == null || c.verificationLevel > existing.verificationLevel)) existing.verificationLevel = c.verificationLevel;
      }
    }
  }

  // 3a. Search server index + local cache in parallel (fast)
  const [serverResults, cacheResults] = await Promise.all([
    searchServerIndex(query),
    Promise.resolve(searchTeamCache(query))
  ]);
  mergeCandidates(serverResults);
  mergeCandidates(cacheResults);

  // 3b. If server index returned strong results, skip league fetching
  const hasStrongResults = allCandidates.some(c => c.score >= 80);

  // 3c. Search through provided leagues (only if needed)
  if (!hasStrongResults && leagueIds && leagueIds.length > 0) {
    for (const lid of leagueIds) {
      const members = await fetchLeagueMembers(lid);
      mergeCandidates(rankCandidates(query, members));
    }
  }

  // Calibrate cache/league-only results to server composite scale.
  // Raw text scores (0-100) inflate vs composite scores (text×0.6 + signals).
  // Discount unverified results so they rank below equivalent server matches
  // but remain visible as fallbacks.
  for (const c of allCandidates) {
    if (c.verificationLevel == null) {
      // Cache/league-only: no server backing. Approximate composite scale.
      c.score = Math.round((c.score * 0.7 + 5) * 10) / 10;
    }
  }

  // Re-sort with calibrated scores
  allCandidates.sort((a, b) => b.score - a.score || a.entryId - b.entryId);
  allCandidates = allCandidates.slice(0, 20);

  if (allCandidates.length === 0) return { kind: "none", candidates: [] };
  if (allCandidates.length === 1 && allCandidates[0].score >= 80) return { kind: "exact", candidates: allCandidates };

  // Auto-select: if top candidate is verified, high-scoring, and clearly dominant
  if (allCandidates.length >= 2) {
    const top = allCandidates[0];
    const second = allCandidates[1];
    if (top.score >= 80 && top.verificationLevel >= 2 && (top.score - second.score) >= 20) {
      return { kind: "exact", candidates: allCandidates };
    }
  }

  return { kind: "multiple", candidates: allCandidates };
}

// 2025/26 introduced 2 of every chip (one per half of season, split at GW19)
// For older seasons: 2 wildcards, 1 of everything else
function buildAllChips(doubleChips) {
  if (doubleChips) return [
    { key: "wc1",        label: "Wildcard 1",       icon: "🔄", half: 1 },
    { key: "wc2",        label: "Wildcard 2",        icon: "🔄", half: 2 },
    { key: "3xc_h1",     label: "Triple Captain 1",  icon: "👑", half: 1 },
    { key: "3xc_h2",     label: "Triple Captain 2",  icon: "👑", half: 2 },
    { key: "bboost_h1",  label: "Bench Boost 1",     icon: "📈", half: 1 },
    { key: "bboost_h2",  label: "Bench Boost 2",     icon: "📈", half: 2 },
    { key: "freehit_h1", label: "Free Hit 1",        icon: "🆓", half: 1 },
    { key: "freehit_h2", label: "Free Hit 2",        icon: "🆓", half: 2 },
  ];
  return [
    { key: "wc1",     label: "Wildcard 1",     icon: "🔄" },
    { key: "wc2",     label: "Wildcard 2",     icon: "🔄" },
    { key: "3xc",     label: "Triple Captain", icon: "👑" },
    { key: "bboost",  label: "Bench Boost",    icon: "📈" },
    { key: "freehit", label: "Free Hit",       icon: "🆓" },
  ];
}

function chipKey(chip, doubleChips) {
  if (chip.name === "wildcard") return chip.event <= 19 ? "wc1" : "wc2";
  if (doubleChips) return chip.name + (chip.event <= 19 ? "_h1" : "_h2");
  return chip.name;
}

function formatChip(chip, doubleChips) {
  let name = CHIP_NAMES[chip.name] || chip.name;
  if (chip.name === "wildcard") name = chip.event <= 19 ? "Wildcard 1" : "Wildcard 2";
  else if (doubleChips) name += chip.event <= 19 ? " 1" : " 2";
  return name + " · GW" + chip.event;
}

// ── Data Fetching ─────────────────────────────────────────────────

async function fplFetch(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error("FPL API error " + res.status + " for " + path);
  return res.json();
}

async function fetchBootstrap() {
  const data = await fplFetch("/api/bootstrap-static/");
  const playerMap = {};
  for (const p of data.elements) playerMap[p.id] = p;
  return { playerMap };
}

async function fetchTeamData(teamId, playerMap, onProgress) {
  const report = (msg, pct) => { if (onProgress) onProgress(msg, pct); };
  const [entry, history] = await Promise.all([
    fplFetch("/api/entry/" + teamId + "/"),
    fplFetch("/api/entry/" + teamId + "/history/"),
  ]);

  const current = history.current || [];
  const latestGW = current.length;
  const highestGw = current.reduce((b, g) => g.points > (b?.points || 0) ? g : b, null);

  // Detect 2025/26+ double-chip season: most recent past season is "2024/25"
  const pastSeasons = (history.past || []).map(s => s.season_name);
  const doubleChips = pastSeasons.includes("2024/25") ||
    (history.chips || []).filter(c => c.name !== "wildcard")
      .some((c, _, arr) => arr.filter(x => x.name === c.name).length > 1);
  const ALL_CHIPS = buildAllChips(doubleChips);

  let squadStats = { goals: 0, assists: 0, cleanSheets: 0, yellowCards: 0, redCards: 0, bonus: 0 };
  let top5 = { goals: [], assists: [], cleanSheets: [], bonus: [] };
  let bestGwPlayer = null;
  let chipResults = [];
  let unusedChips = [];
  let positionPoints = { gk: 0, def: 0, mid: 0, fwd: 0, benchPts: 0, captainPts: 0 };
  let captainHistory = [];
  let currentSquad = [];
  let headCount = 0;

  if (latestGW > 0) {
    try {
      // 1. Fetch all GW picks in parallel
      report("Fetching " + latestGW + " gameweeks...", 35);
      const allPicksData = await Promise.all(
        Array.from({ length: latestGW }, (_, i) =>
          fplFetch("/api/entry/" + teamId + "/event/" + (i + 1) + "/picks/").catch(() => null)
        )
      );
      report("Analysing squads...", 55);

      // 2. Build map: playerId -> Set of GWs in starting XI; also track all bench players
      const starterGWs = {};
      const benchGWs = {}; // all 4 bench slots
      allPicksData.forEach((data, idx) => {
        if (!data) return;
        const gw = idx + 1;
        (data.picks || []).forEach(p => {
          if (p.position <= 11) {
            if (!starterGWs[p.element]) starterGWs[p.element] = new Set();
            starterGWs[p.element].add(gw);
          } else {
            // bench slot (positions 12-15)
            if (!benchGWs[p.element]) benchGWs[p.element] = new Set();
            benchGWs[p.element].add(gw);
          }
        });
      });

      // 3. Identify extra player IDs needed for chip detail + bench players not in starters
      const extraPlayerIds = new Set();
      (history.chips || []).forEach(chip => {
        const gwPicks = allPicksData[chip.event - 1];
        if (!gwPicks) return;
        let relevant = [];
        if (chip.name === "bboost")   relevant = (gwPicks.picks || []).filter(p => p.position >= 12);
        else if (chip.name === "3xc") relevant = (gwPicks.picks || []).filter(p => p.multiplier === 3);
        else if (chip.name === "freehit") relevant = (gwPicks.picks || []).filter(p => p.position <= 11);
        relevant.forEach(p => {
          if (!starterGWs[p.element]) extraPlayerIds.add(String(p.element));
        });
      });
      // Bench players not already in starters
      Object.keys(benchGWs).forEach(id => {
        if (!starterGWs[id]) extraPlayerIds.add(String(id));
      });

      // 4. Fetch element-summaries: starters + chip-detail extras
      const uniqueStarterIds = Object.keys(starterGWs);
      const extraIds = [...extraPlayerIds];
      report("Fetching " + (uniqueStarterIds.length + extraIds.length) + " player stats...", 60);
      const [starterSummaries, extraSummaries] = await Promise.all([
        Promise.all(uniqueStarterIds.map(id => fplFetch("/api/element-summary/" + id + "/").catch(() => null))),
        Promise.all(extraIds.map(id => fplFetch("/api/element-summary/" + id + "/").catch(() => null))),
      ]);
      report("Crunching numbers...", 85);

      // 5. Build playerGwPoints: { playerId: { gwNum: totalPoints } }
      const playerGwPoints = {};
      const processPlayerSummary = (summary, pid) => {
        if (!summary) return;
        if (!playerGwPoints[pid]) playerGwPoints[pid] = {};
        (summary.history || []).forEach(h => { playerGwPoints[pid][h.round] = (playerGwPoints[pid][h.round] || 0) + h.total_points; });
      };
      starterSummaries.forEach((s, i) => processPlayerSummary(s, uniqueStarterIds[i]));
      extraSummaries.forEach((s, i) => processPlayerSummary(s, extraIds[i]));

      // 6. Accumulate per-player season stats (starters only)
      const playerAccStats = {};
      starterSummaries.forEach((summary, idx) => {
        if (!summary) return;
        const pid = uniqueStarterIds[idx];
        const gwsStarted = starterGWs[pid];
        const info = playerMap[pid];
        const name = info?.web_name || "Unknown";
        const elementType = info?.element_type || 0; // 1=GK 2=DEF 3=MID 4=FWD
        if (!playerAccStats[pid]) {
          playerAccStats[pid] = { name, elementType, goals: 0, assists: 0, cleanSheets: 0, bonus: 0, yellow: 0, red: 0, bestGwPts: 0, bestGwNum: 0, totalPts: 0 };
        }
        (summary.history || []).forEach(gw => {
          if (!gwsStarted.has(gw.round)) return;
          playerAccStats[pid].goals       += gw.goals_scored || 0;
          playerAccStats[pid].assists     += gw.assists       || 0;
          playerAccStats[pid].cleanSheets += gw.clean_sheets  || 0;
          playerAccStats[pid].bonus       += gw.bonus         || 0;
          playerAccStats[pid].yellow      += gw.yellow_cards  || 0;
          playerAccStats[pid].red         += gw.red_cards     || 0;
          playerAccStats[pid].totalPts    += gw.total_points  || 0;
        });
      });
      // Best GW per player — use playerGwPoints which correctly sums DGW fixtures
      Object.entries(playerAccStats).forEach(([pid, stats]) => {
        const gwPts = playerGwPoints[pid];
        if (!gwPts) return;
        const gwsStarted = starterGWs[pid];
        Object.entries(gwPts).forEach(([gw, pts]) => {
          if (gwsStarted && !gwsStarted.has(Number(gw))) return;
          if (pts > stats.bestGwPts) { stats.bestGwPts = pts; stats.bestGwNum = Number(gw); }
        });
      });

      const players = Object.values(playerAccStats);

      const topN = (key) => players
        .filter(p => p[key] > 0)
        .sort((a, b) => b[key] - a[key])
        .slice(0, 5)
        .map(p => ({ name: p.name, [key]: p[key] }));
      players.forEach(p => {
        squadStats.goals       += p.goals;
        squadStats.assists     += p.assists;
        squadStats.cleanSheets += p.cleanSheets;
        squadStats.bonus       += p.bonus;
        squadStats.yellowCards += p.yellow;
        squadStats.redCards    += p.red;
        if (p.elementType === 1) positionPoints.gk  += p.totalPts;
        if (p.elementType === 2) positionPoints.def += p.totalPts;
        if (p.elementType === 3) positionPoints.mid += p.totalPts;
        if (p.elementType === 4) positionPoints.fwd += p.totalPts;
      });

      // Bench points — all 4 bench slots, all GWs
      // Check extra summaries (bench players not in starters)
      extraSummaries.forEach((summary, idx) => {
        if (!summary) return;
        const pid = extraIds[idx];
        if (!benchGWs[pid]) return;
        const gwsOnBench = benchGWs[pid];
        (summary.history || []).forEach(gw => {
          if (!gwsOnBench.has(gw.round)) return;
          positionPoints.benchPts += gw.total_points || 0;
        });
      });
      // Also starters who appeared on bench in some GWs
      starterSummaries.forEach((summary, idx) => {
        if (!summary) return;
        const pid = uniqueStarterIds[idx];
        if (!benchGWs[pid]) return;
        const gwsOnBench = benchGWs[pid];
        (summary.history || []).forEach(gw => {
          if (!gwsOnBench.has(gw.round)) return;
          positionPoints.benchPts += gw.total_points || 0;
        });
      });

      // Captain points (1x raw — bonus on top of position total)
      allPicksData.forEach((data, idx) => {
        if (!data) return;
        const gw = idx + 1;
        const cap = (data.picks || []).find(p => p.is_captain);
        if (!cap) return;
        const pid = String(cap.element);
        const pts = playerGwPoints[pid]?.[gw] ?? 0;
        positionPoints.captainPts += pts;
      });
      top5 = { goals: topN("goals"), assists: topN("assists"), cleanSheets: topN("cleanSheets"), bonus: topN("bonus") };
      bestGwPlayer = players.reduce((b, p) => p.bestGwPts > (b?.bestGwPts||0) ? p : b, null);

      // 7b. Captain history + what-if optimal
      allPicksData.forEach((data, idx) => {
        if (!data) return;
        const gw = idx + 1;
        const starters = (data.picks || []).filter(p => p.position <= 11);
        const cap = starters.find(p => p.is_captain);
        if (!cap) return;
        const capPts = playerGwPoints[String(cap.element)]?.[gw] ?? 0;
        let optPid = cap.element, optPts = capPts;
        starters.forEach(p => {
          const pts = playerGwPoints[String(p.element)]?.[gw] ?? 0;
          if (pts > optPts) { optPid = p.element; optPts = pts; }
        });
        captainHistory.push({
          gw, captainId: cap.element, captainName: playerMap[cap.element]?.web_name || "Unknown",
          captainPts: capPts, optimalName: playerMap[optPid]?.web_name || "Unknown",
          optimalPts: optPts, wasOptimal: cap.element === optPid
        });
      });

      // 7c. Current squad from latest GW
      const latestPicks = allPicksData[latestGW - 1];
      if (latestPicks) {
        currentSquad = (latestPicks.picks || []).map(p => ({
          id: p.element, name: playerMap[p.element]?.web_name || "Unknown",
          position: p.position, elementType: playerMap[p.element]?.element_type || 0
        }));
      }

      // 7a. Head count (unique players used in starting XI)
      const uniquePlayerIds = new Set();
      allPicksData.forEach(data => { if(data)(data.picks||[]).filter(p=>p.position<=11).forEach(p=>uniquePlayerIds.add(p.element)); });
      headCount = uniquePlayerIds.size;

      // 7. Build enhanced chip results
      chipResults = (history.chips || []).map(chip => {
        const gwPicks = allPicksData[chip.event - 1];
        const gwTotal = current.find(g => g.event === chip.event)?.points ?? null;
        let detail = [], extraPoints = null;

        if (chip.name === "bboost" && gwPicks) {
          const bench = (gwPicks.picks || []).filter(p => p.position >= 12);
          detail = bench.map(p => ({
            name: playerMap[p.element]?.web_name || "Unknown",
            points: playerGwPoints[String(p.element)]?.[chip.event] ?? 0,
          }));
          extraPoints = detail.reduce((s, p) => s + p.points, 0);

        } else if (chip.name === "3xc" && gwPicks) {
          const cap = (gwPicks.picks || []).find(p => p.multiplier === 3);
          if (cap) {
            const raw = playerGwPoints[String(cap.element)]?.[chip.event] ?? 0;
            detail = [{ name: playerMap[cap.element]?.web_name || "Unknown", points: raw }];
            extraPoints = raw; // extra vs normal ×2 captain
          }

        } else if (chip.name === "freehit" && gwPicks) {
          detail = (gwPicks.picks || [])
            .filter(p => p.position <= 11)
            .map(p => ({
              name: playerMap[p.element]?.web_name || "Unknown",
              points: playerGwPoints[String(p.element)]?.[chip.event] ?? 0,
            }))
            .sort((a,b) => b.points - a.points)
            .slice(0, 5);
        }

        return { label: formatChip(chip, doubleChips), name: chip.name, event: chip.event, gw: chip.event, points: gwTotal, detail, extraPoints };
      });

      // 8. Unused chips
      const usedKeys = new Set((history.chips || []).map(c => chipKey(c, doubleChips)));
      unusedChips = ALL_CHIPS.filter(c => !usedKeys.has(c.key));

    } catch(e) { /* stats unavailable */ }
  }

  const seasons = (history.past || []).map(s => ({
    season: s.season_name, totalPoints: s.total_points, rank: s.rank,
  })).reverse(); // most recent first

  return {
    id: teamId,
    name: entry.name,
    manager: entry.player_first_name + " " + entry.player_last_name,
    totalPoints: entry.summary_overall_points,
    overallRank: entry.summary_overall_rank,
    teamValue: entry.last_deadline_value,
    transfersTotal: entry.last_deadline_total_transfers,
    transferCost: current.reduce((s, g) => s + (g.event_transfers_cost||0), 0),
    currentGwPoints: entry.summary_event_points,
    highestGwPoints: highestGw?.points || null,
    highestGwNumber: highestGw?.event  || null,
    chipResults, unusedChips, doubleChips, seasons, squadStats, top5, bestGwPlayer, positionPoints, captainHistory, currentSquad,
    gwHistory: current.map(g => ({ gw: g.event, points: g.points, totalPoints: g.total_points, overallRank: g.overall_rank, transfers: g.event_transfers || 0, hitCost: g.event_transfers_cost || 0 })),
    consistency: stdDev(current.map(g => g.points)),
    rankDelta: current.length >= 2 ? (current[current.length-2].overall_rank||0) - (current[current.length-1].overall_rank||0) : 0,
    pointsPerMillion: entry.summary_overall_points && entry.last_deadline_value ? ((entry.summary_overall_points / (entry.last_deadline_value / 10)).toFixed(1)) : null,
    seasonCount: (history.past || []).length + 1,
    avgPointsPerGW: current.length ? Math.round(current.reduce((s,g)=>s+g.points,0)/current.length) : 0,
    netPoints: entry.summary_overall_points - current.reduce((s,g)=>s+(g.event_transfers_cost||0),0),
    greenArrows: current.filter((g,i,a) => i>0 && g.overall_rank < a[i-1].overall_rank).length,
    redArrows: current.filter((g,i,a) => i>0 && g.overall_rank > a[i-1].overall_rank).length,
    avgRank: current.filter(g=>g.overall_rank).length ? Math.round(current.filter(g=>g.overall_rank).reduce((s,g)=>s+g.overall_rank,0)/current.filter(g=>g.overall_rank).length) : null,
    bestFiveGWs: [...current].sort((a,b)=>b.points-a.points).slice(0,5).map(g=>({gw:g.event,pts:g.points})),
    worstFiveGWs: [...current].sort((a,b)=>a.points-b.points).slice(0,5).map(g=>({gw:g.event,pts:g.points})),
    projectedFinalPoints: current.length ? Math.round((entry.summary_overall_points / current.length) * 38) : null,
    headCount,
    pointStreakMax: (() => { if(!current.length) return 0; const avg=current.reduce((s,g)=>s+g.points,0)/current.length; let cur=0,max=0; current.forEach(g=>{if(g.points>=avg){cur++;max=Math.max(max,cur);}else cur=0;}); return max; })(),
    managerStyle: (() => { const xpg = current.length?(entry.last_deadline_total_transfers/current.length):0; if(xpg>1.5)return "Tinkerer"; if(xpg>1)return "Active"; if(xpg>0.6)return "Balanced"; return "Set-and-Forget"; })(),
  };
}

function buildH2H(t1, t2) {
  const map2 = Object.fromEntries(t2.gwHistory.map(g => [g.gw, g.points]));
  let team1Wins = 0, team2Wins = 0, draws = 0;
  const gwResults = t1.gwHistory.map(g => {
    const p2 = map2[g.gw];
    if (p2 == null) return null;
    const winner = g.points > p2 ? "team1" : p2 > g.points ? "team2" : "draw";
    if (winner === "team1") team1Wins++; else if (winner === "team2") team2Wins++; else draws++;
    return { gw: g.gw, team1Points: g.points, team2Points: p2, winner };
  }).filter(Boolean);
  // Lucky wins (won by <=3 pts)
  const lucky1 = gwResults.filter(g=>g.winner==="team1"&&Math.abs(g.team1Points-g.team2Points)<=3).length;
  const lucky2 = gwResults.filter(g=>g.winner==="team2"&&Math.abs(g.team1Points-g.team2Points)<=3).length;
  // Unlucky losses (lost by <=3 pts)
  const unlucky1 = gwResults.filter(g=>g.winner==="team2"&&Math.abs(g.team1Points-g.team2Points)<=3).length;
  const unlucky2 = gwResults.filter(g=>g.winner==="team1"&&Math.abs(g.team1Points-g.team2Points)<=3).length;
  // Comeback wins (trailing on cumulative then won the GW)
  let cum=0, cb1=0, cb2=0;
  gwResults.forEach(g=>{
    if(cum<0&&g.winner==="team1") cb1++;
    if(cum>0&&g.winner==="team2") cb2++;
    cum+=g.team1Points-g.team2Points;
  });
  // Longest unbeaten run
  const unbeaten=(side)=>{let c=0,m=0;gwResults.forEach(g=>{if(g.winner!==side){c++;m=Math.max(m,c);}else c=0;});return Math.max(m,c);};
  const ub1=unbeaten("team2"), ub2=unbeaten("team1");
  // GW win percentages
  const total = gwResults.length||1;
  return { team1Wins, team2Wins, draws, gwResults, lucky1, lucky2, unlucky1, unlucky2, comebackWins1:cb1, comebackWins2:cb2, longestUnbeaten1:ub1, longestUnbeaten2:ub2, gwWinPct1:Math.round(team1Wins/total*100), gwWinPct2:Math.round(team2Wins/total*100) };
}

function StatRow({ label, val1, val2, lowerIsBetter }) {
  const n1 = Math.abs(parseFloat(String(val1??"").replace(/[^0-9.-]/g,"")));
  const n2 = Math.abs(parseFloat(String(val2??"").replace(/[^0-9.-]/g,"")));
  const AMBER = "#F59E0B";
  let b = 0;
  const tied = !isNaN(n1) && !isNaN(n2) && n1===n2;
  if (!isNaN(n1) && !isNaN(n2) && n1!==n2) b = lowerIsBetter ? (n1<n2?1:2) : (n1>n2?1:2);
  const col1 = b===1 ? C1 : b===2&&lowerIsBetter ? "#EF4444" : tied ? AMBER : "#CBD5E1";
  const col2 = b===2 ? C2 : b===1&&lowerIsBetter ? "#EF4444" : tied ? AMBER : "#CBD5E1";
  const sh1  = b===1 ? "0 0 14px #00FF8766" : b===2&&lowerIsBetter ? "0 0 12px rgba(239,68,68,.3)" : tied ? "0 0 12px rgba(245,158,11,.3)" : "none";
  const sh2  = b===2 ? "0 0 14px #38B6FF66" : b===1&&lowerIsBetter ? "0 0 12px rgba(239,68,68,.3)" : tied ? "0 0 12px rgba(245,158,11,.3)" : "none";
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr var(--stat-col) 1fr", alignItems:"center", padding:"9px 0", borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:"var(--stat-font)", fontWeight:600, color:col1, textAlign:"right", paddingRight:16, textShadow:sh1 }}>{val1!=null?val1:"—"}</div>
      <div style={{ fontSize:"var(--stat-label)", fontWeight:700, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.09em", textAlign:"center" }}>{label}</div>
      <div style={{ fontFamily:"'DM Mono',monospace", fontSize:"var(--stat-font)", fontWeight:600, color:col2, paddingLeft:16, textShadow:sh2 }}>{val2!=null?val2:"—"}</div>
    </div>
  );
}

function Tag({ msg, color }) {
  return (
    <div style={{ display:"inline-block", marginBottom:12, fontSize:9, fontWeight:700, background:"#0D1829", border:"1px solid "+color+"60", borderRadius:4, padding:"3px 8px", color:color, letterSpacing:"0.07em", textTransform:"uppercase", lineHeight:1.4 }}>{msg}</div>
  );
}
function pickTag(options) { return options[Math.floor(Math.random()*options.length)]; }

function H2HTag({ t1, t2, h2h }) {
  const total = h2h.team1Wins + h2h.team2Wins + h2h.draws || 1;
  const r1 = h2h.team1Wins/total, r2 = h2h.team2Wins/total, dr = h2h.draws/total;
  const gap = Math.abs(r1-r2), winGap = Math.abs(h2h.team1Wins - h2h.team2Wins);
  if (r1>=0.6) return <Tag msg={pickTag(["👊 "+t1.name+" DOMINATES","💪 "+t1.name+"'S H2H RECORD IS FORMIDABLE","🏆 "+t1.name+" HAS THE UPPER HAND"])} color={C1}/>;
  if (r2>=0.6) return <Tag msg={pickTag(["👊 "+t2.name+" DOMINATES","💪 "+t2.name+"'S H2H RECORD IS FORMIDABLE","🏆 "+t2.name+" HAS THE UPPER HAND"])} color={C2}/>;
  if (dr>=0.4) return <Tag msg={pickTag(["🤝 THESE TWO ARE INSEPARABLE","⚖️ TOO CLOSE TO CALL","🔁 DRAWS DOMINATE THIS RIVALRY"])} color="#94A3B8"/>;
  const leader=r1>r2?t1:t2, lc=r1>r2?C1:C2;
  if (gap>=0.12||winGap>=3) return <Tag msg={pickTag(["📈 "+leader.name+" EDGES IT","✅ "+leader.name+" HAS A CLEAR EDGE","💪 "+leader.name+" HAS THE BETTER RECORD"])} color={lc}/>;
  return <Tag msg={pickTag(["⚔️ EVENLY MATCHED","🎯 A TRUE RIVALRY","🔥 NECK AND NECK RECORD"])} color="#94A3B8"/>;
}

function BestGWTag({ t1, t2 }) {
  const p1=t1.bestGwPlayer, p2=t2.bestGwPlayer;
  if (!p1||!p2) return null;
  const diff=Math.abs(p1.bestGwPts-p2.bestGwPts);
  const big=p1.bestGwPts>p2.bestGwPts?p1:p2, bc=p1.bestGwPts>p2.bestGwPts?C1:C2;
  const maxScore=Math.max(p1.bestGwPts,p2.bestGwPts);
  if (maxScore>=25) return <Tag msg={pickTag(["⚡ "+big.name+" WAS UNSTOPPABLE","🚀 WHAT A HAUL FROM "+big.name,"💥 "+big.name+" WENT OFF"])} color={bc}/>;
  if (diff>=8) return <Tag msg={pickTag(["📈 "+big.name+" TAKES THIS ONE EASILY","🥇 "+big.name+" STANDS OUT"])} color={bc}/>;
  if (diff<=2) return <Tag msg={pickTag(["🔥 ALMOST IDENTICAL BEST GWS","🤏 NOTHING BETWEEN THEM","⚖️ MATCHED PEAK PERFORMANCES"])} color="#94A3B8"/>;
  return <Tag msg={pickTag(["⭐ "+big.name+" JUST EDGES IT","🎖️ "+big.name+" WON THE GW"])} color={bc}/>;
}

function SquadStatsTag({ t1, t2 }) {
  const g1=t1.squadStats, g2=t2.squadStats;
  let score1=0, score2=0;
  if(g1.goals>g2.goals) score1++; else if(g2.goals>g1.goals) score2++;
  if(g1.assists>g2.assists) score1++; else if(g2.assists>g1.assists) score2++;
  if(g1.cleanSheets>g2.cleanSheets) score1++; else if(g2.cleanSheets>g1.cleanSheets) score2++;
  if(g1.bonus>g2.bonus) score1++; else if(g2.bonus>g1.bonus) score2++;
  const winner=score1>score2?1:score2>score1?2:0;
  const wT=winner===1?t1:t2, wC=winner===1?C1:C2;
  const cards1=g1.yellowCards+(g1.redCards*3), cards2=g2.yellowCards+(g2.redCards*3);
  if (Math.abs(cards1-cards2)>=4) {
    const dirtier=cards1>cards2?t1:t2, dc=cards1>cards2?C1:C2;
    return <Tag msg={pickTag(["🟨 "+dirtier.name+"'S SQUAD HAS DISCIPLINE ISSUES","😤 "+dirtier.name+" CAN'T KEEP THEIR COOL","🟥 "+dirtier.name+" ARE A LIABILITY"])} color={dc}/>;
  }
  if (winner!==0 && Math.max(score1,score2)>=3) {
    if(g1.goals>g2.goals*1.3||g2.goals>g1.goals*1.3){const gc=g1.goals>g2.goals?C1:C2,gt=g1.goals>g2.goals?t1:t2;return <Tag msg={pickTag(["🎯 "+gt.name+" ARE CLINICAL","⚽ "+gt.name+" CAN'T STOP SCORING"])} color={gc}/>;}
    if(g1.cleanSheets>g2.cleanSheets*1.4||g2.cleanSheets>g1.cleanSheets*1.4){const dc=g1.cleanSheets>g2.cleanSheets?C1:C2,dt=g1.cleanSheets>g2.cleanSheets?t1:t2;return <Tag msg={pickTag(["🧱 "+dt.name+"'S DEFENCE IS SOLID","🔒 "+dt.name+" ARE LOCKED AT THE BACK"])} color={dc}/>;}
    return <Tag msg={pickTag(["📈 "+wT.name+" WIN ON MOST COUNTS","✅ "+wT.name+" HAVE THE STRONGER SQUAD STATS","💪 "+wT.name+" DOMINATE THE NUMBERS"])} color={wC}/>;
  }
  const diffs=[
    {diff:Math.abs(g1.goals-g2.goals),side:g1.goals>g2.goals?1:2,msgs:(t)=>["⚽ "+t.name+" EDGE THE GOALS","🎯 "+t.name+" SCORE MORE"]},
    {diff:Math.abs(g1.assists-g2.assists),side:g1.assists>g2.assists?1:2,msgs:(t)=>["🎯 "+t.name+" CREATE MORE","🔑 "+t.name+" ARE MORE CREATIVE"]},
    {diff:Math.abs(g1.cleanSheets-g2.cleanSheets),side:g1.cleanSheets>g2.cleanSheets?1:2,msgs:(t)=>["🧤 "+t.name+" KEEP MORE CLEAN SHEETS","🧱 "+t.name+" ARE TIGHTER DEFENSIVELY"]},
    {diff:Math.abs(g1.bonus-g2.bonus),side:g1.bonus>g2.bonus?1:2,msgs:(t)=>["⭐ "+t.name+" EARN MORE BONUS","🌟 "+t.name+" PICK UP MORE BONUS POINTS"]},
  ].sort((a,b)=>b.diff-a.diff)[0];
  const bt=diffs.side===1?t1:t2, bc=diffs.side===1?C1:C2;
  return <Tag msg={pickTag(diffs.msgs(bt))} color={bc}/>;
}

function PositionTag({ t1, t2 }) {
  const pp1=t1.positionPoints, pp2=t2.positionPoints;
  const cats=[
    {k:"gk",label:(t)=>["🧤 "+t.name+"'S GK IS MAKING THE DIFFERENCE","🥅 SAFE HANDS PAYING OFF FOR "+t.name]},
    {k:"def",label:(t)=>["🛡️ "+t.name+"'S DEFENCE IS DOMINANT","🧱 "+t.name+" ARE SOLID AT THE BACK","🔒 "+t.name+" WIN IT DEFENSIVELY"]},
    {k:"mid",label:(t)=>["⚙️ "+t.name+"'S MIDFIELD IS THE DIFFERENCE","🔧 "+t.name+" ARE WINNING THE MIDFIELD BATTLE"]},
    {k:"fwd",label:(t)=>["⚔️ "+t.name+"'S ATTACK IS LETHAL","🗡️ "+t.name+" ARE CLINICAL UP FRONT"]},
    {k:"captainPts",label:(t)=>["©️ "+t.name+"'S ARMBAND IS PAYING OFF","👑 "+t.name+" HAS INSPIRED CAPTAINCY"]},
  ];
  let score1=0,score2=0,biggestDiff=0,biggestCat=null;
  cats.forEach(cat=>{
    const v1=pp1[cat.k]||0,v2=pp2[cat.k]||0;
    if(v1>v2)score1++;else if(v2>v1)score2++;
    const diff=Math.abs(v1-v2);
    if(diff>biggestDiff){biggestDiff=diff;biggestCat={...cat,side:v1>v2?1:2};}
  });
  const winner=score1>score2?1:score2>score1?2:0;
  const wT=winner===1?t1:t2, wC=winner===1?C1:C2;
  if(winner!==0&&Math.max(score1,score2)>=4) return <Tag msg={pickTag(["💪 "+wT.name+" WIN ACROSS THE PITCH","📈 "+wT.name+" DOMINATE EVERY LINE","✅ "+wT.name+" ARE STRONGER IN ALMOST EVERY POSITION"])} color={wC}/>;
  if(biggestCat){const bt=biggestCat.side===1?t1:t2,bc=biggestCat.side===1?C1:C2;return <Tag msg={pickTag(biggestCat.label(bt))} color={bc}/>;}
  return null;
}

function SeasonHistoryTag({ t1, t2 }) {
  const s1=t1.seasons||[], s2=t2.seasons||[];
  if(!s1.length||!s2.length) return null;
  const trend=(seasons)=>{
    if(seasons.length<3)return 0;
    const [a,b,c]=seasons.slice(0,3);
    if(a.totalPoints>b.totalPoints&&b.totalPoints>c.totalPoints)return 1;
    if(a.totalPoints<b.totalPoints&&b.totalPoints<c.totalPoints)return -1;
    return 0;

  const t1t=trend(s1),t2t=trend(s2);

  if(t1t===1&&t2t!==1) return <Tag msg={pickTag(["🚀 "+t1.name+" IS ON THE UP","📈 "+t1.name+" IS IMPROVING YEAR ON YEAR","⬆️ "+t1.name+"'S BEST YEARS AHEAD"])} color={C1}/>;
  if(t2t===1&&t1t!==1) return <Tag msg={pickTag(["🚀 "+t2.name+" IS ON THE UP","📈 "+t2.name+" IS IMPROVING YEAR ON YEAR","⬆️ "+t2.name+"'S BEST YEARS AHEAD"])} color={C2}/>;
  if(t1t===-1&&t2t!==-1) return <Tag msg={pickTag(["📉 "+t1.name+" IS DECLINING","😬 "+t1.name+"'S FORM IS FADING","⬇️ TOUGH TIMES FOR "+t1.name])} color={C1}/>;

// ── Rank Trend Tag ────────────────────────────────────────────────

function RankTrendTag({ t1, t2 }) {
  const last = 5;
  const gws1 = t1.gwHistory.filter(g => g.overallRank).slice(-last);
  const gws2 = t2.gwHistory.filter(g => g.overallRank).slice(-last);
  if (gws1.length < 2 || gws2.length < 2) return null;

  const trend = (gws) => gws[0].overallRank - gws[gws.length - 1].overallRank; // positive = improving (rank dropping)
  const t1t = trend(gws1), t2t = trend(gws2);
  const latestR1 = gws1[gws1.length - 1].overallRank, latestR2 = gws2[gws2.length - 1].overallRank;
  const prevR1 = gws1[0].overallRank, prevR2 = gws2[0].overallRank;

  // Detect overtake: one was ahead at start of window but behind now
  const wasAhead1 = prevR1 < prevR2, nowAhead1 = latestR1 < latestR2;
  if (wasAhead1 !== nowAhead1 && prevR1 !== prevR2 && latestR1 !== latestR2) {
    const overtaker = nowAhead1 ? t1 : t2, oc = nowAhead1 ? C1 : C2;
    return <Tag msg={pickTag(["🔄 " + overtaker.name + " HAS OVERTAKEN", "⚡ " + overtaker.name + " JUST MOVED AHEAD", "📈 " + overtaker.name + " CLIMBED PAST"])} color={oc}/>;
  }

  // Gap closing
  const prevGap = Math.abs(prevR1 - prevR2), nowGap = Math.abs(latestR1 - latestR2);
  if (prevGap > 0 && nowGap < prevGap * 0.5) {
    const chaser = latestR1 > latestR2 ? t1 : t2, cc = latestR1 > latestR2 ? C1 : C2;
    return <Tag msg={pickTag(["📉 THE GAP IS CLOSING", "🔥 " + chaser.name + " IS REELING THEM IN", "⬆️ " + chaser.name + " IS CLOSING THE GAP"])} color={cc}/>;
  }

  // Gap widening
  if (prevGap > 0 && nowGap > prevGap * 1.5) {
    const leader = latestR1 < latestR2 ? t1 : t2, lc = latestR1 < latestR2 ? C1 : C2;
    return <Tag msg={pickTag(["💨 " + leader.name + " IS PULLING AWAY", "📈 " + leader.name + " IS EXTENDING THE LEAD", "🏃 " + leader.name + " IS STRETCHING AHEAD"])} color={lc}/>;
  }

  // Neck and neck
  if (nowGap < Math.max(latestR1, latestR2) * 0.02) {
    return <Tag msg={pickTag(["🤝 NECK AND NECK IN THE RANKINGS", "⚖️ INSEPARABLE IN THE TABLE", "🔥 TOO CLOSE TO SPLIT"])} color="#94A3B8"/>;
  }

  // Big climber
  if (t1t > 0 && t1t > t2t) return <Tag msg={pickTag(["🚀 " + t1.name + " IS CLIMBING FAST", "📈 " + t1.name + " IS ON THE RISE"])} color={C1}/>;
  if (t2t > 0 && t2t > t1t) return <Tag msg={pickTag(["🚀 " + t2.name + " IS CLIMBING FAST", "📈 " + t2.name + " IS ON THE RISE"])} color={C2}/>;

  const leader = latestR1 < latestR2 ? t1 : t2, lc = latestR1 < latestR2 ? C1 : C2;
  return <Tag msg={pickTag(["📊 " + leader.name + " HOLDS THE HIGHER RANK", "🏅 " + leader.name + " SITS ABOVE"])} color={lc}/>;
}

// ── Overall Rank Chart ────────────────────────────────────────────

function fmtRank(r) {
  if (r >= 1000000) return (r/1000000).toFixed(1).replace(/\.0$/,"") + "m";
  if (r >= 1000)    return Math.round(r/1000) + "k";
  return String(r);
}

function OverallRankChart({ t1, t2 }) {
  const map1 = Object.fromEntries(t1.gwHistory.filter(g=>g.overallRank).map(g => [g.gw, g.overallRank]));
  const map2 = Object.fromEntries(t2.gwHistory.filter(g=>g.overallRank).map(g => [g.gw, g.overallRank]));
  const maxGW = Math.max(...t1.gwHistory.map(g=>g.gw), ...t2.gwHistory.map(g=>g.gw), 1);
  const allRanks = [...Object.values(map1), ...Object.values(map2)].filter(Boolean);
  if (!allRanks.length) return null;

  // Worst rank = highest number = bottom of chart; best rank = lowest number = top
  const worstRank = Math.max(...allRanks);
  const bestRank  = Math.min(...allRanks);
  const pad = (worstRank - bestRank) * 0.08 || worstRank * 0.1;
  const lo = Math.max(1, bestRank - pad);   // top of chart (best)
  const hi = worstRank + pad;               // bottom of chart (worst)
  const range = hi - lo || 1;

  const W=560, H=120, PL=46, PR=10, PT=8, PB=20;
  const iW = W-PL-PR, iH = H-PT-PB;
  const xOf = gw  => PL + ((gw-1)/(maxGW-1||1))*iW;
  // rank is inverted: lower rank number = higher on chart
  const yOf = rank => PT + ((rank - lo) / range) * iH;

  const pathFor = (map) => {
    const gws = Array.from({length:maxGW},(_,i)=>i+1).filter(gw=>map[gw]!=null);
    return gws.map((gw,i) => `${i===0?"M":"L"}${xOf(gw).toFixed(1)},${yOf(map[gw]).toFixed(1)}`).join(" ");
  };

  // Y ticks: best, mid, worst — shown as rank labels
  const yTicks = [lo, Math.round(lo + range*0.5), hi].map(Math.round);
  const xTicks = [...new Set([1, ...Array.from({length:maxGW},(_,i)=>i+1).filter(g=>g%5===0&&g<maxGW), maxGW])];

  const p1 = pathFor(map1), p2 = pathFor(map2);
  const lastGW1 = t1.gwHistory.filter(g=>g.overallRank).slice(-1)[0];
  const lastGW2 = t2.gwHistory.filter(g=>g.overallRank).slice(-1)[0];

  return (
    <div>
      <SectionTitle>Overall Position Week by Week</SectionTitle>
      <div style={{ fontSize:10, color:"#475569", marginBottom:10 }}>Lower rank = higher on chart — moving up is good</div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", display:"block", overflow:"visible" }} preserveAspectRatio="xMidYMid meet">
        {/* Grid lines */}
        {yTicks.map(r => <line key={r} x1={PL} y1={yOf(r)} x2={W-PR} y2={yOf(r)} stroke="#1E293B" strokeWidth="1"/>)}
        {/* Y axis labels — rank numbers */}
        {yTicks.map(r => <text key={r} x={PL-4} y={yOf(r)+4} textAnchor="end" fill="#475569" fontSize="9">{fmtRank(r)}</text>)}
        {/* X axis labels */}
        {xTicks.map(gw => <text key={gw} x={xOf(gw)} y={H-3} textAnchor="middle" fill="#334155" fontSize="8">{gw}</text>)}
        {/* Area fills — inverted: fill down from line to bottom */}
        {p1 && lastGW1 && <path d={p1+" L"+xOf(lastGW1.gw).toFixed(1)+","+(H-PB)+" L"+PL+","+(H-PB)+" Z"} fill={C1} fillOpacity="0.05"/>}
        {p2 && lastGW2 && <path d={p2+" L"+xOf(lastGW2.gw).toFixed(1)+","+(H-PB)+" L"+PL+","+(H-PB)+" Z"} fill={C2} fillOpacity="0.05"/>}
        {/* Lines — animated draw */}
        {p1 && <path d={p1} fill="none" stroke={C1} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" strokeDasharray="2000" strokeDashoffset="2000" style={{ animation:"drawLine 1.5s ease forwards 0.2s" }}/>}
        {p2 && <path d={p2} fill="none" stroke={C2} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" strokeDasharray="2000" strokeDashoffset="2000" style={{ animation:"drawLine 1.5s ease forwards 0.4s" }}/>}
        {/* End-point dots */}
        {lastGW1 && <circle cx={xOf(lastGW1.gw)} cy={yOf(lastGW1.overallRank)} r="3" fill={C1}/>}
        {lastGW2 && <circle cx={xOf(lastGW2.gw)} cy={yOf(lastGW2.overallRank)} r="3" fill={C2}/>}
      </svg>
      <div style={{ display:"flex", gap:14, marginTop:6, flexWrap:"wrap" }}>
        {[[t1,C1],[t2,C2]].map(([t,color]) => (
          <div key={t.name} style={{ display:"flex", alignItems:"center", gap:4 }}>
            <div style={{ width:16, height:2, background:color, borderRadius:1 }}/>
            <span style={{ fontSize:10, color:"#64748B" }}>{t.name} · #{fmtRank(t.overallRank)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function RecentFormTag({ t1, t2 }) {
  const GWS = 6;
  const last1 = t1.gwHistory.slice(-GWS), last2 = t2.gwHistory.slice(-GWS);
  if (!last1.length || !last2.length) return null;
  const map2 = Object.fromEntries(t2.gwHistory.map(g => [g.gw, g.points]));
  const map1 = Object.fromEntries(t1.gwHistory.map(g => [g.gw, g.points]));
  const tot1 = last1.reduce((s,g)=>s+g.points,0), tot2 = last2.reduce((s,g)=>s+g.points,0);
  const wins1 = last1.filter(g => { const o = map2[g.gw]; return o!=null && g.points > o; }).length;
  const wins2 = last2.filter(g => { const o = map1[g.gw]; return o!=null && g.points > o; }).length;

  // Streak detection
  const streak = (gws, oppMap) => { let s = 0; for (let i = gws.length-1; i >= 0; i--) { const o = oppMap[gws[i].gw]; if (o!=null && gws[i].points > o) s++; else break; } return s; };
  const s1 = streak(last1, map2), s2 = streak(last2, map1);

  if (s1 >= 4) return <Tag msg={pickTag(["🔥 " + t1.name + " ON A " + s1 + "-GW WIN STREAK", "🏃 " + t1.name + " CAN'T STOP WINNING", "💪 " + t1.name + " IS RELENTLESS"])} color={C1}/>;
  if (s2 >= 4) return <Tag msg={pickTag(["🔥 " + t2.name + " ON A " + s2 + "-GW WIN STREAK", "🏃 " + t2.name + " CAN'T STOP WINNING", "💪 " + t2.name + " IS RELENTLESS"])} color={C2}/>;
  if (Math.abs(tot1-tot2) >= 60) { const leader=tot1>tot2?t1:t2, lc=tot1>tot2?C1:C2; return <Tag msg={pickTag(["🚀 " + leader.name + " IS IN BLISTERING FORM", "💥 " + leader.name + " IS ON FIRE RECENTLY", "📈 " + leader.name + " IS SURGING"])} color={lc}/>; }
  if (wins1 >= 5) return <Tag msg={pickTag(["👊 " + t1.name + " DOMINATES RECENTLY", "💪 " + t1.name + " IS BOSSING THE LAST " + GWS + " GWS"])} color={C1}/>;
  if (wins2 >= 5) return <Tag msg={pickTag(["👊 " + t2.name + " DOMINATES RECENTLY", "💪 " + t2.name + " IS BOSSING THE LAST " + GWS + " GWS"])} color={C2}/>;
  if (Math.abs(tot1-tot2) <= 10) return <Tag msg={pickTag(["⚖️ DEAD HEAT OVER RECENT WEEKS", "🤝 NOTHING TO SPLIT THEM LATELY", "🔁 MIRRORED FORM"])} color="#94A3B8"/>;
  const leader=tot1>tot2?t1:t2, lc=tot1>tot2?C1:C2;
  return <Tag msg={pickTag(["📊 " + leader.name + " HAS THE RECENT EDGE", "⚡ " + leader.name + " IN BETTER RECENT FORM"])} color={lc}/>;
}

function RecentForm({ t1, t2 }) {
  const GWS = 6;
  const last1 = t1.gwHistory.slice(-GWS);
  const last2 = t2.gwHistory.slice(-GWS);

  // Build map of gw -> result for each team
  const map2 = Object.fromEntries(t2.gwHistory.map(g => [g.gw, g.points]));
  const map1 = Object.fromEntries(t1.gwHistory.map(g => [g.gw, g.points]));

  const avg1 = last1.length ? Math.round(last1.reduce((s,g)=>s+g.points,0)/last1.length) : 0;
  const avg2 = last2.length ? Math.round(last2.reduce((s,g)=>s+g.points,0)/last2.length) : 0;

  const maxPts = Math.max(...last1.map(g=>g.points), ...last2.map(g=>g.points), 1);

  function result(g, opponentMap) {
    const opp = opponentMap[g.gw];
    if (opp == null) return null;
    return g.points > opp ? "W" : g.points < opp ? "L" : "D";
  }

  function FormCol({ gws, opponentMap, color }) {
    return (
      <div style={{ flex:1 }}>
        {gws.map((g, i) => {
          const res = result(g, opponentMap);
          const barW = Math.round((g.points / maxPts) * 100);
          const bgColor = res === "W" ? color : res === "L" ? LOSE : "#334155";
          return (
            <div key={i} style={{ marginBottom: i < gws.length-1 ? 8 : 0 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, color:"#475569", width:30, flexShrink:0 }}>GW{g.gw}</div>
                <div style={{ flex:1, height:6, background:"#0F1E35", borderRadius:3, overflow:"hidden" }}>
                  <div style={{ width:barW+"%", height:"100%", background:color, borderRadius:3, opacity: res==="L" ? 0.35 : 1 }}/>
                </div>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:700, color: res==="W"?color : res==="L"?LOSE:"#64748B", width:28, textAlign:"right", flexShrink:0 }}>{g.points}</div>
                {res && <div style={{ width:18, height:18, borderRadius:4, background: res==="W"?color+"22":res==="L"?LOSE+"22":"#33415522", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <span style={{ fontSize:9, fontWeight:800, color: res==="W"?color:res==="L"?LOSE:"#64748B" }}>{res}</span>
                </div>}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  const total1 = last1.reduce((s,g)=>s+g.points,0);
  const total2 = last2.reduce((s,g)=>s+g.points,0);
  const inFormSide = total1 !== total2 ? (total1 > total2 ? 1 : 2) : 0;

  return (
    <div>
      <SectionTitle>Recent Form — Last {GWS} GWs</SectionTitle>
      <RecentFormTag t1={t1} t2={t2}/>
      {/* Averages */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
        {[[t1,C1,avg1,last1,1],[t2,C2,avg2,last2,2]].map(([t,color,avg,gws,side]) => {
          const wins = gws.filter(g => result(g, t===t1?map2:map1)==="W").length;
          const losses = gws.filter(g => result(g, t===t1?map2:map1)==="L").length;
          const draws = gws.filter(g => result(g, t===t1?map2:map1)==="D").length;
          const total = gws.reduce((s,g)=>s+g.points,0);
          return (
            <div key={t.name} style={{ background:"linear-gradient(135deg,"+color+"0A,transparent)", border:"1px solid "+color+"20", borderRadius:10, padding:"10px 12px", position:"relative", overflow:"hidden", minWidth:0 }}>
              {inFormSide === side && <div style={{ position:"absolute", top:-8, right:8, fontSize:9, fontWeight:700, background:"#0D1829", border:"1px solid "+color+"60", borderRadius:4, padding:"2px 6px", color, letterSpacing:"0.06em", textTransform:"uppercase", lineHeight:1.4, whiteSpace:"nowrap" }}>🔥 In Form</div>}
              <div style={{ fontSize:10, color, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}</div>
              <div style={{ fontFamily:"'DM Mono',monospace", fontSize:22, fontWeight:700, color, lineHeight:1 }}>{total}<span style={{ fontSize:11, color:"#64748B", marginLeft:4 }}>pts</span></div>
              <div style={{ fontSize:11, color:"#64748B", marginTop:4 }}>{avg} avg/GW</div>
              <div style={{ display:"flex", gap:8, marginTop:8 }}>
                {[["W",wins,color],["D",draws,"#64748B"],["L",losses,LOSE]].map(([lbl,n,c]) => (
                  <div key={lbl} style={{ display:"flex", alignItems:"center", gap:3 }}>
                    <div style={{ width:14, height:14, borderRadius:3, background:c+"22", display:"flex", alignItems:"center", justifyContent:"center" }}>
                      <span style={{ fontSize:8, fontWeight:800, color:c }}>{lbl}</span>
                    </div>
                    <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:700, color:c }}>{n}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      {/* GW bars */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
        <FormCol gws={last1} opponentMap={map2} color={C1} />
        <FormCol gws={last2} opponentMap={map1} color={C2} />
      </div>
    </div>
  );
}

// ── Chip Results ──────────────────────────────────────────────────

function ChipDetail({ chip, color }) {
  if (!chip.detail?.length) return null;

  const maxPts = Math.max(...chip.detail.map(p => p.points), 1);

  function DetailRows({ players }) {
    return players.map((p,i) => (
      <div key={i} style={{ display:"flex", alignItems:"center", gap:6, padding:"5px 0", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
        <span style={{ fontSize:11, color:"#94A3B8", flex:1, minWidth:0, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{p.name}</span>
        <div style={{ flexShrink:0, width:32, height:4, background:"rgba(255,255,255,0.06)", borderRadius:2, overflow:"hidden" }}>
          <div style={{ width:Math.round((p.points/maxPts)*100)+"%", height:"100%", background:color, borderRadius:2 }}/>
        </div>
        <span style={{ fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:700, color, flexShrink:0, width:28, textAlign:"right" }}>{p.points}</span>
      </div>
    ));
  }

  const wrap = (label, children, footer) => (
    <div style={{ marginTop:10, background:"rgba(0,0,0,0.2)", borderRadius:7, padding:"10px 12px" }}>
      <div style={{ fontSize:10, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>{label}</div>
      {children}
      {footer}
    </div>
  );

  if (chip.name === "bboost") return wrap(
    "Bench Players",
    <DetailRows players={chip.detail}/>,
    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:8, paddingTop:8, borderTop:"1px solid rgba(255,255,255,0.08)" }}>
      <span style={{ fontSize:11, fontWeight:700, color:"#64748B" }}>Bench total</span>
      <span style={{ fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:700, color }}>{chip.extraPoints} pts</span>
    </div>
  );

  if (chip.name === "3xc") {
    const p = chip.detail[0];
    if (!p) return null;
    return wrap("Captain",
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:8, padding:"4px 0" }}>
        <span style={{ fontSize:13, fontWeight:700, color:"#E2E8F0", flex:1, minWidth:0, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{p.name}</span>
        <div style={{ textAlign:"right", flexShrink:0 }}>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:16, fontWeight:700, color, lineHeight:1 }}>{p.points * 3} pts</div>
          <div style={{ fontSize:10, color:"#475569", marginTop:3 }}>{p.points} base × 3</div>
          <div style={{ fontSize:9, color:"#00FF8799", marginTop:1 }}>+{chip.extraPoints} extra vs normal captain</div>
        </div>
      </div>
    );
  }

  if (chip.name === "freehit") return wrap("Top Scorers", <DetailRows players={chip.detail}/>);

  return null;
}

function ChipResultsSection({ t1, t2 }) {
  const [openIdx, setOpenIdx] = React.useState({});
  const dc = t1.doubleChips || t2.doubleChips;
  const allChips = buildAllChips(dc);

  return (
    <div>
      <ColHeaders name1={t1.name} name2={t2.name} centre="Chip"/>
      {allChips.map((slot, idx) => {
        const c1 = t1.chipResults?.find(c => chipKey(c, dc) === slot.key);
        const c2 = t2.chipResults?.find(c => chipKey(c, dc) === slot.key);
        const used1 = !!c1, used2 = !!c2;
        const nether = !used1 && !used2;
        const isOpen = !!openIdx[idx];
        const isWildcard = slot.key === "wc1" || slot.key === "wc2";
        const canExp = !isWildcard && (used1 || used2);
        const AMBER = "#F59E0B";
        const p1 = c1?.points ?? null, p2 = c2?.points ?? null;
        const both = p1 !== null && p2 !== null;
        const w1 = both && p1 > p2, w2 = both && p2 > p1;
        const chipTied = both && p1 === p2;
        const solo1 = used1 && !used2, solo2 = used2 && !used1;

        const cellL = used1
          ? <div style={{ textAlign:"right" }}><div style={{ fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:600, color:w1?C1:solo1?AMBER:chipTied?AMBER:"#CBD5E1" }}>{c1.points}</div><div style={{ fontSize:10, color:"#475569", marginTop:1 }}>GW{c1.event}</div></div>
          : <div style={{ fontSize:10, color:"#64748B", textAlign:"right", textTransform:"uppercase", letterSpacing:"0.05em" }}>Unused</div>;

        const cellR = used2
          ? <div><div style={{ fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:600, color:w2?C2:solo2?AMBER:chipTied?AMBER:"#CBD5E1" }}>{c2.points}</div><div style={{ fontSize:10, color:"#475569", marginTop:1 }}>GW{c2.event}</div></div>
          : <div style={{ fontSize:10, color:"#64748B", textTransform:"uppercase", letterSpacing:"0.05em" }}>Unused</div>;

        const d1 = c1 ? <ChipDetail chip={c1} color={C1}/> : null;
        const d2 = c2 ? <ChipDetail chip={c2} color={C2}/> : null;

        return (
          <div key={slot.key} style={{ opacity:nether?0.3:1, marginBottom:3 }}>
            <div onClick={()=>canExp&&setOpenIdx(s=>({...s,[idx]:!s[idx]}))}
              style={{ display:"grid", gridTemplateColumns:"1fr var(--chip-col) 1fr", alignItems:"stretch", cursor:canExp?"pointer":"default" }}>
              {(() => {
                const bgL = w1 ? "rgba(0,255,135,0.03)" : solo1 ? "rgba(245,158,11,0.04)" : chipTied ? "rgba(245,158,11,0.04)" : "rgba(255,255,255,0.025)";
                const blL = w1 ? C1+"60" : solo1 ? AMBER+"60" : chipTied ? AMBER+"60" : "transparent";
                const bgR = w2 ? "rgba(56,182,255,0.03)" : solo2 ? "rgba(245,158,11,0.04)" : chipTied ? "rgba(245,158,11,0.04)" : "rgba(255,255,255,0.025)";
                const blR = w2 ? C2+"60" : solo2 ? AMBER+"60" : chipTied ? AMBER+"60" : "transparent";
                return <>
                  <div style={{ background:bgL, borderRadius:"6px 0 0 6px", padding:"8px 10px", borderLeft:"2px solid "+blL, display:"flex", alignItems:"center", justifyContent:"flex-end" }}>{cellL}</div>
                  <div style={{ background:"rgba(255,255,255,0.04)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"0 4px", textAlign:"center", fontSize:10, fontWeight:700, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.07em", lineHeight:1.3 }}>
                    <div>{slot.icon} {slot.label}</div>
                    {canExp && <div style={{ fontSize:8, color:"#475569", marginTop:2 }}>{isOpen?"▲":"▼"}</div>}
                  </div>
                  <div style={{ background:bgR, borderRadius:"0 6px 6px 0", padding:"8px 10px", borderRight:"2px solid "+blR, display:"flex", alignItems:"center" }}>{cellR}</div>
                </>;
              })()}
            </div>
            {isOpen && canExp && (d1||d2) && (
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", background:"rgba(255,255,255,0.015)", borderRadius:6, marginTop:2, marginBottom:2 }}>
                <div style={{ padding:"10px 16px 10px 10px", borderRight:"1px solid rgba(255,255,255,0.05)", minWidth:0, overflow:"hidden" }}>{d1||<span style={{ fontSize:10, color:"#334155" }}>—</span>}</div>
                <div style={{ padding:"10px 10px 10px 16px", minWidth:0, overflow:"hidden" }}>{d2||<span style={{ fontSize:10, color:"#334155" }}>—</span>}</div>
              </div>
            )}
            {isOpen && canExp && !d1 && !d2 && (
              <div style={{ padding:"8px 0 12px", fontSize:11, color:"#334155", textAlign:"center", background:"rgba(255,255,255,0.015)", borderRadius:6, marginTop:2, marginBottom:2 }}>Full squad overhaul</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Season History ────────────────────────────────────────────────

function SeasonHistory({ s1, s2, name1, name2 }) {
  if (!s1?.length && !s2?.length) return null;
  const allSeasons = [...new Set([...(s1||[]).map(s=>s.season),...(s2||[]).map(s=>s.season)])].sort().reverse();
  const best1 = s1?.reduce((b,s)=>s.totalPoints>(b?.totalPoints||0)?s:b, null);
  const best2 = s2?.reduce((b,s)=>s.totalPoints>(b?.totalPoints||0)?s:b, null);
  const avg1 = s1?.length ? Math.round(s1.reduce((a,s)=>a+s.totalPoints,0)/s1.length) : null;
  const avg2 = s2?.length ? Math.round(s2.reduce((a,s)=>a+s.totalPoints,0)/s2.length) : null;
  const last5_1 = s1?.slice(0,5) || [];
  const last5_2 = s2?.slice(0,5) || [];
  const avg5_1 = last5_1.length ? Math.round(last5_1.reduce((a,s)=>a+s.totalPoints,0)/last5_1.length) : null;
  const avg5_2 = last5_2.length ? Math.round(last5_2.reduce((a,s)=>a+s.totalPoints,0)/last5_2.length) : null;
  const avgW = avg1&&avg2 ? (avg1>avg2?1:avg2>avg1?2:0) : 0;
  const avg5W = avg5_1&&avg5_2 ? (avg5_1>avg5_2?1:avg5_2>avg5_1?2:0) : 0;

  return (
    <div>
      <SectionTitle>Season on Season History</SectionTitle>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
        <div style={{ fontSize:11, fontWeight:700, color:C1, textTransform:"uppercase", letterSpacing:"0.07em", textAlign:"center", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{name1}</div>
        <div style={{ fontSize:11, fontWeight:700, color:C2, textTransform:"uppercase", letterSpacing:"0.07em", textAlign:"center", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{name2}</div>
      </div>
      {(best1||best2) && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:16 }}>
          {[[best1,C1,name1],[best2,C2,name2]].map(([best,color,name]) => best ? (
            <div key={name} style={{ background:"linear-gradient(135deg,"+color+"15,"+color+"05)", border:"1px solid "+color+"40", borderRadius:10, padding:"10px 12px", position:"relative", overflow:"hidden" }}>
              <div style={{ position:"absolute", top:-8, right:-4, fontSize:40, opacity:0.08 }}>★</div>
              <div style={{ fontSize:9, fontWeight:700, color, textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:4 }}>🏆 Best Season</div>
              <div style={{ fontSize:10, color:"#94A3B8", marginBottom:2 }}>{best.season}</div>
              <div style={{ fontFamily:"'DM Mono',monospace", fontSize:22, fontWeight:700, color, lineHeight:1 }}>{best.totalPoints.toLocaleString()}<span style={{ fontSize:11, color:"#64748B", marginLeft:3 }}>pts</span></div>
              <div style={{ fontSize:10, color:"#475569", marginTop:3 }}>Rank #{best.rank.toLocaleString()}</div>
            </div>
          ) : <div key={name} />)}
        </div>
      )}
      <div style={{ display:"grid", gridTemplateColumns:"1fr var(--hist-col) 1fr", marginBottom:6 }}>
        <div style={{ textAlign:"right", paddingRight:10 }}>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:16, fontWeight:700, color:avgW===1?C1:avgW===0&&avg1&&avg2?"#F59E0B":"#CBD5E1", textShadow:avgW===1?"0 0 12px rgba(0,255,135,.3)":avgW===0&&avg1&&avg2?"0 0 12px rgba(245,158,11,.3)":"none" }}>{avg1?.toLocaleString()||"—"}</div>
          <div style={{ fontSize:9, color:"#64748B", marginTop:1 }}>avg / season</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:"#475569", fontWeight:700 }}>ALL</div>
        <div style={{ paddingLeft:10 }}>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:16, fontWeight:700, color:avgW===2?C2:avgW===0&&avg1&&avg2?"#F59E0B":"#CBD5E1", textShadow:avgW===2?"0 0 12px rgba(56,182,255,.3)":avgW===0&&avg1&&avg2?"0 0 12px rgba(245,158,11,.3)":"none" }}>{avg2?.toLocaleString()||"—"}</div>
          <div style={{ fontSize:9, color:"#64748B", marginTop:1 }}>avg / season</div>
        </div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr var(--hist-col) 1fr", marginBottom:6 }}>
        <div style={{ textAlign:"right", paddingRight:10 }}>
          <div style={{ fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:600, color:avg5W===1?C1:avg5W===0&&avg5_1&&avg5_2?"#F59E0B":"#CBD5E1", textShadow:avg5W===1?"0 0 12px rgba(0,255,135,.3)":avg5W===0&&avg5_1&&avg5_2?"0 0 12px rgba(245,158,11,.3)":"none" }}>{avg5_1?.toLocaleString()||"—"}</div>
          <div style={{ fontSize:9, color:"#64748B", marginTop:1 }}>avg / last 5</div>
        </div>

// ── Sparkline ────────────────────────────────────────────────────

function Sparkline({ data, color, width=80, height=20 }) {
  if (!data?.length || data.length < 2) return null;
  const ranks = data.map(g => g.overallRank).filter(Boolean);
  if (ranks.length < 2) return null;
  const min = Math.min(...ranks), max = Math.max(...ranks);
  const range = max - min || 1;
  const pts = ranks.map((r, i) => {
    const x = (i / (ranks.length - 1)) * width;
    const y = ((r - min) / range) * height; // inverted: lower rank = top
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  return (
    <svg width={width} height={height} style={{ display:"block", marginTop:6 }}>
      <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.6"/>
    </svg>
  );
}

// ── Captain Comparison ───────────────────────────────────────────

function CaptainComparison({ t1, t2 }) {
  const c1 = t1.captainHistory || [], c2 = t2.captainHistory || [];
  if (!c1.length && !c2.length) return null;

  const optRate = (hist) => hist.length ? Math.round((hist.filter(h=>h.wasOptimal).length / hist.length) * 100) : 0;
  const totalCapPts = (hist) => hist.reduce((s,h)=>s+h.captainPts,0);
  const totalOptPts = (hist) => hist.reduce((s,h)=>s+h.optimalPts,0);
  const topCap = (hist) => {
    const counts = {};
    hist.forEach(h => { counts[h.captainName] = (counts[h.captainName]||0) + 1; });
    return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
  };

  const or1 = optRate(c1), or2 = optRate(c2);
  const cp1 = totalCapPts(c1), cp2 = totalCapPts(c2);
  const op1 = totalOptPts(c1), op2 = totalOptPts(c2);
  const missed1 = op1 - cp1, missed2 = op2 - cp2;
  const fav1 = topCap(c1), fav2 = topCap(c2);

  const AMBER = "#F59E0B";
  const orW = or1>or2?1:or2>or1?2:0;
  const cpW = cp1>cp2?1:cp2>cp1?2:0;
  const missedW = missed1<missed2?1:missed2<missed1?2:0;

  return (
    <div>
      <SectionTitle>Captain Comparison</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>How well each manager picked their captain</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>

            <div style={{ fontSize:9, color:"#64748B", marginTop:6 }}>Optimal pick rate</div>

            </div>

  const maxHit1 = hitGws1.length ? Math.max(...hitGws1.map(g=>g.hitCost)) : 0;
  const maxHit2 = hitGws2.length ? Math.max(...hitGws2.map(g=>g.hitCost)) : 0;
  const avgXfer1 = t1.gwHistory.length ? (t1.transfersTotal / t1.gwHistory.length).toFixed(1) : "0";
  const avgXfer2 = t2.gwHistory.length ? (t2.transfersTotal / t2.gwHistory.length).toFixed(1) : "0";
  const wildcardGws1 = (t1.chipResults||[]).filter(c=>c.name==="wildcard").map(c=>c.gw);
  const wildcardGws2 = (t2.chipResults||[]).filter(c=>c.name==="wildcard").map(c=>c.gw);
  const freeXfers1 = t1.gwHistory.filter(g=>g.transfers>0&&g.hitCost===0&&!wildcardGws1.includes(g.gw)).length;
  const freeXfers2 = t2.gwHistory.filter(g=>g.transfers>0&&g.hitCost===0&&!wildcardGws2.includes(g.gw)).length;

  return (
