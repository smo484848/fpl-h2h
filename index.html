  );
}

// ── Rivalry Title ────────────────────────────────────────────────

function generateRivalryTitle(t1, t2, h2h) {
  const total = h2h.team1Wins + h2h.team2Wins + h2h.draws;
  const drawRate = total ? h2h.draws / total : 0;
  const winGap = Math.abs(h2h.team1Wins - h2h.team2Wins);
  const ptsDiff = Math.abs(t1.totalPoints - t2.totalPoints);

  if (drawRate >= 0.4) return pickTag(["The Eternal Stalemate", "The Inseparable Rivalry", "The Deadlock Derby"]);
  if (winGap >= 10) return pickTag(["The One-Sided Affair", "The Mismatch", "David vs Goliath"]);
  if (winGap <= 2 && total >= 10) return pickTag(["The Great Rivalry", "The Closest of Contests", "The Neverending Battle"]);
  if (ptsDiff <= 20) return pickTag(["The Razor's Edge", "Too Close to Call", "The Photo Finish"]);
  if (ptsDiff >= 200) return pickTag(["Levels Apart", "The Gulf in Class", "No Contest"]);

  // Check for overtake this season
  const gws1 = t1.gwHistory, gws2 = t2.gwHistory;
  if (gws1.length >= 10 && gws2.length >= 10) {
    const midR1 = gws1[Math.floor(gws1.length/2)]?.overallRank, midR2 = gws2[Math.floor(gws2.length/2)]?.overallRank;
    const nowR1 = gws1[gws1.length-1]?.overallRank, nowR2 = gws2[gws2.length-1]?.overallRank;
    if (midR1 && midR2 && nowR1 && nowR2) {
      const wasBehind1 = midR1 > midR2, nowAhead1 = nowR1 < nowR2;
      if (wasBehind1 === nowAhead1 && wasBehind1) return pickTag(["The Great Comeback", "The Turnaround", "From Behind to Beyond"]);
    }
  }

  return pickTag(["The Showdown", "Head to Head", "The Battle of the Managers", "The FPL Derby"]);
}

// ── Fun Facts ────────────────────────────────────────────────────

function FunFacts({ t1, t2, h2h }) {
  const facts = [];
  const gwR = h2h.gwResults || [];
  const total1 = t1.totalPoints, total2 = t2.totalPoints;

  // Combined points
  facts.push("Combined, these managers have scored " + (total1+total2).toLocaleString() + " points this season");

  // Closest GW
  if (gwR.length) {
    const closest = gwR.reduce((b,g) => Math.abs(g.team1Points-g.team2Points) < Math.abs(b.team1Points-b.team2Points) ? g : b);
    if (Math.abs(closest.team1Points-closest.team2Points) <= 3) facts.push("GW" + closest.gw + " was the tightest battle — just " + Math.abs(closest.team1Points-closest.team2Points) + " point" + (Math.abs(closest.team1Points-closest.team2Points)!==1?"s":"") + " apart");
  }

  // Draw streak
  let maxDrawStreak = 0, cur = 0;
  gwR.forEach(g => { if (g.winner==="draw") cur++; else { maxDrawStreak = Math.max(maxDrawStreak, cur); cur = 0; } });
  maxDrawStreak = Math.max(maxDrawStreak, cur);
  if (maxDrawStreak >= 3) facts.push("These two drew " + maxDrawStreak + " gameweeks in a row at one point");

  // Bench points
  const bp1 = t1.positionPoints.benchPts, bp2 = t2.positionPoints.benchPts;
  if (bp1+bp2 > 50) facts.push("Between them, " + (bp1+bp2) + " points were wasted on the bench this season");

  // Season experience
  const exp = t1.seasonCount + t2.seasonCount - 2; // past seasons combined
  if (exp > 15) facts.push("These managers have " + exp + " combined past FPL seasons of experience");

  // Transfer cost
  if (t1.transferCost+t2.transferCost > 0) facts.push("Together they've taken " + (t1.transferCost+t2.transferCost) + " points in transfer hits");

  // Captain overlap
  const c1 = t1.captainHistory||[], c2 = t2.captainHistory||[];
  const sameCap = c1.filter((h,i) => c2[i] && h.captainId === c2[i].captainId).length;
  if (sameCap > 0 && c1.length) facts.push("Both managers picked the same captain in " + sameCap + " of " + c1.length + " gameweeks (" + Math.round(sameCap/c1.length*100) + "%)");

  // 80+ club
  const big1 = t1.gwHistory.filter(g=>g.points>=80).length;
  const big2 = t2.gwHistory.filter(g=>g.points>=80).length;
  if (big1+big2 > 0) facts.push("The 80+ club: " + t1.name + " (" + big1 + " times) vs " + t2.name + " (" + big2 + " times)");

  // Red arrow GWs (rank went down)
  const redArrows1 = t1.gwHistory.filter((g,i,a) => i>0 && g.overallRank > a[i-1].overallRank).length;
  const redArrows2 = t2.gwHistory.filter((g,i,a) => i>0 && g.overallRank > a[i-1].overallRank).length;
  if (redArrows1 > 0 || redArrows2 > 0) facts.push("Red arrow weeks: " + t1.name + " (" + redArrows1 + ") vs " + t2.name + " (" + redArrows2 + ")");

  const display = facts.slice(0, 5);

  return (
    <div>
      <SectionTitle>Did You Know?</SectionTitle>
      <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
        {display.map((f,i) => (
          <div key={i} style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"8px 10px", background:"rgba(255,255,255,0.02)", borderRadius:8, border:"1px solid rgba(255,255,255,0.04)" }}>
            <span style={{ fontSize:14, flexShrink:0, marginTop:1 }}>{["💡","📊","🎲","🔍","⚡"][i%5]}</span>
            <span style={{ fontSize:12, color:"#94A3B8", lineHeight:1.5 }}>{f}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── H2H Streaks ──────────────────────────────────────────────────

function H2HStreaks({ t1, t2, h2h }) {
  const gwR = h2h.gwResults || [];
  if (!gwR.length) return null;

  function calcStreaks(side) {
    let current = 0, longest = 0, currentStart = 0, longestStart = 0;
    gwR.forEach((g, i) => {
      if (g.winner === side) {
        if (current === 0) currentStart = i;
        current++;
        if (current > longest) { longest = current; longestStart = currentStart; }
      } else { current = 0; }
    });
    // Current streak at end
    let endStreak = 0;
    for (let i = gwR.length-1; i >= 0; i--) {
      if (gwR[i].winner === side) endStreak++; else break;
    }
    return { longest, longestGW: gwR[longestStart]?.gw || 0, current: endStreak };
  }

  const s1 = calcStreaks("team1"), s2 = calcStreaks("team2");
  const sd = calcStreaks("draw");

  return (
    <div>
      <SectionTitle>H2H Streaks</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:12 }}>Win streaks across all gameweeks this season</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:12 }}>
        {[[t1,C1,s1],[t2,C2,s2]].map(([t,color,s]) => (
          <div key={t.name} style={{ background:"linear-gradient(135deg,"+color+"0A,transparent)", border:"1px solid "+color+"20", borderRadius:10, padding:"10px 12px", overflow:"hidden", minWidth:0 }}>
            <div style={{ fontSize:10, color, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}</div>
            <div style={{ display:"flex", gap:16 }}>
              <div>
                <div style={{ fontSize:9, color:"#64748B" }}>Current</div>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:20, fontWeight:700, color:s.current>0?color:"#334155" }}>{s.current}</div>
              </div>
              <div>
                <div style={{ fontSize:9, color:"#64748B" }}>Longest</div>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:20, fontWeight:700, color }}>{s.longest}</div>
                {s.longest > 0 && <div style={{ fontSize:9, color:"#475569" }}>from GW{s.longestGW}</div>}
              </div>
            </div>
          </div>
        ))}
      </div>
      {sd.longest >= 2 && <div style={{ fontSize:11, color:"#475569", textAlign:"center" }}>Longest draw streak: {sd.longest} GWs</div>}
    </div>
  );
}

// ── Points Histogram ──────────────────────────────────────────────

function PointsHistogram({ t1, t2 }) {
  const gws1 = t1.gwHistory.map(g=>g.points), gws2 = t2.gwHistory.map(g=>g.points);
  if (!gws1.length) return null;

  const buckets = [[0,29],[30,39],[40,49],[50,59],[60,69],[70,79],[80,99],[100,200]];
  const labels = ["0-29","30s","40s","50s","60s","70s","80-99","100+"];
  const count = (arr, lo, hi) => arr.filter(v => v >= lo && v <= hi).length;

  const data1 = buckets.map(([lo,hi]) => count(gws1, lo, hi));
  const data2 = buckets.map(([lo,hi]) => count(gws2, lo, hi));
  const max = Math.max(...data1, ...data2, 1);

  return (
    <div>
      <SectionTitle>Points Distribution</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:12 }}>How often each points range was scored</div>
      <div style={{ display:"flex", gap:4, alignItems:"flex-end", height:60 }}>
        {labels.map((l, i) => (
          <div key={l} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:1 }}>
            <div style={{ display:"flex", gap:1, alignItems:"flex-end", height:50, width:"100%" }}>
              <div style={{ flex:1, height:Math.max(2, (data1[i]/max)*50), background:C1, borderRadius:"2px 2px 0 0", opacity:0.8, animation:"fillWidth 0.6s ease forwards", transformOrigin:"bottom" }}/>
              <div style={{ flex:1, height:Math.max(2, (data2[i]/max)*50), background:C2, borderRadius:"2px 2px 0 0", opacity:0.8, animation:"fillWidth 0.6s ease forwards 0.2s", transformOrigin:"bottom" }}/>
            </div>
            <div style={{ fontSize:7, color:"#475569", whiteSpace:"nowrap" }}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:14, marginTop:8 }}>
        {[[t1.name,C1],[t2.name,C2]].map(([n,c])=>(<div key={n} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,background:c,borderRadius:1}}/><span style={{fontSize:10,color:"#64748B"}}>{n}</span></div>))}
      </div>
    </div>
  );
}

// ── Consistency Meter ─────────────────────────────────────────────

function ConsistencyMeter({ t1, t2 }) {
  const c1 = t1.consistency, c2 = t2.consistency;
  if (!c1 && !c2) return null;
  const maxC = Math.max(c1, c2, 1);
  // Lower std dev = more consistent
  const w = c1 < c2 ? 1 : c2 < c1 ? 2 : 0;

  return (
    <div>
      <SectionTitle>Consistency</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:12 }}>Lower standard deviation = more consistent (predictable) weekly scores</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        {[[t1,C1,c1,1],[t2,C2,c2,2]].map(([t,color,c,side]) => (
          <div key={t.name} style={{ background:"linear-gradient(135deg,"+color+"0A,transparent)", border:"1px solid "+color+"20", borderRadius:10, padding:"12px", overflow:"hidden", minWidth:0 }}>
            <div style={{ fontSize:10, color, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}</div>
            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:24, fontWeight:700, color:w===side?color:w===0?AMBER:"#CBD5E1" }}>±{c}</div>
            <div style={{ fontSize:10, color:"#64748B", marginTop:2 }}>std deviation</div>
            <div style={{ height:4, background:"#0F1E35", borderRadius:2, marginTop:8, overflow:"hidden" }}>
              <div style={{ width:Math.round((c/maxC)*100)+"%", height:"100%", background:color, borderRadius:2, opacity:0.7, animation:"fillWidth 0.8s ease forwards", transformOrigin:"left" }}/>
            </div>
            <div style={{ fontSize:9, color:"#475569", marginTop:4 }}>{c < 10 ? "Very consistent" : c < 15 ? "Fairly consistent" : c < 20 ? "Variable" : "Very unpredictable"}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Cumulative Difference Chart ──────────────────────────────────

function CumulativeDiffChart({ t1, t2 }) {
  const gws1 = t1.gwHistory, gws2 = t2.gwHistory;
  const map2 = Object.fromEntries(gws2.map(g=>[g.gw, g.points]));
  let cumDiff = 0;
  const data = gws1.map(g => {
    const p2 = map2[g.gw];
    if (p2 == null) return null;
    cumDiff += g.points - p2;
    return { gw: g.gw, diff: cumDiff };
  }).filter(Boolean);

  if (data.length < 2) return null;

  const W=540, H=80, PL=36, PR=10, PT=8, PB=16;
  const iW=W-PL-PR, iH=H-PT-PB;
  const maxAbs = Math.max(...data.map(d=>Math.abs(d.diff)), 1);
  const xOf = (i) => PL + (i/(data.length-1))*iW;
  const yOf = (v) => PT + iH/2 - (v/maxAbs)*(iH/2);

  const path = data.map((d,i) => `${i===0?"M":"L"}${xOf(i).toFixed(1)},${yOf(d.diff).toFixed(1)}`).join(" ");
  const last = data[data.length-1];
  const fillPath = path + ` L${xOf(data.length-1).toFixed(1)},${yOf(0).toFixed(1)} L${PL},${yOf(0).toFixed(1)} Z`;

  return (
    <div>
      <SectionTitle>Points Gap Over Time</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:8 }}>How far ahead each team is, gameweek by gameweek</div>
      <svg viewBox={`0 0 ${W} ${H+12}`} style={{ width:"100%", display:"block" }} preserveAspectRatio="xMidYMid meet">
        <line x1={PL} y1={yOf(0)} x2={W-PR} y2={yOf(0)} stroke={C2} strokeWidth="1" strokeOpacity="0.4" strokeDasharray="4,3"/>
        <path d={fillPath} fill={last.diff>=0?C1:C2} fillOpacity="0.06"/>
        <path d={path} fill="none" stroke={C1} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" strokeDasharray="2000" strokeDashoffset="2000" style={{ animation:"drawLine 1.5s ease forwards 0.2s" }}/>
        <circle cx={xOf(data.length-1)} cy={yOf(last.diff)} r="3" fill={C1}/>
        <text x={PL-4} y={yOf(0)+3} textAnchor="end" fill={C2} fontSize="8" fillOpacity="0.5">0</text>
        <text x={xOf(data.length-1)+6} y={yOf(last.diff)+3} fill={C1} fontSize="9" fontWeight="700">{last.diff>0?"+":""}{last.diff}</text>
        {/* Axis labels */}
        <text x={W-PR+4} y={PT+4} fill={C1} fontSize="7" fontWeight="600" fillOpacity="0.5">{t1.name}</text>
        <text x={W-PR+4} y={H-PB+12} fill={C2} fontSize="7" fontWeight="600" fillOpacity="0.5">{t2.name}</text>
        {/* Legend */}
        <line x1={PL+4} y1={H+6} x2={PL+18} y2={H+6} stroke={C1} strokeWidth="2"/>
        <text x={PL+23} y={H+9} fill={C1} fontSize="8" fontWeight="600">{t1.name}</text>
        <line x1={PL+140} y1={H+6} x2={PL+160} y2={H+6} stroke={C2} strokeWidth="1" strokeOpacity="0.4" strokeDasharray="4,3"/>
        <text x={PL+166} y={H+9} fill={C2} fontSize="8" fontWeight="600" fillOpacity="0.6">{t2.name} (baseline)</text>
      </svg>
    </div>
  );
}

// ── Biggest GW Swings ────────────────────────────────────────────

function BiggestSwings({ t1, t2, h2h }) {
  const gwR = (h2h.gwResults||[]).map(g => ({ ...g, diff: Math.abs(g.team1Points - g.team2Points) })).sort((a,b) => b.diff - a.diff).slice(0, 3);
  if (!gwR.length) return null;

  return (
    <div>
      <SectionTitle>Biggest Point Swings</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:12 }}>The gameweeks with the largest point differences</div>
      <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
        {gwR.map((g, i) => {
          const winner = g.winner==="team1"?t1:g.winner==="team2"?t2:null;
          const wc = g.winner==="team1"?C1:g.winner==="team2"?C2:"#94A3B8";
          const isBiggest = g.diff === gwR[0].diff;
          const isJoint = isBiggest && gwR.filter(x => x.diff === gwR[0].diff).length > 1;
          return (
            <div key={g.gw} style={{ display:"grid", gridTemplateColumns:"50px 1fr 50px", alignItems:"center", background:"rgba(255,255,255,0.025)", borderRadius:8, padding:"10px 12px", border:"1px solid rgba(255,255,255,0.04)" }}>
              <div>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:700, color:"#64748B" }}>GW{g.gw}</div>
                {isBiggest && <div style={{ fontSize:8, color:AMBER, fontWeight:700 }}>{isJoint ? "JOINT BIGGEST" : "BIGGEST"}</div>}
              </div>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8 }}>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:14, fontWeight:700, color:g.winner==="team1"?C1:"#475569" }}>{g.team1Points}</span>
                <span style={{ fontSize:9, color:"#334155" }}>vs</span>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:14, fontWeight:700, color:g.winner==="team2"?C2:"#475569" }}>{g.team2Points}</span>
              </div>
              <div style={{ textAlign:"right" }}>
                <div style={{ fontFamily:"'DM Mono',monospace", fontSize:16, fontWeight:700, color:wc }}>+{g.diff}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Achievement Badges ───────────────────────────────────────────

function AchievementBadges({ t1, t2, h2h }) {
  const badges = [];
  const add = (emoji, title, desc, side, color) => badges.push({ emoji, title, desc, side, color });

  // Iron Manager - never took a hit
  if (t1.transferCost === 0) add("🛡️", "Iron Manager", "Zero transfer hits taken", 1, C1);
  if (t2.transferCost === 0) add("🛡️", "Iron Manager", "Zero transfer hits taken", 2, C2);

  // Captain Fantastic - optimal rate > 40%
  const or1 = t1.captainHistory?.length ? Math.round(t1.captainHistory.filter(h=>h.wasOptimal).length/t1.captainHistory.length*100) : 0;
  const or2 = t2.captainHistory?.length ? Math.round(t2.captainHistory.filter(h=>h.wasOptimal).length/t2.captainHistory.length*100) : 0;
  if (or1 >= 40) add("👑", "Captain Fantastic", "40%+ optimal captain rate", 1, C1);
  if (or2 >= 40) add("👑", "Captain Fantastic", "40%+ optimal captain rate", 2, C2);

  // Veteran - 5+ seasons
  if (t1.seasonCount > 5) add("🏛️", "Veteran", t1.seasonCount + " seasons played", 1, C1);
  if (t2.seasonCount > 5) add("🏛️", "Veteran", t2.seasonCount + " seasons played", 2, C2);

  // Newcomer
  if (t1.seasonCount <= 2) add("🌱", "Newcomer", "Fresh on the scene", 1, C1);
  if (t2.seasonCount <= 2) add("🌱", "Newcomer", "Fresh on the scene", 2, C2);

  // Clean Sheet Machine
  if (t1.squadStats.cleanSheets >= 50) add("🧱", "Fortress", "50+ squad clean sheets", 1, C1);
  if (t2.squadStats.cleanSheets >= 50) add("🧱", "Fortress", "50+ squad clean sheets", 2, C2);

  // Goal Machine
  if (t1.squadStats.goals >= 50) add("⚽", "Goal Machine", "50+ squad goals", 1, C1);
  if (t2.squadStats.goals >= 50) add("⚽", "Goal Machine", "50+ squad goals", 2, C2);

  // H2H Dominator
  if (h2h.team1Wins >= h2h.team2Wins * 2 && h2h.team1Wins >= 6) add("💪", "H2H Dominator", "Dominates the head-to-head", 1, C1);
  if (h2h.team2Wins >= h2h.team1Wins * 2 && h2h.team2Wins >= 6) add("💪", "H2H Dominator", "Dominates the head-to-head", 2, C2);

  // Top 10k
  if (t1.overallRank <= 10000) add("🏆", "Elite", "Top 10k overall", 1, C1);
  if (t2.overallRank <= 10000) add("🏆", "Elite", "Top 10k overall", 2, C2);

  // Top 100k
  if (t1.overallRank > 10000 && t1.overallRank <= 100000) add("⭐", "Top 100k", "Among the best", 1, C1);
  if (t2.overallRank > 10000 && t2.overallRank <= 100000) add("⭐", "Top 100k", "Among the best", 2, C2);

  // Consistent
  if (t1.consistency < 10) add("📏", "Mr. Consistent", "Std dev under 10", 1, C1);
  if (t2.consistency < 10) add("📏", "Mr. Consistent", "Std dev under 10", 2, C2);

  if (!badges.length) return null;

  return (
    <div>
      <SectionTitle>Achievements</SectionTitle>
      <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
        {badges.map((b, i) => (
          <div key={i} style={{ background:"rgba(255,255,255,0.025)", border:"1px solid "+b.color+"30", borderRadius:10, padding:"8px 12px", display:"flex", alignItems:"center", gap:8, animation:"fadeInScale 0.3s ease forwards", animationDelay:(i*80)+"ms", opacity:0 }}>
            <span style={{ fontSize:18 }}>{b.emoji}</span>
            <div>
              <div style={{ fontSize:11, fontWeight:700, color:b.color }}>{b.title}</div>
              <div style={{ fontSize:9, color:"#64748B" }}>{b.desc}</div>
              <div style={{ fontSize:8, color:b.color, fontWeight:600, textTransform:"uppercase", letterSpacing:"0.05em", marginTop:1 }}>{b.side===1?t1.name:t2.name}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── GW Score Heatmap ─────────────────────────────────────────────

function GWHeatmap({ t1, t2 }) {
  const gws1 = t1.gwHistory, gws2 = t2.gwHistory;
  if (!gws1.length) return null;

  const allPts = [...gws1.map(g=>g.points), ...gws2.map(g=>g.points)];
  const minP = Math.min(...allPts), maxP = Math.max(...allPts);
  const range = maxP - minP || 1;

  const intensity = (pts) => {
    const t = (pts - minP) / range;
    if (t > 0.8) return "#00FF87";
    if (t > 0.6) return "#66BB6A";
    if (t > 0.4) return "#FFA726";
    if (t > 0.2) return "#EF5350";
    return "#B71C1C";
  };

  return (
    <div>
      <SectionTitle>Score Heatmap</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>GW score intensity — green is high, red is low</div>
      {[[t1,C1,gws1],[t2,C2,gws2]].map(([t,color,gws]) => (
        <div key={t.name} style={{ marginBottom:8 }}>
          <div style={{ fontSize:9, fontWeight:700, color, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:4 }}>{t.name}</div>
          <div style={{ display:"flex", gap:2, flexWrap:"wrap" }}>
            {gws.map(g => (
              <div key={g.gw} title={"GW"+g.gw+": "+g.points+"pts"} style={{ width:16, height:16, borderRadius:2, background:intensity(g.points), opacity:0.75, cursor:"default", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <span style={{ fontSize:6, fontWeight:700, color:"#060D1A", opacity:0.8 }}>{g.gw}</span>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div style={{ display:"flex", gap:6, marginTop:6, alignItems:"center" }}>
        <span style={{ fontSize:9, color:"#475569" }}>Low</span>
        {["#B71C1C","#EF5350","#FFA726","#66BB6A","#00FF87"].map(c => <div key={c} style={{ width:16, height:8, background:c, borderRadius:1, opacity:0.75 }}/>)}
        <span style={{ fontSize:9, color:"#475569" }}>High</span>
      </div>
    </div>
  );
}

// ── Bench Waste ──────────────────────────────────────────────────

function BenchWaste({ t1, t2 }) {

            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:24, fontWeight:700, color:w===side?color:w===0?AMBER:LOSE }}>{bp}<span style={{ fontSize:11, color:"#64748B", marginLeft:3 }}>pts</span></div>
            <div style={{ height:4, background:"#0F1E35", borderRadius:2, marginTop:8, overflow:"hidden" }}>

            </div>

// ── Scroll To Top ────────────────────────────────────────────────

function ScrollToTop() {
  const [show, setShow] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setShow(window.scrollY > 600);
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  if (!show) return null;
  return (
    <button className="scroll-top-btn" onClick={() => window.scrollTo({ top:0, behavior:"smooth" })}
      style={{ opacity: show ? 1 : 0, transform: show ? "scale(1)" : "scale(0.5)" }}>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 12V4M4 7l4-4 4 4" stroke="#060D1A" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
    </button>
  );
}

// ── Section Navigation ───────────────────────────────────────────

function SectionNav({ sections }) {
  const [active, setActive] = React.useState(0);

  React.useEffect(() => {
    const onScroll = () => {
      const scrollY = window.scrollY + window.innerHeight / 3;
      for (let i = sections.length - 1; i >= 0; i--) {
        const el = sections[i]?.ref?.current;
        if (el && el.offsetTop <= scrollY) { setActive(i); break; }
      }
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, [sections]);

  return (
    <div className="section-nav">
      {sections.map((s, i) => (
        <div key={i} className={"section-nav-dot" + (i===active?" active":"")}
          title={s.label}
          onClick={() => s.ref?.current?.scrollIntoView({ behavior:"smooth", block:"start" })}/>
      ))}
    </div>
  );
}

// ── Captain Donut ────────────────────────────────────────────────

function CaptainDonut({ rate, color, size=48 }) {
  const r = size/2 - 4;
  const circ = 2 * Math.PI * r;
  const offset = circ * (1 - rate/100);
  return (
    <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1E293B" strokeWidth="4"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="4" strokeLinecap="round"
        strokeDasharray={circ} strokeDashoffset={offset} style={{ transition:"stroke-dashoffset 1s ease" }}/>
    </svg>
  );
}

// ── Manager Tenure Badge ─────────────────────────────────────────

function ManagerBadge({ seasonCount }) {
  if (seasonCount >= 10) return { label: "Legend", emoji: "🏛️", color: "#FFD700" };
  if (seasonCount >= 7) return { label: "Veteran", emoji: "⭐", color: "#FFA726" };
  if (seasonCount >= 4) return { label: "Regular", emoji: "📋", color: "#66BB6A" };
  if (seasonCount >= 2) return { label: "Developing", emoji: "📈", color: "#42A5F5" };
  return { label: "Rookie", emoji: "🌱", color: "#CE93D8" };
}

// ── Radar Chart ───────────────────────────────────────────────────

function RadarChart({ t1, t2, h2h }) {
  const cats = [
    { label:"Points", v1:t1.totalPoints, v2:t2.totalPoints },
    { label:"Rank", v1:11000000-(t1.overallRank||0), v2:11000000-(t2.overallRank||0) },
    { label:"Form", v1:t1.gwHistory.slice(-5).reduce((s,g)=>s+g.points,0), v2:t2.gwHistory.slice(-5).reduce((s,g)=>s+g.points,0) },
    { label:"Captaincy", v1:t1.captainHistory?.filter(h=>h.wasOptimal).length||0, v2:t2.captainHistory?.filter(h=>h.wasOptimal).length||0 },
    { label:"Consistency", v1:30-(t1.consistency||0), v2:30-(t2.consistency||0) },
    { label:"Transfers", v1:100-(t1.transferCost||0), v2:100-(t2.transferCost||0) },
  ];
  const cx=100, cy=100, R=70, n=cats.length;
  const norm = cats.map(c => { const m=Math.max(c.v1,c.v2,1); return { ...c, n1:c.v1/m, n2:c.v2/m }; });
  const pt = (i,r) => { const a=Math.PI*2*i/n-Math.PI/2; return [cx+Math.cos(a)*r, cy+Math.sin(a)*r]; };
  const poly = (key) => norm.map((c,i) => pt(i, c[key]*R).join(",")).join(" ");
  return (
    <div>
      <SectionTitle>Manager Radar</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:8 }}>Comparative strengths across 6 dimensions</div>
      <svg viewBox="0 0 200 200" style={{ width:"100%", maxWidth:320, display:"block", margin:"0 auto" }}>
        {[0.25,0.5,0.75,1].map(s=><polygon key={s} points={Array.from({length:n},(_,i)=>pt(i,R*s).join(",")).join(" ")} fill="none" stroke="#1E293B" strokeWidth="0.5"/>)}
        {norm.map((c,i)=>{const[x,y]=pt(i,R+12);return <text key={i} x={x} y={y} textAnchor="middle" fill="#64748B" fontSize="7" dominantBaseline="middle">{c.label}</text>;})}
        <polygon points={poly("n1")} fill={C1} fillOpacity="0.15" stroke={C1} strokeWidth="1.5"/>
        <polygon points={poly("n2")} fill={C2} fillOpacity="0.15" stroke={C2} strokeWidth="1.5"/>
        {norm.map((c,i)=><React.Fragment key={i}><circle cx={pt(i,c.n1*R)[0]} cy={pt(i,c.n1*R)[1]} r="2.5" fill={C1}/><circle cx={pt(i,c.n2*R)[0]} cy={pt(i,c.n2*R)[1]} r="2.5" fill={C2}/></React.Fragment>)}
      </svg>
      <div style={{ display:"flex", gap:14, justifyContent:"center", marginTop:6 }}>
        {[[t1.name,C1],[t2.name,C2]].map(([n,c])=>(<div key={n} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,background:c,borderRadius:1}}/><span style={{fontSize:10,color:"#64748B"}}>{n}</span></div>))}
      </div>
    </div>
  );
}

// ── Position Pie Chart ───────────────────────────────────────────

function PositionPie({ t1, t2 }) {
  function Donut({ pp, color, name }) {
    const vals = [pp.gk, pp.def, pp.mid, pp.fwd];
    const colors = ["#8B5CF6","#3B82F6","#10B981","#F59E0B"];
    const labels = ["GK","DEF","MID","FWD"];
    const total = vals.reduce((a,b)=>a+b,0)||1;
    const r=30, cx=40, cy=40, circ=2*Math.PI*r;
    let offset=0;
    return (
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:10, color, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:4 }}>{name}</div>
        <svg width="80" height="80" style={{ display:"block", margin:"0 auto" }}>
          {vals.map((v,i) => { const dash=circ*(v/total); const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={colors[i]} strokeWidth="10" strokeDasharray={dash+" "+(circ-dash)} strokeDashoffset={-offset} transform={`rotate(-90 ${cx} ${cy})`}/>; offset+=dash; return el; })}
        </svg>
        <div style={{ display:"flex", gap:6, justifyContent:"center", marginTop:4, flexWrap:"wrap" }}>
          {labels.map((l,i)=><div key={l} style={{display:"flex",alignItems:"center",gap:2}}><div style={{width:6,height:6,borderRadius:1,background:colors[i]}}/><span style={{fontSize:8,color:"#64748B"}}>{l} {Math.round(vals[i]/total*100)}%</span></div>)}

  return (

  );
}

// ── Progress Ring ────────────────────────────────────────────────

function ProgressRing({ value, max, color, size=40, label }) {
  const r=size/2-4, circ=2*Math.PI*r, pct=Math.min(value/(max||1),1), offset=circ*(1-pct);
  return (
    <div style={{ display:"inline-flex", flexDirection:"column", alignItems:"center", gap:2 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1E293B" strokeWidth="3"/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset} style={{ transition:"stroke-dashoffset 1s ease" }}/>
      </svg>
      {label && <span style={{ fontSize:8, color:"#475569" }}>{label}</span>}
    </div>
  );
}

// ── Monthly Breakdown ────────────────────────────────────────────

function MonthlyBreakdown({ t1, t2 }) {
  const months = ["Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar","Apr","May"];
  const gwToMonth = (gw) => { const idx=Math.min(Math.floor((gw-1)/3.8), months.length-1); return months[idx]; };
  const group = (gws) => {
    const m = {};
    gws.forEach(g => { const mo = gwToMonth(g.gw); m[mo] = (m[mo]||0) + g.points; });
    return m;
  };
  const m1 = group(t1.gwHistory), m2 = group(t2.gwHistory);
  const active = months.filter(mo => m1[mo] || m2[mo]);
  const max = Math.max(...active.map(mo => Math.max(m1[mo]||0, m2[mo]||0)), 1);
  if (!active.length) return null;
  return (
    <div>
      <SectionTitle>Monthly Breakdown</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>Points split by approximate month</div>
      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
        {active.map(mo => (
          <div key={mo} style={{ display:"grid", gridTemplateColumns:"36px 1fr", gap:8, alignItems:"center" }}>
            <span style={{ fontSize:10, color:"#64748B", fontWeight:600 }}>{mo}</span>
            <div style={{ display:"flex", gap:2, height:14 }}>
              <div style={{ width:Math.round(((m1[mo]||0)/max)*100)+"%", background:C1, borderRadius:2, opacity:0.7, minWidth:(m1[mo]?2:0), transition:"width 0.5s ease" }}/>
              <div style={{ width:Math.round(((m2[mo]||0)/max)*100)+"%", background:C2, borderRadius:2, opacity:0.7, minWidth:(m2[mo]?2:0), transition:"width 0.5s ease" }}/>
            </div>
          </div>
        ))}
      </div>
      <div style={{ display:"flex", gap:14, marginTop:8 }}>
        {[[t1.name,C1],[t2.name,C2]].map(([n,c])=>(<div key={n} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,background:c,borderRadius:1}}/><span style={{fontSize:10,color:"#64748B"}}>{n}</span></div>))}
      </div>
    </div>
  );
}

// ── Manager Power Rating ─────────────────────────────────────────

function ManagerPowerRating({ t1, t2, h2h }) {
  function calcGrade(t, wins) {
    let score = 0;
    if (t.overallRank <= 10000) score += 40; else if (t.overallRank <= 100000) score += 30; else if (t.overallRank <= 500000) score += 20; else if (t.overallRank <= 1000000) score += 10;
    score += Math.min(20, Math.round((t.totalPoints / 2000) * 20));
    score += Math.min(15, Math.round(wins / (h2h.gwResults?.length||1) * 15));
    score += Math.min(10, (t.captainHistory?.filter(h=>h.wasOptimal).length||0));
    score += Math.min(15, 15 - Math.round(t.transferCost / 8));
    score = Math.max(0, Math.min(100, score));
    if (score >= 90) return { grade:"A+", color:"#00FF87" };
    if (score >= 80) return { grade:"A", color:"#00FF87" };
    if (score >= 70) return { grade:"B+", color:"#66BB6A" };
    if (score >= 60) return { grade:"B", color:"#66BB6A" };
    if (score >= 50) return { grade:"C+", color:"#FFA726" };
    if (score >= 40) return { grade:"C", color:"#FFA726" };
    if (score >= 30) return { grade:"D", color:"#EF5350" };
    return { grade:"F", color:"#B71C1C" };
  }
  const g1 = calcGrade(t1, h2h.team1Wins), g2 = calcGrade(t2, h2h.team2Wins);
  return (
    <div>
      <SectionTitle>Manager Rating</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:12 }}>Composite rating based on rank, points, captaincy and transfers</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        {[[t1,C1,g1],[t2,C2,g2]].map(([t,color,g]) => (
          <div key={t.name} style={{ background:"linear-gradient(135deg,"+color+"0A,transparent)", border:"1px solid "+color+"20", borderRadius:10, padding:"16px", textAlign:"center", overflow:"hidden", minWidth:0 }}>
            <div style={{ fontSize:10, color, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}</div>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:48, fontWeight:800, color:g.color, lineHeight:1, animation:"bounceIn 0.5s ease" }}>{g.grade}</div>
            <div style={{ fontSize:9, color:"#475569", marginTop:4 }}>Season Grade</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Season Grade ─────────────────────────────────────────────────

function SeasonGradeCard({ t1, t2 }) {
  function grades(t) {
    const pts = t.totalPoints, rank = t.overallRank, cap = t.captainHistory?.filter(h=>h.wasOptimal).length||0, total = t.captainHistory?.length||1;
    const g = (v,thresholds) => { for(const[th,gr] of thresholds) if(v>=th) return gr; return "F"; };
    return {
      overall: g(pts, [[2200,"A+"],[2000,"A"],[1800,"B+"],[1600,"B"],[1400,"C"],[1200,"D"]]),
      captaincy: g(cap/total*100, [[40,"A"],[30,"B+"],[25,"B"],[20,"C"],[15,"D"]]),
      transfers: g(100-t.transferCost, [[96,"A+"],[88,"A"],[80,"B"],[60,"C"],[40,"D"]]),
      consistency: g(30-t.consistency, [[20,"A"],[16,"B+"],[12,"B"],[8,"C"],[4,"D"]]),
    };
  }
  const g1 = grades(t1), g2 = grades(t2);
  const subjects = [["Overall","overall"],["Captaincy","captaincy"],["Transfers","transfers"],["Consistency","consistency"]];
  const gradeColor = g => g.startsWith("A")?"#00FF87":g.startsWith("B")?"#66BB6A":g.startsWith("C")?"#FFA726":g.startsWith("D")?"#EF5350":"#B71C1C";
  return (
    <div>
      <SectionTitle>Season Report Card</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>Academic-style grades for the season</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr var(--hist-col) 1fr", gap:0 }}>
        <div style={{ textAlign:"right", paddingRight:8 }}><div style={{ fontSize:10, color:C1, fontWeight:700, textTransform:"uppercase" }}>{t1.name}</div></div>
        <div style={{ textAlign:"center", fontSize:9, color:"#475569", fontWeight:700 }}>SUBJECT</div>
        <div style={{ paddingLeft:8 }}><div style={{ fontSize:10, color:C2, fontWeight:700, textTransform:"uppercase" }}>{t2.name}</div></div>
      </div>
      {subjects.map(([label,key])=>(
        <div key={key} style={{ display:"grid", gridTemplateColumns:"1fr var(--hist-col) 1fr", padding:"6px 0", borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
          <div style={{ textAlign:"right", paddingRight:8 }}><span style={{ fontFamily:"'DM Mono',monospace", fontSize:16, fontWeight:700, color:gradeColor(g1[key]) }}>{g1[key]}</span></div>
          <div style={{ textAlign:"center", fontSize:10, color:"#64748B", fontWeight:600 }}>{label}</div>
          <div style={{ paddingLeft:8 }}><span style={{ fontFamily:"'DM Mono',monospace", fontSize:16, fontWeight:700, color:gradeColor(g2[key]) }}>{g2[key]}</span></div>
        </div>
      ))}
    </div>
  );
}

// ── Standalone helpers (used by both components and share cards) ─

function getMotto(t) {
  if (t.overallRank <= 10000) return pickTag(["Born to win.", "Excellence is a habit.", "Top 10k is just the beginning."]);
  if (t.managerStyle==="Tinkerer") return pickTag(["No squad is ever complete.", "One more transfer...", "Change is the only constant."]);
  if (t.managerStyle==="Set-and-Forget") return pickTag(["Trust the process.", "Patience pays dividends.", "Set it and forget it."]);
  if (t.transferCost >= 20) return pickTag(["Hits don't scare me.", "Fortune favours the bold.", "No risk, no reward."]);
  if (t.consistency < 12) return pickTag(["Steady as she goes.", "Boring but effective.", "Consistency is key."]);
  if (t.positionPoints.fwd > t.positionPoints.def) return pickTag(["Attack wins games.", "Goals change everything.", "Defence is for cowards."]);
  return pickTag(["It's a marathon, not a sprint.", "Trust the template.", "Every point counts."]);
}

function getAnimal(t) {
  if (t.consistency < 10) return { emoji:"🐢", name:"The Tortoise", desc:"Slow, steady, reliable. Wins the race." };
  if (t.transferCost >= 20) return { emoji:"🦅", name:"The Eagle", desc:"Always hunting for the next big move." };
  if (t.overallRank <= 50000) return { emoji:"🦁", name:"The Lion", desc:"King of the jungle. Top of the food chain." };
  if (t.managerStyle === "Tinkerer") return { emoji:"🐒", name:"The Monkey", desc:"Can't keep still. Always changing things up." };
  if (t.managerStyle === "Set-and-Forget") return { emoji:"🦉", name:"The Owl", desc:"Wise and patient. Trusts the process." };
  if (t.avgPointsPerGW >= 60) return { emoji:"🐆", name:"The Cheetah", desc:"Lightning fast scorer. Explosive bursts." };
  if (t.positionPoints.fwd > t.positionPoints.def) return { emoji:"🦊", name:"The Fox", desc:"Cunning and attack-minded." };
  if (t.positionPoints.def > t.positionPoints.mid) return { emoji:"🐻", name:"The Bear", desc:"Strong defensive instincts. Built like a fortress." };
  return { emoji:"🐺", name:"The Wolf", desc:"Balanced and adaptable. Part of the pack." };
}

function getPersonality(t) {
  const active = t.managerStyle==="Tinkerer"||t.managerStyle==="Active";
  const attacking = t.positionPoints.fwd + t.positionPoints.mid > t.positionPoints.def * 2.5;
  if (active && attacking) return { type:"The Gambler", icon:"🎰", traits:["Risk-taker","Attack-heavy","Transfer-happy"], color:"#EF4444" };
  if (active && !attacking) return { type:"The Strategist", icon:"♟️", traits:["Calculated","Defensive-minded","Always tinkering"], color:"#8B5CF6" };
  if (!active && attacking) return { type:"The Believer", icon:"🙏", traits:["Patient","Attack-focused","Trusts the plan"], color:"#F59E0B" };
  return { type:"The Zen Master", icon:"🧘", traits:["Calm","Balanced","Set-and-forget"], color:"#10B981" };
}

function getAlignment(t) {
  const lawful = t.managerStyle==="Set-and-Forget" || t.managerStyle==="Balanced";
  const good = t.overallRank <= 500000;
  if (lawful && good) return { a:"Lawful Good", desc:"Template follower, top rank", icon:"⚖️" };
  if (lawful && !good) return { a:"Lawful Neutral", desc:"Plays by the book, average results", icon:"📏" };
  if (!lawful && good) return { a:"Chaotic Good", desc:"Wildcard genius, breaks the rules to win", icon:"🎭" };
  if (t.transferCost >= 20) return { a:"Chaotic Evil", desc:"Takes hits like they're going out of style", icon:"💀" };
  if (!lawful && !good) return { a:"Chaotic Neutral", desc:"Unpredictable and proud of it", icon:"🌀" };
  return { a:"True Neutral", desc:"Balanced in all things", icon:"☯️" };
}

function getRoasts(t, opp, wins, h2h) {
  const roasts = [];
  const n = t.name, on = opp.name;
  const capRate = t.captainHistory?.length ? Math.round(t.captainHistory.filter(h=>h.wasOptimal).length/t.captainHistory.length*100) : 0;
  const worstGw = t.gwHistory?.length ? Math.min(...t.gwHistory.map(g=>g.points)) : null;
  const oppWins = h2h?.team1Wins != null && wins === h2h.team1Wins ? h2h.team2Wins : h2h?.team1Wins;

  // Transfer chaos
  if (t.transferCost >= 32) roasts.push(n + " burned " + t.transferCost + " pts on hits. That's not managing, that's self-harm.");
  else if (t.transferCost >= 16) roasts.push(t.transferCost + " points in hits. " + on + " is winning this without even trying while " + n + " pays to lose.");
  if (t.transfersTotal > 50) roasts.push(t.transfersTotal + " transfers. " + n + " changes their team more often than their socks.");
  else if (t.transfersTotal > 40) roasts.push(t.transfersTotal + " transfers and still losing. " + n + " is proof that effort doesn't always equal results.");

  // Rank shame
  if (t.overallRank > 5000000) roasts.push(n + " is ranked " + fmt(t.overallRank) + ". That's bottom half of ALL FPL players. " + on + " should be embarrassed to even know them.");
  else if (t.overallRank > 3000000) roasts.push("Ranked " + fmt(t.overallRank) + ". " + n + "'s nan could do better. " + on + " and everyone else is laughing.");
  else if (t.overallRank > 1000000) roasts.push(n + " is ranked " + fmt(t.overallRank) + ". The definition of mid. " + on + " barely considers this a competition.");

  // Consistency
  if (t.consistency > 22) roasts.push(n + " has a consistency of ±" + t.consistency + ". That's not a strategy, that's a cry for help.");
  else if (t.consistency > 18) roasts.push("Consistency of ±" + t.consistency + ". " + n + " doesn't play FPL, they play FPL roulette.");

  // H2H specific — really rub it in
  if (wins === 0 && h2h?.gwResults?.length > 10) roasts.push("ZERO H2H wins in " + h2h.gwResults.length + " GWs. " + on + " owns " + n + ". This is a hostage situation, not a rivalry.");
  else if (wins < 3 && h2h?.gwResults?.length > 20) roasts.push(wins + " wins in " + h2h.gwResults.length + " matchups. " + on + " treats " + n + " like a bye week.");
  else if (wins < 5 && h2h?.gwResults?.length > 15) roasts.push("Only " + wins + " H2H wins. " + on + " doesn't even prepare for gameweeks against " + n + " anymore.");
  if (oppWins > 0 && wins > 0 && oppWins > wins * 2.5) roasts.push(on + " has " + oppWins + " wins to " + n + "'s " + wins + ". That's not a rivalry, that's a mismatch.");

  // Bench points
  if (t.positionPoints.benchPts > 150) roasts.push(t.positionPoints.benchPts + " points rotting on " + n + "'s bench. Entire teams would kill for that. Shocking selection.");
  else if (t.positionPoints.benchPts > 100) roasts.push(n + " left " + t.positionPoints.benchPts + " points on the bench. " + on + " is grateful for the free wins.");

  // Captain
  if (capRate < 10 && t.captainHistory?.length > 10) roasts.push(n + "'s optimal captain rate is " + capRate + "%. A monkey throwing darts would literally do better.");
  else if (capRate < 20) roasts.push("Captain success rate: " + capRate + "%. " + n + " hands the armband out like it's a punishment, not a reward.");
  else if (capRate < 30 && t.captainHistory?.length > 15) roasts.push(capRate + "% captain accuracy. " + n + " gives the armband to the wrong player 3 out of 4 weeks.");

  // Red arrows
  if (t.redArrows > t.greenArrows * 2) roasts.push(t.redArrows + " red arrows vs " + t.greenArrows + " green. " + n + " is speedrunning to the bottom while " + on + " watches.");
  else if (t.redArrows > t.greenArrows) roasts.push("More red arrows (" + t.redArrows + ") than green (" + t.greenArrows + "). " + n + "'s season trajectory looks like a ski slope.");
  if (t.redArrows > 18) roasts.push(t.redArrows + " red arrows. " + n + " doesn't climb rankings, they abseil down them.");

  // Team value
  if (t.teamValue && t.teamValue < 980) roasts.push(n + "'s squad is worth £" + (t.teamValue/10).toFixed(1) + "m. Bargain bin football. Even their players want a transfer away.");
  if (t.teamValue > 1060 && t.overallRank > 1000000) roasts.push("£" + (t.teamValue/10).toFixed(1) + "m squad, ranked " + fmt(t.overallRank) + ". " + n + " proves money can't buy FPL ability.");

  // Performance
  if (t.avgPointsPerGW < 35) roasts.push(n + " averages " + t.avgPointsPerGW + " pts/GW. " + on + "'s captain alone probably beats that most weeks.");
  else if (t.avgPointsPerGW < 42) roasts.push(t.avgPointsPerGW + " avg pts/GW. " + n + " is consistently disappointing. At least they're consistent at something.");
  if (t.highestGwPoints && t.highestGwPoints < 55) roasts.push(n + "'s best EVER week is " + t.highestGwPoints + " pts. " + on + " probably does that on a bad week.");
  else if (t.highestGwPoints && t.highestGwPoints < 65) roasts.push("Season best of " + t.highestGwPoints + ". " + on + " calls that a Tuesday.");

  // Worst GW
  if (worstGw !== null && worstGw < 15) roasts.push(n + " once scored " + worstGw + " in a gameweek. That's not FPL, that's a welfare check.");
  else if (worstGw !== null && worstGw < 25) roasts.push("Lowest score: " + worstGw + " pts. " + on + " and their mates had a field day that week.");

  // vs opponent — make it personal
  if (opp.totalPoints - t.totalPoints > 150) roasts.push(on + " is " + fmt(opp.totalPoints - t.totalPoints) + " points ahead. " + n + " isn't in a rivalry, they're in denial.");
  else if (opp.totalPoints - t.totalPoints > 100) roasts.push(fmt(opp.totalPoints - t.totalPoints) + " points behind " + on + ". " + n + " will catch up approximately never.");
  else if (opp.totalPoints - t.totalPoints > 50) roasts.push(on + " leads by " + fmt(opp.totalPoints - t.totalPoints) + " pts. " + n + " is playing a completely different game.");
  if (opp.overallRank < 100000 && t.overallRank > 2000000) roasts.push(on + " is top 100k. " + n + " is ranked " + fmt(t.overallRank) + ". This is men vs boys.");
  if (opp.overallRank < t.overallRank * 0.3 && t.overallRank > 500000) roasts.push(on + " made " + n + " look silly this season. The rank difference is genuinely embarrassing.");

  // Season count vs rank
  if (t.seasonCount > 5 && t.overallRank > 2000000) roasts.push(t.seasonCount + " seasons and ranked " + fmt(t.overallRank) + ". " + n + " has been bad at this for YEARS.");
  if (t.seasonCount > 8 && t.overallRank > 1000000) roasts.push(t.seasonCount + " years of FPL and still this bad. " + on + " and their friends are laughing at " + n + ".");
  if (t.seasonCount <= 1 && t.overallRank > 3000000) roasts.push("First season? " + n + " is making every rookie mistake in the book. " + on + " is feasting.");

  // Net points
  if (t.transferCost > 0 && t.netPoints < t.totalPoints * 0.95) roasts.push(n + "'s net points after hits: " + fmt(t.netPoints) + ". They literally paid money to be worse. " + on + " is loving it.");

  // Extra savage personalized
  if (t.avgPointsPerGW < opp.avgPointsPerGW - 8) roasts.push(on + " averages " + opp.avgPointsPerGW + " pts/GW. " + n + " averages " + t.avgPointsPerGW + ". The gap is hilarious.");
  if (opp.greenArrows > t.greenArrows * 2 && t.greenArrows > 0) roasts.push(on + " has " + opp.greenArrows + " green arrows to " + n + "'s " + t.greenArrows + ". One is climbing, one is sinking.");
  if (t.overallRank > opp.overallRank * 3 && opp.overallRank > 0) roasts.push(n + " is ranked " + fmt(t.overallRank) + " while " + on + " sits at " + fmt(opp.overallRank) + ". Levels to this game.");

  // Shuffle and return
  for (let i = roasts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [roasts[i], roasts[j]] = [roasts[j], roasts[i]]; }
  return roasts.length ? roasts : ["Nothing to roast here. " + n + " lives to fight another day. 👏"];
}

function getVerdictData(t1, t2, h2h) {
  const cats = [];
  const add = (label, v1, v2, lowerBetter) => {
    if (v1 == null || v2 == null || v1 === v2) return;
    const t1Wins = lowerBetter ? v1 < v2 : v1 > v2;
    cats.push({ label, winner: t1Wins ? 1 : 2 });
  };
  add("Total Points", t1.totalPoints, t2.totalPoints);
  add("Overall Rank", t1.overallRank, t2.overallRank, true);
  add("H2H Record", h2h.team1Wins, h2h.team2Wins);
  add("Best GW", t1.highestGwPoints, t2.highestGwPoints);
  add("Team Value", t1.teamValue, t2.teamValue);
  add("Transfer Cost", t1.transferCost, t2.transferCost, true);
  add("Goals", t1.squadStats.goals, t2.squadStats.goals);
  add("Assists", t1.squadStats.assists, t2.squadStats.assists);
  add("Clean Sheets", t1.squadStats.cleanSheets, t2.squadStats.cleanSheets);
  add("Bonus", t1.squadStats.bonus, t2.squadStats.bonus);
  const t1Score = cats.filter(c => c.winner === 1).length;
  const t2Score = cats.filter(c => c.winner === 2).length;
  const total = cats.length || 1;
  const winner = t1Score > t2Score ? 1 : t2Score > t1Score ? 2 : 0;
  const wName = winner === 1 ? t1.name : winner === 2 ? t2.name : null;
  const margin = Math.abs(t1Score - t2Score);
  let msg;
  if (winner === 0) msg = "DEAD LEVEL — PERFECTLY BALANCED";
  else if (margin >= 6) msg = wName + " DOMINATES ACROSS THE BOARD";
  else if (margin >= 3) msg = wName + " TAKES IT COMFORTABLY";
  else msg = wName + " JUST EDGES IT";
  return { t1Score, t2Score, total, winner, wName, msg, cats };
}

function PowerLevelMeter({ t1, t2 }) {
  function calcPower(t) {
    let p = 0;
    p += Math.round(t.totalPoints / 20);
    p += Math.round((11000000 - (t.overallRank||11000000)) / 100000);
    p += (t.captainHistory?.filter(h=>h.wasOptimal).length||0) * 5;
    p += Math.round(30 - (t.consistency||0)) * 2;
    p -= t.transferCost;
    return Math.max(0, p);
  }
  const p1 = calcPower(t1), p2 = calcPower(t2);
  const max = Math.max(p1, p2, 1);
  return (
    <div>
      <SectionTitle>Power Level</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>Composite score based on points, rank, captaincy, consistency and transfer efficiency</div>

            <div style={{ fontSize:10, color, fontWeight:700, textTransform:"uppercase", marginBottom:6 }}>{t.name}</div>
            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:28, fontWeight:700, color, lineHeight:1, animation:"countUp 0.5s ease" }}>{p.toLocaleString()}</div>
            <div style={{ height:6, background:"#0F1E35", borderRadius:3, marginTop:8, overflow:"hidden" }}>
              <div style={{ width:Math.round(p/max*100)+"%", height:"100%", background:"linear-gradient(90deg,"+color+","+color+"88)", borderRadius:3, animation:"fillWidth 1s ease forwards" }}/>
            </div>
            <div style={{ fontSize:9, color:"#475569", marginTop:4 }}>{p>150?"LEGENDARY":p>120?"ELITE":p>90?"STRONG":p>60?"DECENT":"DEVELOPING"}</div>

      </div>
    </div>
  );
}

function EmojiStory({ t1, t2, h2h }) {
  function buildStory(t, side) {
    const emojis = [];
    const gws = t.gwHistory;
    if (!gws.length) return "📭";
    const avg = gws.reduce((s,g)=>s+g.points,0)/gws.length;
    gws.forEach((g,i) => {
      const hw = h2h.gwResults?.find(r=>r.gw===g.gw);
      const won = hw && hw.winner===side;
      const lost = hw && hw.winner!==(side==="team1"?"team2":"team1") && hw.winner!==side && hw.winner!=="draw";
      if (g.points >= 80) emojis.push("🚀");
      else if (g.points >= avg + 10) emojis.push(won?"🏆":"⭐");
      else if (g.points >= avg) emojis.push(won?"✅":"👍");
      else if (g.points >= avg - 10) emojis.push("😐");
      else emojis.push(g.points < 30 ? "💀" : "📉");
    });
    return emojis.join("");
  }
  return (
    <div>
      <SectionTitle>Season in Emojis</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>Each emoji = one gameweek</div>
      {[[t1,C1,"team1"],[t2,C2,"team2"]].map(([t,color,side]) => (
        <div key={t.name} style={{ marginBottom:8 }}>
          <div style={{ fontSize:10, color, fontWeight:700, textTransform:"uppercase", marginBottom:3 }}>{t.name}</div>
          <div style={{ fontSize:14, lineHeight:1.8, letterSpacing:1, wordBreak:"break-all" }}>{buildStory(t, side)}</div>
        </div>
      ))}
      <div style={{ display:"flex", gap:8, marginTop:6, flexWrap:"wrap" }}>
        {[["🚀","80+"],["⭐","Great"],["✅","Good"],["😐","Average"],["📉","Below"],["💀","Terrible"]].map(([e,l])=>(
          <span key={l} style={{ fontSize:9, color:"#475569" }}>{e}={l}</span>
        ))}
      </div>
    </div>
  );
}

function RiskRating({ t1, t2 }) {
  function calcRisk(t) {
    let risk = 0;
    risk += Math.min(40, t.transferCost * 2);
    risk += t.consistency > 15 ? 20 : t.consistency > 12 ? 10 : 0;
    risk += t.managerStyle==="Tinkerer" ? 20 : t.managerStyle==="Active" ? 10 : 0;
    if (t.positionPoints.fwd > t.positionPoints.def * 1.5) risk += 10;
    return Math.min(100, risk);
  }
  const r1 = calcRisk(t1), r2 = calcRisk(t2);
  const riskLabel = r => r >= 70 ? "High Risk" : r >= 40 ? "Moderate" : "Conservative";
  const riskColor = r => r >= 70 ? "#EF4444" : r >= 40 ? "#F59E0B" : "#10B981";
  return (
    <div>
      <SectionTitle>Risk Rating</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>How much risk does each manager take?</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        {[[t1,C1,r1],[t2,C2,r2]].map(([t,color,r]) => (

            </div>

function PointsNeeded({ t1, t2 }) {
  const diff = Math.abs(t1.totalPoints - t2.totalPoints);
  const leader = t1.totalPoints >= t2.totalPoints ? t1 : t2;
  const chaser = t1.totalPoints >= t2.totalPoints ? t2 : t1;
  const lcol = leader === t1 ? C1 : C2;
  const ccol = chaser === t1 ? C1 : C2;
  const gwsLeft = Math.max(0, 38 - (t1.gwHistory.length || 0));
  const ptsPerGW = gwsLeft ? Math.ceil(diff / gwsLeft) : diff;
  const ptsPerGWExact = gwsLeft ? (diff / gwsLeft).toFixed(1) : diff;
  if (diff === 0) return null;
  return (
    <div>
      <SectionTitle>The Chase</SectionTitle>
      <div style={{ textAlign:"center", padding:"10px 0" }}>
        <div style={{ fontSize:11, color:"#94A3B8", marginBottom:8 }}><span style={{ color:ccol, fontWeight:700 }}>{chaser.name}</span> needs</div>
        <div style={{ fontFamily:"'DM Mono',monospace", fontSize:36, fontWeight:700, color:ccol, lineHeight:1 }}>{diff}<span style={{ fontSize:14, color:"#64748B", marginLeft:4 }}>pts</span></div>
        <div style={{ fontSize:11, color:"#64748B", marginTop:6 }}>to catch <span style={{ color:lcol, fontWeight:700 }}>{leader.name}</span></div>
        {gwsLeft > 0 && <div style={{ fontSize:10, color:"#475569", marginTop:6 }}>That's <span style={{ fontFamily:"'DM Mono',monospace", color:AMBER, fontWeight:700 }}>{ptsPerGW}</span> extra points per GW over {gwsLeft} remaining GWs</div>}
        {gwsLeft > 0 && <div style={{ fontSize:9, color:"#334155", marginTop:3 }}>({ptsPerGWExact} pts/GW exact average)</div>}
      </div>
    </div>
  );
}

// ── Chip Impact ──────────────────────────────────────────────────

function ChipImpact({ t1, t2 }) {
  function chipValue(t) {
    const avg = t.avgPointsPerGW;
    return (t.chipResults||[]).map(c => {
      // For BB and TC, use actual chip bonus (extraPoints) if available
      // For Wildcard/Free Hit, compare GW score to average
      const hasExtra = (c.name === "bboost" || c.name === "3xc") && c.extraPoints != null;
      const diff = hasExtra ? c.extraPoints : (c.points ? c.points - avg : 0);
      const metric = hasExtra ? "bonus pts" : "vs avg";
      return { label:c.label, gw:c.gw, pts:c.points, diff, metric, name:c.name };
    }).sort((a,b)=>b.diff-a.diff);
  }
  const cv1 = chipValue(t1), cv2 = chipValue(t2);
  if (!cv1.length && !cv2.length) return null;
  return (
    <div>
      <SectionTitle>Chip Impact</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>Chip value: BB/TC show actual bonus points, others show GW score vs average</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        {[[t1,C1,cv1],[t2,C2,cv2]].map(([t,color,chips]) => (
          <div key={t.name}>
            <div style={{ fontSize:10, color, fontWeight:700, textTransform:"uppercase", marginBottom:4 }}>{t.name}</div>
            {chips.map((c,i)=>(
              <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"4px 6px", background:"rgba(255,255,255,0.02)", borderRadius:4, marginBottom:2 }}>
                <span style={{ fontSize:9, color:"#64748B" }}>{c.label}</span>
                <div style={{ textAlign:"right" }}>
                  <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:700, color:c.diff>=0?"#00FF87":"#EF4444" }}>{c.diff>=0?"+":""}{Math.round(c.diff)}</span>
                  <span style={{ fontSize:7, color:"#475569", marginLeft:3 }}>{c.metric}</span>
                </div>
              </div>
            ))}
            {chips.length > 0 && (() => {
              const total = chips.reduce((s,c)=>s+c.diff, 0);
              return (
                <div style={{ display:"flex", justifyContent:"space-between", padding:"5px 6px", borderTop:"1px solid rgba(255,255,255,0.06)", marginTop:4 }}>
                  <span style={{ fontSize:9, fontWeight:700, color:"#94A3B8" }}>Total Impact</span>
                  <span style={{ fontFamily:"'DM Mono',monospace", fontSize:10, fontWeight:700, color:total>=0?"#00FF87":"#EF4444" }}>{total>=0?"+":""}{Math.round(total)}</span>
                </div>
              );
            })()}
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Season Arc ───────────────────────────────────────────────────

function SeasonArc({ t1, t2 }) {
  const split = (gws) => {
    const n = gws.length;
    if (n < 6) return null;
    const third = Math.floor(n/3);
    const early = gws.slice(0, third).reduce((s,g)=>s+g.points,0);
    const mid = gws.slice(third, third*2).reduce((s,g)=>s+g.points,0);
    const late = gws.slice(third*2).reduce((s,g)=>s+g.points,0);
    return { early, mid, late };
  };
  const a1 = split(t1.gwHistory), a2 = split(t2.gwHistory);
  if (!a1 || !a2) return null;
  const phases = ["early","mid","late"];
  const labels = ["Early","Mid","Late"];
  const max = Math.max(...phases.flatMap(p=>[a1[p],a2[p]]),1);
  return (
    <div>
      <SectionTitle>Season Arc</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>Early, mid and late season performance</div>
      <div style={{ display:"flex", gap:6 }}>
        {phases.map((p,i) => (
          <div key={p} style={{ flex:1, textAlign:"center" }}>
            <div style={{ fontSize:9, color:"#64748B", fontWeight:700, marginBottom:4 }}>{labels[i]}</div>
            <div style={{ display:"flex", gap:2, justifyContent:"center", height:50, alignItems:"flex-end" }}>
              <div style={{ width:16, height:Math.max(4,Math.round(a1[p]/max*50)), background:C1, borderRadius:2, opacity:0.8 }}/>
              <div style={{ width:16, height:Math.max(4,Math.round(a2[p]/max*50)), background:C2, borderRadius:2, opacity:0.8 }}/>
            </div>
            <div style={{ display:"flex", gap:4, justifyContent:"center", marginTop:4 }}>
              <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C1 }}>{a1[p]}</span>
              <span style={{ fontFamily:"'DM Mono',monospace", fontSize:9, color:C2 }}>{a2[p]}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── What-If Scenarios ────────────────────────────────────────────

function WhatIfScenarios({ t1, t2 }) {
  const noHits1 = t1.totalPoints + t1.transferCost;
  const noHits2 = t2.totalPoints + t2.transferCost;
  const optCap1 = t1.captainHistory ? t1.captainHistory.reduce((s,h)=>s+h.optimalPts,0) : 0;
  const optCap2 = t2.captainHistory ? t2.captainHistory.reduce((s,h)=>s+h.optimalPts,0) : 0;
  const actCap1 = t1.captainHistory ? t1.captainHistory.reduce((s,h)=>s+h.captainPts,0) : 0;
  const actCap2 = t2.captainHistory ? t2.captainHistory.reduce((s,h)=>s+h.captainPts,0) : 0;
  const optTotal1 = t1.totalPoints + (optCap1 - actCap1);
  const optTotal2 = t2.totalPoints + (optCap2 - actCap2);

  // No Captaincy: subtract all captain bonus points (captain gets 2x, so remove the extra 1x)
  const noCap1 = t1.totalPoints - actCap1;
  const noCap2 = t2.totalPoints - actCap2;

  // No Chips Used: subtract chip extra points where available
  const chipExtra = (t) => (t.chipResults||[]).reduce((s,c) => {
    if (c.name === "bboost" && c.extraPoints != null) return s + c.extraPoints;
    if (c.name === "3xc" && c.extraPoints != null) return s + c.extraPoints;
    // Free Hit and Wildcard: can't calculate the counterfactual easily
    return s;
  }, 0);
  const noChips1 = t1.totalPoints - chipExtra(t1);
  const noChips2 = t2.totalPoints - chipExtra(t2);

  // No Transfers: GW1 squad all season — approximate by total points minus all transfer-related gains
  // We can't know GW1 squad scores exactly, so estimate: total points + transfer cost - (transfers × estimated gain per transfer)
  // Better approach: show what they'd have if they never made transfers and never took hits
  const noXfers1 = t1.totalPoints + t1.transferCost;
  const noXfers2 = t2.totalPoints + t2.transferCost;
  // Note: this is the same as No Transfer Hits since we can't model GW1 squad retroactively without full data

  return (
    <div>
      <SectionTitle>What If...?</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>Alternative reality scenarios</div>
      <ColHeaders name1={t1.name} name2={t2.name} centre="Scenario"/>
      <StatRow label="No Transfer Hits" val1={fmt(noHits1)} val2={fmt(noHits2)}/>
      <StatRow label="Perfect Captaincy" val1={fmt(optTotal1)} val2={fmt(optTotal2)}/>
      <StatRow label="No Captaincy" val1={fmt(noCap1)} val2={fmt(noCap2)}/>
      <StatRow label="No Chips Used" val1={fmt(noChips1)} val2={fmt(noChips2)}/>
      <StatRow label="Captain Pts Missed" val1={optCap1-actCap1} val2={optCap2-actCap2} lowerIsBetter/>
      <StatRow label="Hits Pts Wasted" val1={t1.transferCost} val2={t2.transferCost} lowerIsBetter/>
    </div>
  );
}

// ── Loyalty Score ────────────────────────────────────────────────

function LoyaltyScore({ t1, t2 }) {
  const loyalty = (t) => {
    const gws = t.gwHistory.length||1;
    const transfers = t.transfersTotal||0;
    const rate = transfers / gws;
    if (rate < 0.5) return { pct:95, label:"Ultra Loyal" };
    if (rate < 0.8) return { pct:80, label:"Very Loyal" };
    if (rate < 1.1) return { pct:60, label:"Balanced" };
    if (rate < 1.5) return { pct:35, label:"Restless" };
    return { pct:15, label:"Serial Tinkerer" };
  };
  const l1 = loyalty(t1), l2 = loyalty(t2);
  return (
    <div>
      <SectionTitle>Loyalty Score</SectionTitle>
      <div style={{ fontSize:11, color:"#475569", marginBottom:10 }}>How loyal is each manager to their squad?</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
        {[[t1,C1,l1],[t2,C2,l2]].map(([t,color,l]) => (
          <div key={t.name} style={{ background:"linear-gradient(135deg,"+color+"0A,transparent)", border:"1px solid "+color+"20", borderRadius:10, padding:"12px", textAlign:"center" }}>
            <div style={{ fontSize:10, color, fontWeight:700, textTransform:"uppercase", marginBottom:6 }}>{t.name}</div>
            <ProgressRing value={l.pct} max={100} color={color} size={48}/>
            <div style={{ fontFamily:"'DM Mono',monospace", fontSize:18, fontWeight:700, color, marginTop:4 }}>{l.pct}%</div>
            <div style={{ fontSize:9, color:"#475569", marginTop:2 }}>{l.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── Point Streaks ────────────────────────────────────────────────

function PointStreaksViz({ t1, t2 }) {
  function streaks(gws) {
    if (!gws.length) return [];
    const avg = gws.reduce((s,g)=>s+g.points,0)/gws.length;
    return gws.map(g => g.points >= avg);

  const s1 = streaks(t1.gwHistory), s2 = streaks(t2.gwHistory);

function StatsCard({ t1, t2 }) {
  const capRate = (t) => t.captainHistory?.length ? Math.round(t.captainHistory.filter(h=>h.wasOptimal).length/t.captainHistory.length*100) + "%" : "—";
  const stats = [
    { label:"TOTAL POINTS", v1:fmt(t1.totalPoints), v2:fmt(t2.totalPoints), n1:t1.totalPoints, n2:t2.totalPoints },
    { label:"OVERALL RANK", v1:"#"+fmt(t1.overallRank), v2:"#"+fmt(t2.overallRank), n1:t1.overallRank, n2:t2.overallRank, lower:true },
    { label:"BEST GW", v1:t1.highestGwPoints, v2:t2.highestGwPoints, n1:t1.highestGwPoints, n2:t2.highestGwPoints },
    { label:"AVG PTS/GW", v1:t1.avgPointsPerGW, v2:t2.avgPointsPerGW, n1:t1.avgPointsPerGW, n2:t2.avgPointsPerGW },
    { label:"TEAM VALUE", v1:"£"+(t1.teamValue/10).toFixed(1)+"m", v2:"£"+(t2.teamValue/10).toFixed(1)+"m", n1:t1.teamValue, n2:t2.teamValue },
    { label:"GREEN ARROWS", v1:t1.greenArrows, v2:t2.greenArrows, n1:t1.greenArrows, n2:t2.greenArrows },
    { label:"CAPTAIN %", v1:capRate(t1), v2:capRate(t2), n1:parseFloat(capRate(t1)), n2:parseFloat(capRate(t2)) },
    { label:"TRANSFERS", v1:t1.transfersTotal, v2:t2.transfersTotal, n1:t1.transfersTotal, n2:t2.transfersTotal, lower:true },
  ];
  let w1=0, w2=0;
  stats.forEach(s => { if (isNaN(s.n1)||isNaN(s.n2)||s.n1===s.n2) return; const t1w = s.lower ? s.n1<s.n2 : s.n1>s.n2; if(t1w) w1++; else w2++; });
  return (
    <div style={cardBase}>
      <div style={cardGradBg}/>
      <div style={{ position:"relative" }}>
        <CardHeader/>
        <div style={{ textAlign:"center", fontSize:11, color:"#475569", fontWeight:700, letterSpacing:"0.15em", textTransform:"uppercase", marginBottom:16 }}>SEASON STATS</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 90px 1fr", marginBottom:10 }}>
          <div style={{ fontSize:10, fontWeight:700, color:C1, textAlign:"right", paddingRight:12 }}>{t1.name}</div>
          <div style={{ fontSize:8, color:"#475569", textAlign:"center" }}>STAT</div>
          <div style={{ fontSize:10, fontWeight:700, color:C2, paddingLeft:12 }}>{t2.name}</div>
        </div>
        {stats.map(s => {
          const t1w = !isNaN(s.n1)&&!isNaN(s.n2)&&s.n1!==s.n2 && (s.lower ? s.n1<s.n2 : s.n1>s.n2);
          const t2w = !isNaN(s.n1)&&!isNaN(s.n2)&&s.n1!==s.n2 && !t1w;
          const tied = !isNaN(s.n1)&&!isNaN(s.n2)&&s.n1===s.n2;
          return (
            <div key={s.label} style={{ display:"grid", gridTemplateColumns:"1fr 90px 1fr", padding:"7px 0", borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
              <div style={{ fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:600, color:t1w?C1:tied?AMBER:"#CBD5E1", textAlign:"right", paddingRight:12 }}>{s.v1}</div>
              <div style={{ fontSize:8, fontWeight:700, color:"#64748B", textAlign:"center", textTransform:"uppercase", letterSpacing:"0.05em" }}>{s.label}</div>
              <div style={{ fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:600, color:t2w?C2:tied?AMBER:"#CBD5E1", paddingLeft:12 }}>{s.v2}</div>
            </div>
          );
        })}
        <div style={{ display:"flex", justifyContent:"center", gap:16, marginTop:18, fontSize:12, fontWeight:700 }}>
          <span style={{ color:C1 }}>{w1} wins</span>
          <span style={{ color:"#334155" }}>—</span>
          <span style={{ color:C2 }}>{w2} wins</span>
        </div>
      </div>
      <CardFooter/>
    </div>
  );
}
