function getGWRoasts(t, opp, gwData, prevGwData, capData, oppGwPts) {
  const roasts = [];
  if (!gwData) return roasts;
  const n = t.name, on = opp.name;

  // Terrible score
  if (gwData.points < 15) roasts.push(gwData.points + " points. " + on + " is genuinely embarrassed to be associated with " + n + " right now.");
  else if (gwData.points < 25) roasts.push(n + " scored " + gwData.points + " pts. Did they even log in this week? " + on + " is in tears laughing.");
  else if (gwData.points < 35) roasts.push("Only " + gwData.points + " pts. " + on + "'s captain alone probably beat " + n + "'s entire squad.");

  // Drop from previous GW
  if (prevGwData && gwData.points < prevGwData.points * 0.5) roasts.push(n + " went from " + prevGwData.points + " to " + gwData.points + " pts. That's not a dip, that's falling off a cliff. " + on + " is loving it.");
  else if (prevGwData && prevGwData.points > 60 && gwData.points < 35) roasts.push(prevGwData.points + " last week, " + gwData.points + " this week. " + n + " gave " + on + " false hope and then remembered who they are.");
  if (prevGwData && gwData.points > prevGwData.points + 25 && oppGwPts != null && gwData.points < oppGwPts) roasts.push(n + " improved by " + (gwData.points - prevGwData.points) + " points and STILL lost to " + on + ". Can't make this up.");

  // Captain fail — really twist the knife
  if (capData && !capData.wasOptimal && capData.captainPts <= 2) roasts.push(n + " captained " + capData.captainName + " for " + capData.captainPts + " pts while " + capData.optimalName + " hauled " + capData.optimalPts + ". " + on + " is howling.");
  else if (capData && !capData.wasOptimal && capData.optimalPts > capData.captainPts * 3) roasts.push(n + " chose " + capData.captainName + " (" + capData.captainPts + " pts) over " + capData.optimalName + " (" + capData.optimalPts + " pts). Criminal decision-making.");
  else if (capData && capData.captainPts <= 4) roasts.push("Captain " + capData.captainName + " got " + n + " a whopping " + capData.captainPts + " pts. The armband is cursed in their hands.");
  if (capData && capData.wasOptimal && capData.captainPts >= 15) roasts.push(n + " nailed the captaincy with " + capData.captainName + " (" + capData.captainPts + " pts). Even a broken clock is right twice a day.");

  // Took hits but flopped
  if (gwData.hitCost > 0 && gwData.points < 35) roasts.push(n + " took a -" + gwData.hitCost + " hit and scored " + gwData.points + " pts. Paid to get worse. " + on + " appreciates the charity.");
  else if (gwData.hitCost >= 8) roasts.push("-" + gwData.hitCost + " in hits for " + n + ". That's panic, not strategy. " + on + " didn't even need to try.");
  else if (gwData.hitCost > 0 && oppGwPts != null && gwData.points < oppGwPts) roasts.push(n + " took a hit AND still lost to " + on + ". Adding insult to injury.");

  // Rank drop
  if (prevGwData && prevGwData.overallRank && gwData.overallRank) {
    const drop = gwData.overallRank - prevGwData.overallRank;
    if (drop > 500000) roasts.push(n + " dropped " + fmt(drop) + " rank places in one week. That's not a red arrow, that's a nosedive.");
    else if (drop > 200000) roasts.push(n + " fell " + fmt(drop) + " places. " + on + " and literally millions of others are now above them.");
    const climb = prevGwData.overallRank - gwData.overallRank;
    if (climb > 300000 && oppGwPts != null && gwData.points < oppGwPts) roasts.push(n + " climbed " + fmt(climb) + " places but STILL couldn't beat " + on + ". Levels.");
  }

  // Lost H2H — make it sting
  if (oppGwPts != null) {
    const diff = oppGwPts - gwData.points;
    if (diff > 40) roasts.push(on + " beat " + n + " by " + diff + " points. That's not a loss, that's a public execution.");
    else if (diff > 25) roasts.push(on + " made " + n + " look silly this week. " + diff + " point gap. Truly embarrassing.");
    else if (diff > 15) roasts.push("Lost by " + diff + " to " + on + ". " + n + " should send an apology to their own squad.");
    else if (diff > 0 && diff <= 3) roasts.push(n + " lost to " + on + " by just " + diff + ". So close, yet so devastatingly far.");
    if (diff < 0 && diff > -3) roasts.push(n + " beat " + on + " by " + Math.abs(diff) + ". Barely. Nothing to brag about.");
    if (diff < -30) roasts.push(n + " demolished " + on + " by " + Math.abs(diff) + " pts. Absolute carnage. " + on + " might not recover.");
  }

  // Many transfers
  if (gwData.transfers >= 4) roasts.push(n + " made " + gwData.transfers + " transfers. Complete squad meltdown. " + on + " is laughing at the chaos.");
  else if (gwData.transfers >= 3) roasts.push(gwData.transfers + " transfers from " + n + " this week. Desperation has a name.");

  // Zero transfers + bad score
  if (gwData.transfers === 0 && gwData.points < 30) roasts.push(n + " made zero transfers and scored " + gwData.points + ". Couldn't even be bothered to try. " + on + " wins by default.");
  if (gwData.transfers === 0 && oppGwPts != null && gwData.points > oppGwPts + 15) roasts.push(n + " made zero transfers and still smashed " + on + ". Set and forget > whatever " + on + " is doing.");

  // Both did badly
  if (oppGwPts != null && gwData.points < 35 && oppGwPts < 35) roasts.push("Both teams scored under 35 this week. " + n + " and " + on + " should both be ashamed.");

  // Shuffle
  for (let i = roasts.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [roasts[i], roasts[j]] = [roasts[j], roasts[i]]; }
  return roasts.length ? roasts : [n + " survived this gameweek unroasted. " + on + " will get them next time."];
}

function GWCompareCard({ t1, t2, h2h }) {
  const gw1 = t1.gwHistory?.slice(-1)[0];
  const gw1prev = t1.gwHistory?.slice(-2,-1)[0];
  const gw2 = t2.gwHistory?.slice(-1)[0];
  const gw2prev = t2.gwHistory?.slice(-2,-1)[0];
  if (!gw1 || !gw2) return <div style={cardBase}><div style={cardGradBg}/><CardHeader/><div style={{textAlign:"center",color:"#475569",marginTop:40}}>Not enough GW data</div><CardFooter/></div>;

  const gwNum = gw1.gw;
  const prevGwNum = gw1prev?.gw;
  const cap1 = t1.captainHistory?.find(c=>c.gw===gwNum);
  const cap2 = t2.captainHistory?.find(c=>c.gw===gwNum);
  const h2hResult = h2h?.gwResults?.find(g=>g.gw===gwNum);
  const oppGw1Pts = h2hResult ? h2hResult.team2Points : gw2.points;
  const oppGw2Pts = h2hResult ? h2hResult.team1Points : gw1.points;

  const r1 = getGWRoasts(t1, t2, gw1, gw1prev, cap1, oppGw1Pts);
  const r2 = getGWRoasts(t2, t1, gw2, gw2prev, cap2, oppGw2Pts);

  const GWSide = ({ t, gw, prev, cap, color }) => {
    const delta = prev ? gw.points - prev.points : 0;
    const rankDelta = prev && prev.overallRank && gw.overallRank ? prev.overallRank - gw.overallRank : 0;
    return (
      <div style={{ flex:1, textAlign:"center" }}>
        <div style={{ fontSize:10, color, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:8 }}>{t.name}</div>
        <div style={{ fontFamily:"'DM Mono',monospace", fontSize:36, fontWeight:700, color, lineHeight:1 }}>{gw.points}</div>
        <div style={{ fontSize:9, color:"#475569", marginTop:2 }}>pts</div>
        {delta !== 0 && <div style={{ fontSize:10, color:delta>0?C1:LOSE, fontWeight:600, marginTop:4 }}>{delta>0?"▲":"▼"} {Math.abs(delta)} from GW{prev?.gw}</div>}
        {rankDelta !== 0 && <div style={{ fontSize:9, color:rankDelta>0?C1:LOSE, marginTop:2 }}>{rankDelta>0?"↑":"↓"}{fmt(Math.abs(rankDelta))} rank</div>}
        {cap && <div style={{ marginTop:8, fontSize:9, color:"#94A3B8" }}>🧑‍✈️ {cap.captainName}: {cap.captainPts}pts {cap.wasOptimal ? "✅" : "❌"}</div>}
        {gw.hitCost > 0 && <div style={{ fontSize:9, color:LOSE, marginTop:2 }}>-{gw.hitCost} hit</div>}
        {gw.transfers > 0 && <div style={{ fontSize:8, color:"#475569", marginTop:2 }}>{gw.transfers} transfer{gw.transfers>1?"s":""}</div>}
      </div>
    );
  };

  return (
    <div style={cardBase}>
      <div style={cardGradBg}/>
      <div style={{ position:"relative" }}>
        <CardHeader/>
        <div style={{ textAlign:"center", fontSize:12, color:"#475569", fontWeight:700, letterSpacing:"0.2em", textTransform:"uppercase", marginBottom:4 }}>GAMEWEEK {gwNum}</div>
        {prevGwNum && <div style={{ textAlign:"center", fontSize:9, color:"#334155", marginBottom:14 }}>vs GW{prevGwNum}</div>}
        <div style={{ display:"flex", gap:16, marginBottom:14 }}>
          <GWSide t={t1} gw={gw1} prev={gw1prev} cap={cap1} color={C1}/>
          <div style={{ width:1, background:"linear-gradient(180deg,transparent,#1E293B,transparent)", flexShrink:0 }}/>
          <GWSide t={t2} gw={gw2} prev={gw2prev} cap={cap2} color={C2}/>
        </div>
        {h2hResult && <div style={{ textAlign:"center", marginBottom:12 }}>
          <div style={{ fontSize:10, fontWeight:700, color:h2hResult.winner==="team1"?C1:h2hResult.winner==="team2"?C2:AMBER }}>
            {h2hResult.winner==="team1" ? t1.name+" wins GW"+gwNum : h2hResult.winner==="team2" ? t2.name+" wins GW"+gwNum : "GW"+gwNum+" drawn"}
          </div>
        </div>}
        <div style={{ fontSize:10, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.08em", marginBottom:6 }}>🔥 GW Roast</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
          {[[t1,C1,r1],[t2,C2,r2]].map(([t,color,roasts]) => (
            <div key={t.name}>
              <div style={{ fontSize:9, color, fontWeight:700, textTransform:"uppercase", marginBottom:4 }}>{t.name}</div>
              {roasts.slice(0,3).map((r,i)=>(
                <div key={i} style={{ fontSize:8, color:"#94A3B8", lineHeight:1.3, padding:"3px 5px", background:"rgba(255,255,255,0.02)", borderRadius:4, marginBottom:2, borderLeft:"2px solid "+color+"40" }}>{r}</div>
              ))}
            </div>
          ))}
        </div>
      </div>
      <CardFooter/>
    </div>
  );
}

function CardLightbox({ cards, cardRefs, startIdx, onClose }) {
  const [currentIdx, setCurrentIdx] = React.useState(startIdx);
  const [imageUrl, setImageUrl] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const touchStartX = React.useRef(0);
  const isMobile = typeof navigator !== "undefined" && navigator.maxTouchPoints > 0;

  function renderCard(idx) {
    setLoading(true);
    setImageUrl(null);
    const el = cardRefs[idx]?.current;
    if (!el) { setLoading(false); return; }
    html2canvas(el, { backgroundColor:"#060D1A", scale:2, useCORS:true }).then(canvas => {
      setImageUrl(canvas.toDataURL("image/png"));
    }).catch(()=>{}).finally(()=>setLoading(false));
  }

  React.useEffect(() => { renderCard(currentIdx); }, [currentIdx]);

  function nav(dir) {
    setCurrentIdx(prev => {
      const next = prev + dir;
      if (next < 0) return cards.length - 1;
      if (next >= cards.length) return 0;
      return next;
    });
  }

  React.useEffect(() => {
    function handleKey(e) {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowLeft") nav(-1);
      if (e.key === "ArrowRight") nav(1);
    }
    window.addEventListener("keydown", handleKey);
    return () => window.removeEventListener("keydown", handleKey);
  }, []);

  return (
    <div style={{ position:"fixed", inset:0, zIndex:9999, background:"rgba(0,0,0,0.95)", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}
      onTouchStart={e => { touchStartX.current = e.touches[0].clientX; }}
      onTouchEnd={e => { const diff = e.changedTouches[0].clientX - touchStartX.current; if (Math.abs(diff) > 50) nav(diff < 0 ? 1 : -1); }}>
      {/* Close button */}
      <button onClick={onClose} style={{ position:"absolute", top:16, right:16, background:"none", border:"1px solid #333", borderRadius:"50%", width:36, height:36, color:"#888", fontSize:18, cursor:"pointer", zIndex:10, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
      {/* Card label */}
      <div style={{ position:"absolute", top:20, left:0, right:0, textAlign:"center", fontSize:11, fontWeight:700, color:"#64748B", textTransform:"uppercase", letterSpacing:"0.1em" }}>{cards[currentIdx]?.label}</div>
      {/* Nav arrows */}
      <button onClick={()=>nav(-1)} style={{ position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", background:"rgba(255,255,255,0.08)", border:"none", borderRadius:"50%", width:40, height:40, color:"#ccc", fontSize:20, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>‹</button>
      <button onClick={()=>nav(1)} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"rgba(255,255,255,0.08)", border:"none", borderRadius:"50%", width:40, height:40, color:"#ccc", fontSize:20, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>›</button>
      {/* Image */}
      {loading ? (
        <div style={{ width:48, height:48, border:"3px solid #333", borderTopColor:C1, borderRadius:"50%", animation:"spin 0.7s linear infinite" }}/>
      ) : imageUrl ? (
        <img src={imageUrl} style={{ maxWidth:"90vw", maxHeight:"80vh", borderRadius:12, boxShadow:"0 20px 60px rgba(0,0,0,0.5)" }} alt={cards[currentIdx]?.label}/>
      ) : null}
      {/* Dots */}
      <div style={{ display:"flex", gap:8, marginTop:16 }}>
        {cards.map((_, i) => (
          <div key={i} onClick={()=>setCurrentIdx(i)} style={{ width:8, height:8, borderRadius:"50%", background:i===currentIdx?C1:"#333", cursor:"pointer", transition:"background 0.2s" }}/>
        ))}
      </div>
      {/* Save hint */}
      <div style={{ marginTop:10, fontSize:10, color:"#555" }}>
        {isMobile ? "Long-press image to save" : "Right-click image → Save"}
      </div>
      {/* Counter */}
      <div style={{ marginTop:4, fontSize:9, color:"#333" }}>{currentIdx+1} / {cards.length}</div>
    </div>
  );
}

function CardCarousel({ t1, t2, h2h, onClose, onCopyLink, linkCopied }) {
  const cardRefs = [React.useRef(null), React.useRef(null), React.useRef(null), React.useRef(null), React.useRef(null)];
  const [lightboxIdx, setLightboxIdx] = React.useState(-1);
  const cards = [
    { label:"This Week", component:<GWCompareCard t1={t1} t2={t2} h2h={h2h}/> },
    { label:"H2H Summary", component:<H2HCard t1={t1} t2={t2} h2h={h2h}/> },
    { label:"Manager Profiles", component:<ProfileCard t1={t1} t2={t2}/> },
    { label:"Season Stats", component:<StatsCard t1={t1} t2={t2}/> },
    { label:"Verdict & Roast", component:<VerdictCard t1={t1} t2={t2} h2h={h2h}/> },
  ];
  function openLightbox(idx) { setLightboxIdx(idx); }
  return (
    <div>
      {/* Offscreen full-size cards for html2canvas */}
      <div style={{ position:"fixed", left:-9999, top:0, pointerEvents:"none" }}>
        {cards.map((c, i) => <div key={i} ref={cardRefs[i]}>{c.component}</div>)}
      </div>
      {/* Lightbox via portal to avoid transform context breaking position:fixed */}
      {lightboxIdx >= 0 && ReactDOM.createPortal(
        <CardLightbox cards={cards} cardRefs={cardRefs} startIdx={lightboxIdx} onClose={()=>setLightboxIdx(-1)}/>,
        document.body
      )}
      {/* Carousel UI */}
      <div style={{ marginBottom:10, overflow:"hidden" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8, flexWrap:"wrap", gap:6 }}>
          <div style={{ fontSize:10, fontWeight:700, color:"#64748B", textTransform:"uppercase", letterSpacing:"0.08em" }}>🃏 Tap a card to preview & share</div>
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <button onClick={onCopyLink} style={{ background:"none", border:"1px solid #1E293B", borderRadius:6, padding:"3px 10px", color:linkCopied?C1:"#64748B", fontSize:10, cursor:"pointer", fontWeight:600, transition:"all 0.2s" }}>{linkCopied ? "✓ Copied!" : "🔗 Copy Link"}</button>
            <button onClick={onClose} style={{ background:"none", border:"1px solid #1E293B", borderRadius:6, padding:"3px 10px", color:"#64748B", fontSize:10, cursor:"pointer", fontWeight:600 }}>✕ Close</button>
          </div>
        </div>
        <div style={{ display:"flex", gap:10, overflowX:"auto", paddingBottom:8, scrollSnapType:"x mandatory", WebkitOverflowScrolling:"touch" }}>
          {cards.map((c, i) => (
            <div key={i} onClick={()=>openLightbox(i)} style={{ flexShrink:0, width:135, scrollSnapAlign:"start", cursor:"pointer", transition:"opacity 0.2s" }}>
              <div style={{ width:135, height:135, borderRadius:8, overflow:"hidden", border:"1px solid #1E293B", position:"relative", background:"#060D1A" }}>
                <div style={{ transform:"scale(0.25)", transformOrigin:"top left", width:CARD_W, height:CARD_H, pointerEvents:"none" }}>
                  {c.component}
                </div>
              </div>
              <div style={{ fontSize:9, fontWeight:600, color:"#64748B", textAlign:"center", marginTop:4 }}>{c.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Team Search Input ─────────────────────────────────────────────

function TeamSearchInput({ label, color, value, onChange, onResolve, resolvedTeam, onClear, otherTeamId }) {
  const [candidates, setCandidates] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [showResults, setShowResults] = React.useState(false);
  const [leagueMode, setLeagueMode] = React.useState(false);
  const [leagueCode, setLeagueCode] = React.useState("");
  const [leagueLoading, setLeagueLoading] = React.useState(false);
  const [leagueName, setLeagueName] = React.useState("");
  const [leagueMembers, setLeagueMembers] = React.useState([]);
  const [otherTeamLeagues, setOtherTeamLeagues] = React.useState([]);
  const [searchedLeagues, setSearchedLeagues] = React.useState(new Set());
  const [noResults, setNoResults] = React.useState(false);
  const wrapRef = React.useRef(null);
  const inputRef = React.useRef(null);

  // Close dropdown on click outside
  React.useEffect(() => {
    function handleClick(e) { if (wrapRef.current && !wrapRef.current.contains(e.target)) { setShowResults(false); setLeagueMode(false); } }
    document.addEventListener("mousedown", handleClick);
    return () => document.removeEventListener("mousedown", handleClick);
  }, []);

  // When otherTeamId changes, fetch their leagues for cross-search
  React.useEffect(() => {
    if (otherTeamId && !resolvedTeam) {
      fetchEntryLeagues(otherTeamId).then(leagues => setOtherTeamLeagues(leagues));
    }
  }, [otherTeamId]);

  // Detect input type and auto-resolve URLs
  function handleInputChange(e) {
    const val = e.target.value;
    onChange(val);
    setNoResults(false);

    // Auto-detect URL paste
    const urlId = parseEntryIdFromUrl(val);
    if (urlId) {
      setLoading(true);
      fetchEntryBasic(urlId).then(entry => {
        setLoading(false);
        if (entry) { onResolve(entry); onChange(String(entry.entryId)); }
      });
      return;
    }
  }

  // Handle Enter key or search button
  async function handleSearch() {
    const q = value.trim();
    if (!q) return;

    // Numeric → direct ID
    if (/^\d+$/.test(q)) {
      setLoading(true);
      const entry = await fetchEntryBasic(q);
      setLoading(false);
      if (entry) { onResolve(entry); }
      else { setNoResults(true); setShowResults(true); }
      return;
    }

    // URL → extract ID
    const urlId = parseEntryIdFromUrl(q);
    if (urlId) {
      setLoading(true);
      const entry = await fetchEntryBasic(urlId);
      setLoading(false);
      if (entry) { onResolve(entry); onChange(String(entry.entryId)); }
      else { setNoResults(true); setShowResults(true); }
      return;
    }

    // Text → name search
    setLoading(true);
    setShowResults(true);
    setNoResults(false);
    setCandidates([]);

    // Gather league IDs to search: other team's leagues + any manually entered league
    const leagueIds = [...(otherTeamLeagues.map(l => l.id)), ...Array.from(searchedLeagues)];

    const result = await resolveTeamInput(q, leagueIds);
    setLoading(false);

    if (result.kind === "exact") {
      onResolve(result.candidates[0]);
      onChange(String(result.candidates[0].entryId));
      setShowResults(false);
    } else if (result.kind === "multiple") {
      setCandidates(result.candidates);
    } else {
      setNoResults(true);
      setCandidates([]);
    }
  }

  // Fetch a league by code and search within it
  async function handleLeagueSearch() {
    const code = leagueCode.trim();
    if (!code || !/^\d+$/.test(code)) return;
    setLeagueLoading(true);
    try {
      const members = await fetchLeagueMembers(code);
      if (members.length > 0) {
        setLeagueMembers(members);
        setSearchedLeagues(prev => new Set([...prev, Number(code)]));
        // Get league name from API response
        const res = await fetch("/api/leagues-classic/" + code + "/standings/?page_standings=1");
        if (res.ok) { const d = await res.json(); setLeagueName(d.league?.name || "League " + code); }
        // If there's a search query, filter immediately
        if (value.trim() && !/^\d+$/.test(value.trim())) {
          const ranked = rankCandidates(value.trim(), members);
          setCandidates(ranked.length > 0 ? ranked : members.slice(0, 15));
          setNoResults(ranked.length === 0);
        } else {
          setCandidates(members.slice(0, 15));
        }
        setLeagueMode(false);
      }
    } catch {}
    setLeagueLoading(false);
  }

  // Load other team's league and search
  async function handleOtherTeamLeague(league) {
    setLeagueLoading(true);
    setLeagueName(league.name);
    const members = await fetchLeagueMembers(league.id);
    setLeagueMembers(members);
    setSearchedLeagues(prev => new Set([...prev, league.id]));
    const q = value.trim();
    if (q && !/^\d+$/.test(q)) {
      const ranked = rankCandidates(q, members);
      setCandidates(ranked.length > 0 ? ranked : members.slice(0, 15));
      setNoResults(ranked.length === 0 && q.length > 0);
    } else {
      setCandidates(members.slice(0, 15));
    }
    setLeagueMode(false);
    setLeagueLoading(false);
  }

  function selectCandidate(c, idx) {
    onResolve(c);
    onChange(String(c.entryId));
    setShowResults(false);
    setCandidates([]);
    // Fire-and-forget metric: which position was selected
    try {
      fetch("/index-stats"); // lightweight ping — real metric tracking below
      // Track selection position via a beacon-style call
      navigator.sendBeacon && navigator.sendBeacon(
        "/search-metric",
        JSON.stringify({ event: "select", position: idx, entryId: c.entryId, score: c.score })
      );
    } catch {}
  }

  // If resolved, show compact badge
  if (resolvedTeam) {
    const rRank = resolvedTeam.overallRank;
    const rankLabel = rRank ? (rRank > 999999 ? (rRank / 1000000).toFixed(1) + "M" : rRank > 999 ? Math.round(rRank / 1000) + "K" : "#" + rRank.toLocaleString()) : null;
    return (
      <div style={{ minWidth:0 }}>
        <div style={{ fontSize:10, fontWeight:700, color, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6 }}>{label}</div>
        <div style={{ background:"#060D1A", border:"1px solid "+color+"40", borderRadius:8, padding:"8px 12px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:8 }}>
          <div style={{ minWidth:0 }}>
            <div style={{ fontSize:13, fontWeight:700, color:"#E2E8F0", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{resolvedTeam.teamName}</div>
            <div style={{ fontSize:10, color:"#64748B" }}>
              {resolvedTeam.managerName} · #{resolvedTeam.entryId}
              {rankLabel ? <span style={{ color:"#475569" }}> · Rank {rankLabel}</span> : ""}
            </div>
          </div>
          <button onClick={onClear} style={{ background:"none", border:"none", color:"#475569", cursor:"pointer", fontSize:12, padding:"2px 4px", flexShrink:0 }} title="Clear">✕</button>
        </div>
      </div>
    );
  }

  const isTextQuery = value.trim() && !/^\d+$/.test(value.trim()) && !parseEntryIdFromUrl(value.trim());

  return (
    <div ref={wrapRef} style={{ position:"relative", minWidth:0 }}>
      <div style={{ fontSize:10, fontWeight:700, color, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6 }}>{label}</div>
      <div style={{ display:"flex", gap:4 }}>
        <input ref={inputRef} value={value} onChange={handleInputChange}
          onKeyDown={e => { if (e.key === "Enter") handleSearch(); }}
          placeholder="ID, name, or FPL URL"
          style={{ flex:1, minWidth:0, background:"#060D1A", border:"1px solid "+color+"28", borderRadius:8, padding:"11px 13px", color:"#E2E8F0", fontSize:14, fontFamily:"'DM Mono',monospace" }}
          onFocus={e => e.target.style.borderColor = color+"66"} onBlur={e => e.target.style.borderColor = color+"28"}/>
        {isTextQuery && (
          <button onClick={handleSearch} disabled={loading}
            style={{ background:color+"18", border:"1px solid "+color+"40", borderRadius:8, padding:"0 12px", color, fontSize:12, fontWeight:700, cursor:"pointer", flexShrink:0, transition:"all 0.2s" }}>
            {loading ? "..." : "🔍"}
          </button>
        )}
      </div>

      {/* Name search hint */}
      {isTextQuery && !showResults && !loading && (
        <div style={{ fontSize:10, color:"#475569", marginTop:4 }}>
          Press Enter or 🔍 to search by name
        </div>
      )}

      {/* Loading indicator */}
      {loading && <div style={{ fontSize:10, color, marginTop:4 }}>Searching...</div>}

      {/* Results dropdown */}
      {showResults && !loading && (
        <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:100, marginTop:4, background:"#0D1829", border:"1px solid #1E293B", borderRadius:10, maxHeight:320, overflowY:"auto", boxShadow:"0 8px 32px rgba(0,0,0,0.5)" }}>

          {/* Candidates list */}
          {candidates.length > 0 && (() => {
            const topScore = candidates[0]?.score || 0;
            const isWeakSet = topScore < 50;
            const queryTrimmed = value.trim();
            const isShortAmbiguous = queryTrimmed.length <= 3 && candidates.length >= 8;
            return (
            <div>
              {leagueName && <div style={{ padding:"8px 12px 4px", fontSize:9, color:"#475569", textTransform:"uppercase", letterSpacing:"0.1em" }}>Results from {leagueName}</div>}
              {isWeakSet && !leagueName && (
                <div style={{ padding:"8px 12px 4px", display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:9, color:"#F59E0B", textTransform:"uppercase", letterSpacing:"0.1em", fontWeight:700 }}>Best guesses</span>
                  <span style={{ fontSize:9, color:"#64748B" }}>— try a fuller name for better results</span>
                </div>
              )}
              {!isWeakSet && isShortAmbiguous && !leagueName && (
                <div style={{ padding:"8px 12px 4px", display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:9, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.1em", fontWeight:600 }}>Many matches</span>
                  <span style={{ fontSize:9, color:"#64748B" }}>— add a surname to narrow down</span>
                </div>
              )}
              {candidates.map((c, idx) => {
                const rankStr = c.overallRank ? (c.overallRank > 999999 ? (c.overallRank / 1000000).toFixed(1) + "M" : c.overallRank > 999 ? Math.round(c.overallRank / 1000) + "K" : "#" + c.overallRank.toLocaleString()) : null;
                const isRecent = c.lastSeenAt && (Date.now() - c.lastSeenAt) < 86400000;
                const isVerified = c.verificationLevel >= 2;
                return (
                <button key={c.entryId} onClick={() => selectCandidate(c, idx)}
                  style={{ display:"block", width:"100%", textAlign:"left", background:"none", border:"none", borderBottom:"1px solid #1E293B18", padding:"9px 14px", cursor:"pointer", transition:"background 0.15s" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#1E293B40"} onMouseLeave={e => e.currentTarget.style.background = "none"}>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:12, fontWeight:700, color:"#E2E8F0", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        {c.managerName}
                        {isVerified && <span style={{ color:"#4ADE80", fontSize:10, fontWeight:600, marginLeft:4 }}>✓ Verified</span>}
                      </div>
                      <div style={{ fontSize:10, color:"#94A3B8", marginTop:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                        {c.teamName || "Unnamed"}<span style={{ color:"#475569" }}> · #{c.entryId}</span>
                      </div>
                    </div>
                    {rankStr && (
                      <div style={{ fontSize:9, color:"#94A3B8", background:"#1E293B40", borderRadius:4, padding:"2px 6px", flexShrink:0, fontFamily:"'DM Mono',monospace" }}>
                        {rankStr}
                      </div>
                    )}
                  </div>
                  {(c.matchReason || isRecent) && (
                    <div style={{ fontSize:9, color:"#64748B", marginTop:3 }}>
                      {c.matchReason || ""}{c.matchReason && isRecent ? " · " : ""}{isRecent ? "Active" : ""}
                    </div>
                  )}
                </button>
                );
              })}
            </div>
            );
          })()}

          {/* No results + league search prompt */}
          {(noResults || (candidates.length === 0 && !leagueMode)) && (
            <div style={{ padding:14, textAlign:"center" }}>
              {noResults && candidates.length === 0 && (
                <div style={{ marginBottom:10 }}>
                  <div style={{ fontSize:12, color:"#F87171", marginBottom:6, fontWeight:600 }}>No matches found{value.trim() ? ` for "${value.trim()}"` : ""}</div>
                  <div style={{ fontSize:11, color:"#94A3B8", lineHeight:1.6, textAlign:"left", padding:"0 4px" }}>
                    <div style={{ marginBottom:6, fontWeight:600, color:"#CBD5E1", fontSize:10, textTransform:"uppercase", letterSpacing:"0.05em" }}>Try instead:</div>
                    <div style={{ display:"flex", alignItems:"flex-start", gap:6, marginBottom:4 }}>
                      <span style={{ color:"#64748B", flexShrink:0 }}>•</span>
                      <span>A <strong style={{ color:"#E2E8F0" }}>fuller manager name</strong> — e.g. "Magnus Carlsen" not just "Magnus"</span>
                    </div>
                    <div style={{ display:"flex", alignItems:"flex-start", gap:6, marginBottom:4 }}>
                      <span style={{ color:"#64748B", flexShrink:0 }}>•</span>
                      <span>The <strong style={{ color:"#E2E8F0" }}>FPL team name</strong> — e.g. "Pep's Rejects FC"</span>
                    </div>
                    <div style={{ display:"flex", alignItems:"flex-start", gap:6, marginBottom:4 }}>
                      <span style={{ color:"#64748B", flexShrink:0 }}>•</span>
                      <span>A <strong style={{ color:"#E2E8F0" }}>profile URL</strong> — paste from fantasy.premierleague.com</span>
                    </div>
                    <div style={{ display:"flex", alignItems:"flex-start", gap:6, marginBottom:4 }}>
                      <span style={{ color:"#64748B", flexShrink:0 }}>•</span>
                      <span>An <strong style={{ color:"#E2E8F0" }}>entry ID</strong> — the number from their FPL profile</span>
                    </div>
                  </div>
                </div>
              )}

              {/* Other team's leagues — quick pick */}
              {otherTeamLeagues.length > 0 && (
                <div style={{ marginBottom:8 }}>
                  <div style={{ fontSize:9, color:"#475569", textTransform:"uppercase", marginBottom:6, letterSpacing:"0.1em" }}>Their leagues</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4, justifyContent:"center" }}>
                    {otherTeamLeagues.slice(0, 6).map(l => (
                      <button key={l.id} onClick={() => handleOtherTeamLeague(l)}
                        style={{ background:"#060D1A", border:"1px solid #1E293B", borderRadius:6, padding:"4px 10px", color:"#94A3B8", fontSize:10, cursor:"pointer", transition:"all 0.15s" }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = color; e.currentTarget.style.color = "#E2E8F0"; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = "#1E293B"; e.currentTarget.style.color = "#94A3B8"; }}>
                        {l.name}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              <button onClick={() => setLeagueMode(true)}
                style={{ background:"none", border:"1px solid #1E293B", borderRadius:6, padding:"5px 12px", color:"#64748B", fontSize:10, cursor:"pointer", fontWeight:600 }}>
                Search within a league
              </button>
            </div>
          )}

          {/* Manual league code input */}
          {leagueMode && (
            <div style={{ padding:14 }}>
              <div style={{ fontSize:10, color:"#94A3B8", marginBottom:8 }}>Enter a league code to search its members</div>
              <div style={{ fontSize:9, color:"#475569", marginBottom:8, lineHeight:1.5 }}>
                Find it on the FPL website: Leagues → select a league → the number in the URL
              </div>
              <div style={{ display:"flex", gap:6 }}>
                <input value={leagueCode} onChange={e => setLeagueCode(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter") handleLeagueSearch(); }}
                  placeholder="e.g. 9767"
                  style={{ flex:1, background:"#060D1A", border:"1px solid #1E293B", borderRadius:6, padding:"8px 10px", color:"#E2E8F0", fontSize:12, fontFamily:"'DM Mono',monospace" }}/>
                <button onClick={handleLeagueSearch} disabled={leagueLoading}
                  style={{ background:color+"18", border:"1px solid "+color+"40", borderRadius:6, padding:"0 14px", color, fontSize:11, fontWeight:700, cursor:"pointer" }}>
                  {leagueLoading ? "..." : "Search"}
                </button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Share Prompt (bottom of page) ─────────────────────────────────

function SharePrompt({ t1, t2, h2h, onCopyLink, linkCopied }) {
  const cardRefs = [React.useRef(null), React.useRef(null), React.useRef(null), React.useRef(null), React.useRef(null)];
  const [lightboxIdx, setLightboxIdx] = React.useState(-1);
  const cards = [
    { label:"This Week", component:<GWCompareCard t1={t1} t2={t2} h2h={h2h}/> },
    { label:"H2H Summary", component:<H2HCard t1={t1} t2={t2} h2h={h2h}/> },
    { label:"Manager Profiles", component:<ProfileCard t1={t1} t2={t2}/> },
    { label:"Season Stats", component:<StatsCard t1={t1} t2={t2}/> },
    { label:"Verdict & Roast", component:<VerdictCard t1={t1} t2={t2} h2h={h2h}/> },

  return (
    <div style={{ marginTop:24, padding:"28px 16px 20px", background:"linear-gradient(180deg, rgba(0,255,135,0.04) 0%, rgba(56,182,255,0.04) 100%)", borderRadius:16, border:"1px solid #1E293B", textAlign:"center", overflow:"hidden" }}>
      {/* Offscreen full-size cards for html2canvas */}
      <div style={{ position:"fixed", left:-9999, top:0, pointerEvents:"none" }}>
        {cards.map((c, i) => <div key={i} ref={cardRefs[i]}>{c.component}</div>)}
      </div>
      {/* Lightbox via portal */}
      {lightboxIdx >= 0 && ReactDOM.createPortal(
        <CardLightbox cards={cards} cardRefs={cardRefs} startIdx={lightboxIdx} onClose={()=>setLightboxIdx(-1)}/>,
        document.body
      )}
      {/* CTA */}
      <div style={{ fontSize:28, marginBottom:8 }}>📤</div>
      <div style={{ fontFamily:"'Syne',sans-serif", fontSize:16, fontWeight:800, color:"#E2E8F0", marginBottom:4 }}>Share your results</div>
      <div style={{ fontSize:11, color:"#64748B", marginBottom:16, lineHeight:1.5 }}>Tap a card to preview, then long-press to save & send to your rival</div>
      {/* Card thumbnails */}
      <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:10, scrollSnapType:"x mandatory", WebkitOverflowScrolling:"touch" }}>
        {cards.map((c, i) => (
          <div key={i} onClick={()=>setLightboxIdx(i)} style={{ flexShrink:0, width:115, scrollSnapAlign:"start", cursor:"pointer", transition:"transform 0.2s, opacity 0.2s" }}>
            <div style={{ width:115, height:115, borderRadius:8, overflow:"hidden", border:"1px solid #1E293B", position:"relative", background:"#060D1A" }}>
              <div style={{ transform:"scale(0.213)", transformOrigin:"top left", width:CARD_W, height:CARD_H, pointerEvents:"none" }}>
                {c.component}
              </div>
            </div>
            <div style={{ fontSize:8, fontWeight:600, color:"#64748B", textAlign:"center", marginTop:4 }}>{c.label}</div>
          </div>
        ))}
      </div>
      {/* Copy link button */}
      <button onClick={onCopyLink} style={{ marginTop:12, background:"none", border:"1px solid #1E293B", borderRadius:8, padding:"8px 20px", color:linkCopied?C1:"#64748B", fontSize:11, fontWeight:600, cursor:"pointer", transition:"all 0.2s" }}>
        {linkCopied ? "✓ Link Copied!" : "🔗 Or copy comparison link"}
      </button>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────

function App() {
  // Read URL params on mount
  const params = new URLSearchParams(window.location.search);
  const initT1 = params.get("t1") || "";
  const initT2 = params.get("t2") || "";

  const [t1Input, setT1Input] = useState(initT1);
  const [t2Input, setT2Input] = useState(initT2);
  const [resolved1, setResolved1] = useState(null); // { entryId, managerName, teamName }
  const [resolved2, setResolved2] = useState(null);
  const [loading, setLoading] = useState(false);
  const [status, setStatus] = useState("");
  const [progress, setProgress] = useState(0);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [autoFired, setAutoFired] = useState(false);
  const [autoComparing, setAutoComparing] = useState(false);
  const autoCompareTimerRef = useRef(null);
  const lastComparedPairRef = useRef(null);
  const loadingRef = useRef(false);
  const resultsRef = useRef(null);
  const exportRef = useRef(null);

  // Section refs for navigation
  const secH2H = useRef(null), secRank = useRef(null), secForm = useRef(null);
  const secPerf = useRef(null), secSquad = useRef(null), secPos = useRef(null);
  const secTop5 = useRef(null), secChips = useRef(null), secCap = useRef(null);
  const secOverlap = useRef(null), secXfer = useRef(null), secHistory = useRef(null);
  const secFacts = useRef(null), secStreaks = useRef(null), secHist = useRef(null);
  const secConsist = useRef(null), secCumDiff = useRef(null), secSwings = useRef(null);
  const secBadges = useRef(null), secHeatmap = useRef(null), secBench = useRef(null);
  const secRadar = useRef(null), secPie = useRef(null), secMonthly = useRef(null);
  const secBestWorst = useRef(null), secFormArrows = useRef(null), secPower = useRef(null);
  const secAnimal = useRef(null), secPersonality = useRef(null), secGrade = useRef(null);
  const secMotto = useRef(null), secRoast = useRef(null), secPowerLevel = useRef(null);
  const secAlign = useRef(null), secSups = useRef(null), secEmoji = useRef(null);
  const secRisk = useRef(null), secChase = useRef(null), secChipImpact = useRef(null);
  const secArc = useRef(null), secWhatIf = useRef(null), secLoyalty = useRef(null);
  const secClutch = useRef(null), secPointStreaks = useRef(null), secGrid = useRef(null);
  const secStyle = useRef(null), secMilestones = useRef(null);

  // Comparison counter
  const [compCount] = useState(() => {
    try { const c = parseInt(localStorage.getItem("fpl_comp_count")||"0"); return c; } catch { return 0; }
  });

  // Swap teams
  function swapTeams() {
    const tmp = t1Input;
    setT1Input(t2Input);
    setT2Input(tmp);
    const tmpR = resolved1;
    setResolved1(resolved2);
    setResolved2(tmpR);
  }

  // Keyboard shortcuts: Escape to clear, j/k to navigate sections, p to print
  const [easterEgg, setEasterEgg] = useState(false);
  const konamiRef = useRef([]);
  const KONAMI = "ArrowUp,ArrowUp,ArrowDown,ArrowDown,ArrowLeft,ArrowRight,ArrowLeft,ArrowRight,b,a";
  React.useEffect(() => {
    const allRefs = [secH2H,secRank,secForm,secPerf,secSquad,secPos,secTop5,secChips,secCap,secOverlap,secXfer,secBench,secStreaks,secSwings,secConsist,secHist,secCumDiff,secHeatmap,secHistory,secFacts,secBadges,secRadar,secPie,secMonthly,secBestWorst,secFormArrows,secPower,secAnimal,secPersonality,secGrade,secMotto,secRoast,secPowerLevel,secAlign,secSups,secEmoji,secRisk,secChase,secChipImpact,secArc,secWhatIf,secLoyalty,secClutch,secPointStreaks,secGrid,secStyle,secMilestones];
    const onKey = (e) => {
      if (e.key === "Escape" && result) { setResult(null); window.scrollTo({ top:0, behavior:"smooth" }); return; }
      if (e.key === "p" && e.ctrlKey) { e.preventDefault(); window.print(); return; }
      if ((e.key === "j" || e.key === "k") && result) {
        const visibleRefs = allRefs.filter(r=>r.current);
        const scrollY = window.scrollY + 100;
        let curIdx = 0;
        for (let i = visibleRefs.length-1; i >= 0; i--) {
          if (visibleRefs[i].current.offsetTop <= scrollY) { curIdx = i; break; }
        }
        const nextIdx = e.key === "j" ? Math.min(curIdx+1, visibleRefs.length-1) : Math.max(curIdx-1, 0);
        visibleRefs[nextIdx]?.current?.scrollIntoView({ behavior:"smooth", block:"start" });
      }
      // Konami code
      konamiRef.current.push(e.key);
      if (konamiRef.current.length > 10) konamiRef.current.shift();
      if (konamiRef.current.join(",") === KONAMI) { setEasterEgg(true); setTimeout(()=>setEasterEgg(false), 5000); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [result]);

  // Recent comparisons from localStorage
  const [recents, setRecents] = useState(() => {
    try { return JSON.parse(localStorage.getItem("fpl_recent_comparisons") || "[]"); } catch { return []; }
  });
  function saveRecent(t1, t2) {
    const entry = { id1: t1.id, id2: t2.id, name1: t1.name, name2: t2.name, ts: Date.now() };
    const updated = [entry, ...recents.filter(r => !(r.id1===t1.id && r.id2===t2.id) && !(r.id1===t2.id && r.id2===t1.id))].slice(0, 10);
    setRecents(updated);
    try { localStorage.setItem("fpl_recent_comparisons", JSON.stringify(updated)); } catch {}
  }

  // Scroll to results when they load
  useEffect(() => {
    if (result && resultsRef.current) {
      setTimeout(() => resultsRef.current.scrollIntoView({ behavior:"smooth", block:"start" }), 100);
    }
  }, [result]);

  // Auto-compare if URL params provided
  React.useEffect(() => {
    if (initT1 && initT2 && !autoFired) { setAutoFired(true); handleCompare(initT1, initT2); }
  }, []);

  // Auto-compare when both teams are resolved via search
  React.useEffect(() => {
    // Clear any pending timer on dependency change
    if (autoCompareTimerRef.current) {
      clearTimeout(autoCompareTimerRef.current);
      autoCompareTimerRef.current = null;
      setAutoComparing(false);
    }
    // Need both teams resolved
    if (!resolved1 || !resolved2) {
      lastComparedPairRef.current = null;
      return;
    }
    // Don't fire if already loading
    if (loadingRef.current) return;
    // Don't compare same team with itself
    if (resolved1.entryId === resolved2.entryId) return;
    // Don't re-compare if result already shows this pair (handles swaps too)
    if (result && (
      (result.team1.id === resolved1.entryId && result.team2.id === resolved2.entryId) ||
      (result.team1.id === resolved2.entryId && result.team2.id === resolved1.entryId)
    )) return;
    // Don't re-trigger for same pair (prevents retry loops on error)
    const pairKey = resolved1.entryId + ":" + resolved2.entryId;
    if (lastComparedPairRef.current === pairKey) return;

    // Show "Comparing…" transition, then fire after short delay
    setAutoComparing(true);
    autoCompareTimerRef.current = setTimeout(() => {
      autoCompareTimerRef.current = null;
      setAutoComparing(false);
      // Re-check loading in case manual compare started during delay
      if (loadingRef.current) return;
      lastComparedPairRef.current = pairKey;
      handleCompare();
    }, 800);

    return () => {
      if (autoCompareTimerRef.current) {
        clearTimeout(autoCompareTimerRef.current);
        setAutoComparing(false);
      }
    };
  }, [resolved1, resolved2]);

  async function handleCompare(overrideT1, overrideT2) {
    // Cancel any pending auto-compare timer
    if (autoCompareTimerRef.current) {
      clearTimeout(autoCompareTimerRef.current);
      autoCompareTimerRef.current = null;
      setAutoComparing(false);
    }
    // Resolve IDs: use resolved teams if available, else parse input
    let id1 = overrideT1 || (resolved1 ? String(resolved1.entryId) : null);
    let id2 = overrideT2 || (resolved2 ? String(resolved2.entryId) : null);

    // Fallback: try to extract from input (number or URL)
    if (!id1) {
      const raw = t1Input.trim();
      if (/^\d+$/.test(raw)) id1 = raw;
      else { const u = parseEntryIdFromUrl(raw); if (u) id1 = u; }
    }
    if (!id2) {
      const raw = t2Input.trim();
      if (/^\d+$/.test(raw)) id2 = raw;
      else { const u = parseEntryIdFromUrl(raw); if (u) id2 = u; }
    }

    if (!id1 || !id2) {
      setError("Please enter a team ID, name, or FPL URL for both teams."); return;
    }
    if (id1 === id2) {
      setError("Enter two different teams to compare."); return;
    }
    setLoading(true); setError(null); setResult(null); setProgress(0);
    loadingRef.current = true;
    try {
      setStatus("Fetching player data..."); setProgress(10);
      const { playerMap } = await fetchBootstrap();
      setStatus("Fetching team data..."); setProgress(30);
      const onProg = (msg, pct) => { setStatus(msg); setProgress(pct); };
      const [team1, team2] = await Promise.all([
        fetchTeamData(parseInt(id1), playerMap, onProg),
        fetchTeamData(parseInt(id2), playerMap, onProg),
      ]);
      setProgress(90); setStatus("Building comparison...");
      const headToHead = buildH2H(team1, team2);
      setResult({ team1, team2, headToHead });
      lastComparedPairRef.current = id1 + ":" + id2;
      saveRecent(team1, team2);
      // Cache teams for future name searches
      cacheTeamEntries([
        { entryId: team1.id, managerName: team1.manager, teamName: team1.name },
        { entryId: team2.id, managerName: team2.manager, teamName: team2.name },
      ]);
      // Auto-resolve if not already resolved
      if (!resolved1) setResolved1({ entryId: team1.id, managerName: team1.manager, teamName: team1.name });
      if (!resolved2) setResolved2({ entryId: team2.id, managerName: team2.manager, teamName: team2.name });
      try { localStorage.setItem("fpl_comp_count", String((parseInt(localStorage.getItem("fpl_comp_count")||"0"))+1)); } catch {}
      // Track compare-after-search metric
      if (resolved1 || resolved2) {
        try {
          navigator.sendBeacon && navigator.sendBeacon(
            "/search-metric",
            JSON.stringify({ event: "compare_after_search", entryId: Number(id1) })
          );
        } catch {}
      }
      setProgress(100);
      // Update URL for sharing
      const url = new URL(window.location);
      url.searchParams.set("t1", id1);
      url.searchParams.set("t2", id2);
      window.history.replaceState({}, "", url);
    } catch(e) { setError(e.message); }
    finally { setLoading(false); setStatus(""); loadingRef.current = false; }
  }

  const t1 = result?.team1, t2 = result?.team2;
  const [copied, setCopied] = useState(false);

  function copyLink() {
    const url = new URL(window.location);
    url.searchParams.set("t1", t1?.id || t1Input.trim());
    url.searchParams.set("t2", t2?.id || t2Input.trim());
    navigator.clipboard.writeText(url.toString()).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  }

  const [showCarousel, setShowCarousel] = useState(false);

  const [toast, setToast] = useState("");
  function showToast(msg) { setToast(msg); setTimeout(()=>setToast(""),2200); }
  function copyStat(label, v1, v2) { navigator.clipboard?.writeText(t1.name+": "+v1+" | "+label+" | "+t2.name+": "+v2); showToast("Copied: "+label); }

  // Dynamic document title
  React.useEffect(() => {
    if (t1 && t2) document.title = t1.name + " vs " + t2.name + " — FPL Comparison";
    else document.title = "FPL Team Comparison";
  }, [t1, t2]);

  // Comparison timer
  const [compTime, setCompTime] = useState(null);
  React.useEffect(() => {
    if (result && !compTime) setCompTime(new Date());
    if (!result) setCompTime(null);
  }, [result]);

  const Card = ({ children, mb, delay, collapsible, title }) => {
    const [collapsed, setCollapsed] = React.useState(false);
    return (
      <div className="card-hover" style={{ background:"#0D1829", border:"1px solid #1E293B", borderRadius:12, padding:collapsed?12:18, marginBottom:mb!==undefined?mb:10, opacity:0, animation:"fadeUp 0.4s ease forwards", animationDelay:(delay||0)+"ms", transition:"padding 0.2s" }}>
        {collapsible && title ? (
          <div onClick={()=>setCollapsed(!collapsed)} style={{ cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:collapsed?0:12 }}>
            <span style={{ fontSize:11, fontWeight:700, color:"#94A3B8", textTransform:"uppercase", letterSpacing:"0.08em" }}>{title}</span>
            <span style={{ fontSize:10, color:"#475569" }}>{collapsed?"▼":"▲"}</span>
          </div>
        ) : null}
        {!collapsed && children}
      </div>
    );
  };

  return (
    <div style={{ minHeight:"100vh", background:"#060D1A", color:"#E2E8F0", fontFamily:"'DM Sans',sans-serif", paddingBottom:60 }}>

      <div style={{ padding:"36px 24px 28px", textAlign:"center", background:"linear-gradient(180deg,#0D1829,#060D1A)", borderBottom:"1px solid #0F1E35", position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", inset:0, opacity:0.025, background:"repeating-linear-gradient(90deg,#00FF87 0,#00FF87 1px,transparent 1px,transparent 32px),repeating-linear-gradient(0deg,#00FF87 0,#00FF87 1px,transparent 1px,transparent 32px)" }}/>
        <Particles/>
        <div style={{ position:"relative" }}>
          <div style={{ fontSize:10, fontWeight:700, color:C1, letterSpacing:"0.22em", textTransform:"uppercase", marginBottom:10 }}>Fantasy Premier League</div>
          <h1 style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:"clamp(26px,5vw,44px)", letterSpacing:"-0.02em", background:"linear-gradient(135deg,#F1F5F9,#94A3B8)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>Team Comparison</h1>
          <p style={{ color:"#475569", fontSize:13, marginTop:8 }}>Find your team by name, ID, or FPL URL</p>
        </div>
      </div>

      <div style={{ maxWidth:680, margin:"28px auto", padding:"0 var(--card-pad)" }}>
        <div style={{ background:"#0D1829", border:"1px solid #1E293B", borderRadius:14, padding:"20px var(--card-pad)" }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 32px 1fr", gap:6, marginBottom:12, alignItems:"start", overflow:"hidden" }}>
            <TeamSearchInput label="Team 1" color={C1} value={t1Input} onChange={setT1Input}
              resolvedTeam={resolved1} onResolve={r => { setResolved1(r); setT1Input(String(r.entryId)); }}
              onClear={() => { setResolved1(null); setT1Input(""); }}
              otherTeamId={resolved2?.entryId || (/^\d+$/.test(t2Input.trim()) ? t2Input.trim() : null)}/>
            <button key="swap" onClick={swapTeams} title="Swap teams" style={{ width:28, height:28, borderRadius:"50%", background:"#0F1E35", border:"1px solid #1E293B", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", marginTop:24, transition:"all 0.2s" }} onMouseEnter={e=>e.target.style.borderColor=AMBER} onMouseLeave={e=>e.target.style.borderColor="#1E293B"}>
              <span style={{ fontSize:12, color:"#64748B" }}>⇄</span>
            </button>
            <TeamSearchInput label="Team 2" color={C2} value={t2Input} onChange={setT2Input}
              resolvedTeam={resolved2} onResolve={r => { setResolved2(r); setT2Input(String(r.entryId)); }}
              onClear={() => { setResolved2(null); setT2Input(""); }}
              otherTeamId={resolved1?.entryId || (/^\d+$/.test(t1Input.trim()) ? t1Input.trim() : null)}/>
          </div>
          {(() => {
            const busy = loading || autoComparing;
            return <button onClick={()=>handleCompare()} disabled={busy || (!t1Input.trim() && !resolved1) || (!t2Input.trim() && !resolved2)}
              style={{ width:"100%", padding:busy?0:13, background:busy?"#0D1829":error?"linear-gradient(135deg,#00FF87,#00CC6A)":"linear-gradient(135deg,#00FF87,#00CC6A)", color:busy?"#94A3B8":"#060D1A", border:busy?"1px solid #1E293B":"none", borderRadius:9, fontWeight:700, fontSize:14, cursor:busy?"default":"pointer", fontFamily:"'Syne',sans-serif", display:"flex", alignItems:"center", justifyContent:"center", gap:8, overflow:"hidden", flexDirection:busy?"column":"row", transition:"all 0.3s ease" }}>
              {autoComparing ? <div style={{ display:"flex", alignItems:"center", gap:8, padding:"12px 13px" }}>
                <div style={{ width:14, height:14, border:"2px solid #1E293B", borderTopColor:"#00FF87", borderRadius:"50%", animation:"spin 0.7s linear infinite", flexShrink:0 }}/>
                <span style={{ color:"#00FF87", fontSize:13 }}>Comparing…</span>
              </div> : loading ? <>
                <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 13px" }}>
                  <div style={{ width:14, height:14, border:"2px solid #334155", borderTopColor:C1, borderRadius:"50%", animation:"spin 0.7s linear infinite", flexShrink:0 }}/>
                  <span>{status}</span>
                </div>
                <div style={{ width:"100%", height:3, background:"#1E293B" }}>
                  <div style={{ height:"100%", background:"linear-gradient(90deg,"+C1+","+C2+")", borderRadius:2, transition:"width 0.4s ease", width:progress+"%" }}/>
                </div>
              </> : "Compare Teams →"}
            </button>;
          })()}
        </div>
        {error && (() => {
          const m = error.toLowerCase();
          const fe = m.includes("404") || m.includes("not found")
            ? { title: "Team not found", detail: "That FPL team ID doesn't exist. Double-check the ID or try searching by manager name.", icon: "🔍" }
            : m.includes("503") || m.includes("502") || m.includes("500")
            ? { title: "FPL servers are down", detail: "The FPL API is temporarily unavailable. This usually resolves within a few minutes.", icon: "🔧" }
            : m.includes("429") || m.includes("rate") || m.includes("throttle")
            ? { title: "Too many requests", detail: "The FPL API rate limit was hit. Wait a moment and try again.", icon: "⏳" }
            : m.includes("network") || m.includes("failed to fetch") || m.includes("timeout") || m.includes("load")
            ? { title: "Connection error", detail: "Couldn't reach the FPL servers. Check your internet connection and try again.", icon: "📡" }
            : m.includes("different teams")
            ? { title: "Same team selected", detail: error, icon: "👥" }
            : m.includes("please enter")
            ? { title: "Missing team", detail: error, icon: "✏️" }
            : { title: "Something went wrong", detail: error, icon: "⚠️" };
          return <div style={{ background:"#160A0A", border:"1px solid #7F1D1D", borderRadius:12, padding:"16px 18px", marginTop:12, lineHeight:1.5 }}>
            <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
              <span style={{ fontSize:20, flexShrink:0, marginTop:1 }}>{fe.icon}</span>
              <div style={{ flex:1 }}>
                <div style={{ color:"#FCA5A5", fontSize:14, fontWeight:700, marginBottom:4 }}>{fe.title}</div>
                <div style={{ color:"#94A3B8", fontSize:12 }}>{fe.detail}</div>
              </div>
            </div>
            <div style={{ display:"flex", gap:8, marginTop:14 }}>
              <button onClick={()=>{setError(null);handleCompare();}} style={{ flex:1, background:"linear-gradient(135deg,#00FF87,#00CC6A)", border:"none", borderRadius:8, padding:"10px 16px", color:"#060D1A", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'Syne',sans-serif" }}>Try Again</button>
              <button onClick={()=>setError(null)} style={{ background:"#1E293B", border:"1px solid #334155", borderRadius:8, padding:"10px 16px", color:"#94A3B8", fontSize:12, fontWeight:600, cursor:"pointer" }}>Dismiss</button>
            </div>
          </div>;
        })()}

        {/* Loading skeleton */}
        {loading && !result && <div style={{ marginTop:16 }}><LoadingSkeleton/></div>}

        {/* Recent comparisons */}
        {recents.length > 0 && !result && (
          <div style={{ marginTop:16, background:"#0D1829", border:"1px solid #1E293B", borderRadius:14, padding:"14px 16px" }}>
            <div style={{ fontSize:10, fontWeight:700, color:"#475569", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:10 }}>Recent Comparisons</div>

      {easterEgg && (
        <div style={{ position:"fixed", inset:0, display:"flex", alignItems:"center", justifyContent:"center", zIndex:9999, pointerEvents:"none" }}>
          <div style={{ fontSize:64, animation:"bounceIn 0.5s ease" }}>🏆⚽🎉</div>
        </div>
      )}

      {/* Footer */}
      <div style={{ textAlign:"center", padding:"40px 16px 24px", borderTop:"1px solid #0F1E35", marginTop:40 }}>
        <div style={{ fontSize:10, fontWeight:700, color:"#1E293B", letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:6 }}>FPL Team Comparison</div>
        <div style={{ fontSize:9, color:"#0F1E35", marginBottom:4 }}>Built with React · Data from Fantasy Premier League API</div>
        {result && <div style={{ fontSize:8, color:"#0F1E35" }}>
          {t1?.gwHistory?.length||0} GWs analysed · {Object.keys(result?.headToHead?.gwResults||{}).length} H2H matches · ~50 stats compared
        </div>}
        <div style={{ display:"flex", justifyContent:"center", gap:12, marginTop:8 }}>
          <span style={{ fontSize:8, color:"#0F1E35" }}>j/k: Navigate</span>
          <span style={{ fontSize:8, color:"#0F1E35" }}>Esc: Clear</span>
          <span style={{ fontSize:8, color:"#0F1E35" }}>Ctrl+P: Print</span>
          <span style={{ fontSize:8, color:"#0F1E35" }}>⇄: Swap</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
